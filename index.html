<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Video Reference Archive</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root{ --bg:#0f0f10; --text:#eaeaea; --muted:rgba(234,234,234,.7); --line:#26262a; --line2:#2f2f35; --accent:#ff4757; --shadow: 0 14px 40px rgba(0,0,0,.35); --radius:16px; }
        *{ box-sizing:border-box; }
        body{ margin:0; padding:22px; background: radial-gradient(1200px 600px at 10% 0%, rgba(255,71,87,.08), transparent 55%), radial-gradient(1000px 600px at 90% 10%, rgba(43,143,163,.08), transparent 55%), var(--bg); color:var(--text); font-family: "Pretendard", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
        h1{ margin:0 0 12px 0; font-size:24px; letter-spacing:.2px; display:flex; align-items:center; gap:10px; }
        .topbarWrapper { position: sticky; top: -22px; margin: -22px -22px 12px -22px; padding: 22px 22px 12px 22px; background: rgba(15, 15, 16, 0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .topbar{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
        input[type="text"]{ padding:10px 12px; width:320px; max-width:100%; border-radius:14px; border:1px solid var(--line); background: rgba(20,20,22,.7); color:var(--text); outline:none; font-family: inherit; }
        input[type="text"]::placeholder{ color: rgba(234,234,234,.45); }
        .btn{ padding:10px 12px; border-radius:14px; border:1px solid var(--line); background: rgba(20,20,22,.7); color:var(--text); cursor:pointer; font-size:13px; white-space:nowrap; font-weight:700; font-family: inherit; }
        .btn:hover{ border-color: var(--line2); }
        .btn.active{ border-color: rgba(255,71,87,.65); box-shadow: 0 0 0 3px rgba(255,71,87,.12); }
        .stats{ font-size:13px; color: var(--muted); margin-left:auto; white-space:nowrap; }
        .divider{ height:1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent); margin: 12px 0; }
        .viewToggle{ display:inline-flex; border:1px solid rgba(255,255,255,.10); background: rgba(20,20,22,.55); border-radius:999px; overflow:hidden; }
        .viewToggle button{ border:0; background: transparent; color: rgba(234,234,234,.78); padding:9px 12px; font-size:13px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:6px; font-family: inherit; }
        .viewToggle button.active{ background: rgba(255,71,87,.14); color: rgba(234,234,234,.95); }
        .filterTabs{ display:flex; flex-wrap:wrap; gap:8px; margin: 8px 0 10px 0; }
        .tab{ padding:8px 10px; border-radius:12px; border:1px solid rgba(255,255,255,.12); background: rgba(20,20,22,.55); color: rgba(234,234,234,.88); font-size:13px; font-weight:700; cursor:pointer; line-height:1; white-space:nowrap; font-family: inherit; }
        .tab:hover{ border-color: rgba(255,255,255,.18); }
        .tab.active{ border-color: rgba(255,71,87,.65); box-shadow: 0 0 0 3px rgba(255,71,87,.12); background: rgba(20,20,22,.75); }
        .filterPanel{ border:1px solid rgba(255,255,255,.08); background: rgba(20,20,22,.35); border-radius:14px; padding:10px; }
        .chips{ display:flex; flex-wrap:wrap; gap:8px; }
        .chipsPanel{ display:none; }
        .chipsPanel.active{ display:flex; }
        .chip{ padding:7px 10px; border-radius:999px; border:1px solid var(--line); background: rgba(23,23,26,.8); cursor:pointer; user-select:none; font-size:13px; color: rgba(234,234,234,.9); white-space:nowrap; transition: all 0.2s ease; }
        .chip:hover{ border-color: var(--line2); }
        .chip.active{ border-color: rgba(255,71,87,.7); background: rgba(255,71,87,.1); box-shadow: 0 0 0 3px rgba(255,71,87,.12); }
        .chip .count{ opacity:.55; margin-left:6px; font-size:12px; }
        .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:16px; margin-top: 14px; }
        .card{ background: rgba(20,20,22,.92); border:1px solid var(--line); border-radius: var(--radius); overflow:hidden; box-shadow: var(--shadow); transition: transform .2s ease, border-color .2s ease; position:relative; }
        .card:hover{ transform: translateY(-4px); border-color: rgba(255,255,255,.16); }
        .thumbWrap{ width:100%; background:#0b0b0c; overflow:hidden; cursor:pointer; }
        .thumb{ width:100%; height:220px; object-fit:contain; display:block; background:#0b0b0c; transition: transform 0.3s ease; }
        .card:hover .thumb { transform: scale(1.05); }
        .metaBox{ padding:14px 14px 15px; border-top:1px solid rgba(255,255,255,.06); }
        .metaLeft .channel{ font-size:15px; font-weight:700; line-height:1.25; margin:0 0 6px 0; }
        .metaLeft .titleLine{ font-size:13.5px; color: rgba(234,234,234,.86); line-height:1.45; margin:0 0 10px 0; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .actionsBar{ margin-top:10px; display:flex; gap:8px; align-items:center; justify-content:flex-start; }
        .actionBtn{ border:1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.04); color: rgba(234,234,234,.9); padding:7px 12px; border-radius:999px; font-size:13px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:8px; line-height:1; user-select:none; font-family: inherit; transition: all 0.2s ease; }
        .actionBtn.like.active{ border-color: rgba(255,71,87,.65); background: rgba(255,71,87,.15); box-shadow: 0 0 0 3px rgba(255,71,87,.10); }
        .dash{ display:none; grid-template-columns: 320px 1fr; gap:14px; margin-top: 14px; align-items:start; }
        .dash.active{ display:grid; }
        .panel{ border:1px solid rgba(255,255,255,.08); background: rgba(20,20,22,.40); border-radius:16px; overflow:hidden; box-shadow: var(--shadow); }
        .panelHeader{ padding:12px 12px; border-bottom:1px solid rgba(255,255,255,.06); display:flex; align-items:center; justify-content:space-between; gap:10px; background: rgba(20,20,22,.55); }
        .panelHeader .title{ font-size:13px; font-weight:700; color: rgba(234,234,234,.9); }
        .leftScroll{ max-height: calc(100vh - 320px); overflow:auto; padding:10px; }

        /* 장르 그룹 하이라이트 및 구분 스타일 */
        .genreGroup { border: 1px solid rgba(255,255,255,.06); border-radius: 14px; overflow: hidden; margin-bottom: 10px; background: rgba(20,20,22,.35); }
        .genreGroup.active { border-color: var(--accent); background: rgba(255, 71, 87, 0.05); }
        .genreHead { width:100%; border:0; background: rgba(20,20,22,.55); color: rgba(234,234,234,.92); padding:10px 10px; cursor:pointer; display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:13px; font-weight:700; font-family: inherit; transition: all 0.2s ease; }
        .genreGroup.active .genreHead { color: var(--accent); }
        .genreBody { padding: 5px 8px 10px 20px; border-top: 1px solid rgba(255, 255, 255, 0.03); }
        .channelItem { width:100%; border:1px solid transparent; background: transparent; color: rgba(234,234,234,.88); padding:9px 10px; border-radius:12px; cursor:pointer; display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:4px; font-size:13px; font-weight:600; font-family: inherit; }
        .channelItem.active { background: rgba(255, 71, 87, 0.15) !important; border-color: rgba(255, 71, 87, 0.3) !important; color: #fff !important; }
        .channelItem:hover { background: rgba(255, 255, 255, 0.05); }

        .list{ display:flex; flex-direction:column; gap:10px; }
        .row{ display:grid; grid-template-columns: 160px 1fr; gap:12px; border:1px solid rgba(255,255,255,.08); background: rgba(20,20,22,.55); border-radius:16px; overflow:hidden; cursor:pointer; transition: transform 0.2s ease; }
        .rowThumb{ width:100%; height:96px; background:#0b0b0c; object-fit:cover; display:block; }
        .rowMeta{ padding:10px 12px; display:flex; flex-direction:column; gap:6px; min-width:0; }

        .modalOverlay{ position:fixed; inset:0; background: rgba(0,0,0,.75); backdrop-filter: blur(4px); display:none; align-items:center; justify-content:center; padding:18px; z-index:9999; }
        .modalOverlay.open{ display:flex; }
        .modal { width: min(1280px, 95vw); max-height: min(90vh, 850px); overflow: hidden; border-radius: 20px; border: 1px solid rgba(255,255,255,.10); background: rgba(20,20,22,.96); box-shadow: 0 30px 80px rgba(0,0,0,.65); display: grid; grid-template-columns: 350px 1fr; }
        .modalLeft { border-right: 1px solid rgba(255,255,255,.06); padding: 20px; background: rgba(16,16,18,.55); display: flex; flex-direction: column; gap: 15px; }
        .modalThumb { width: 100%; height: auto; aspect-ratio: 16/9; object-fit: contain; background: #0b0b0c; border-radius: 14px; border: 1px solid rgba(255,255,255,.06); }
        .modalRight { padding: 20px; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
        .modalHead { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding-bottom: 5px; }

        .memoList{ border:1px solid rgba(255,255,255,.08); border-radius:14px; background: rgba(255,255,255,.02); padding:12px; overflow:auto; flex:1; }
        .memoComposer{ display:grid; grid-template-columns: 140px 1fr auto; gap:10px; align-items:center; }
        .memoComposer input{ width:100%; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,.12); background: rgba(20,20,22,.65); color: rgba(234,234,234,.95); outline:none; font-family: inherit; }
        .primaryBtn{ padding:12px 16px; border-radius:12px; border:1px solid rgba(255,71,87,.55); background: rgba(255,71,87,.20); color: rgba(234,234,234,.95); cursor:pointer; font-weight:700; font-family: inherit; }

        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: rgba(255, 71, 87, 0.95); color: #fff; padding: 12px 24px; border-radius: 999px; font-weight: 700; transition: bottom 0.4s; z-index: 10000; }
        #toast.show { bottom: 40px; }
        #fab { position: fixed; bottom: 40px; right: 30px; width: 50px; height: 50px; border-radius: 50%; background: rgba(30, 30, 34, 0.85); border: 1px solid rgba(255,255,255,0.15); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 9000; }
        #fab.visible { opacity: 1; pointer-events: auto; }

        @media (max-width: 980px){ .dash.active{ grid-template-columns: 1fr; } .modal{ grid-template-columns: 1fr; max-height: 95vh; } .modalLeft{ border-right:0; border-bottom:1px solid rgba(255,255,255,0.06); } }

    
/* Shorts 및 가로형 레이아웃 분리 수정 */
@media (min-width: 981px) {
  /* [1] 기본 모달 (가로형 영상용) */
  .modal {
    grid-template-columns: 320px 1fr !important; /* 왼쪽 메뉴 폭을 줄여 영상 공간 확보 */
    max-width: 1600px !important;               /* 최대 너비를 1600px로 대폭 확장 */
    width: 95vw;                                /* 브라우저 너비의 95% 사용 */
    max-height: 90vh;                           /* 높이도 화면의 90%까지 허용 */
  }
  
  /* 가로형 영상 영역 비율 및 크기 강제 적용 */
  .modal #mVideoPlayer {
    aspect-ratio: 16 / 9 !important;
    height: auto !important;
    width: 100% !important;
    max-height: 80vh;                           /* 영상이 너무 커져서 잘리지 않게 방지 */
  }

  /* [2] 쇼츠 모드 (기존 세로형 설정 유지) */
  .modal.shorts-mode {
    grid-template-columns: 420px 1fr !important;
    max-width: 1000px !important;
    height: 95vh !important;
    max-height: none !important;
  }

  .modal.shorts-mode #mVideoPlayer {
    aspect-ratio: auto !important; 
    height: calc(90vh - 120px) !important;
  }
}

  /* 쇼츠일 때 왼쪽(메모), 오른쪽(영상) 배치 */
  .modal.shorts-mode .modalLeft { order: 1; border-right: 1px solid rgba(255,255,255,0.1); }
  .modal.shorts-mode .modalRight { order: 2; background: #000; display: flex; align-items: center; }

  /* 쇼츠일 때 영상 영역 세로 확장 */
  .modal.shorts-mode #mVideoPlayer {
    aspect-ratio: auto !important; 
    height: calc(90vh - 120px) !important;
    width: 100%;
  }
}
    </style>
</head>
<body>
    <div id="toast">알림 메시지</div>
    <div id="fab">⬆️</div>

    <div class="topbarWrapper">
        <h1>🎬 Video Reference Archive</h1>
        <div class="topbar">
            <input id="search" type="text" placeholder="제목 검색..." />
            <div class="viewToggle">
                <button id="viewAllBtn" class="active">🟦 전체</button>
                <button id="viewDashBtn">📺 채널별</button>
            </div>
            <button class="btn" id="likedOnlyBtn">❤️ 좋아요만</button>
            <button class="btn" id="sortLikesBtn">🔥 좋아요순</button>
            <button class="btn" id="resetBtn">초기화</button>
            <div class="stats" id="stats">표시: 0 / 전체: 0</div>
        </div>
        <div class="divider"></div>
        <div class="filterTabs" id="filterTabs">
            <button class="tab active" data-tab="genre">장르</button>
            <button class="tab" data-tab="media">매체</button>
            <button class="tab" data-tab="format">포맷</button>
            <button class="tab" data-tab="tag">TAG</button>
        </div>
        <div class="filterPanel">
            <div class="chips chipsPanel active" id="genreChips"></div>
            <div class="chips chipsPanel" id="mediaChips"></div>
            <div class="chips chipsPanel" id="formatChips"></div>
            <div class="chips chipsPanel" id="tagChips"></div>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="dash" id="dash">
        <div class="panel">
            <div class="panelHeader"><div class="title">장르 → 채널</div></div>
            <div class="leftScroll" id="leftNav"></div>
        </div>
        <div class="panel">
            <div class="panelHeader"><div class="title" id="rightTitle">채널 콘텐츠</div></div>
            <div class="rightWrap">
                <div class="list" id="rightList"></div>
                <div class="mutebox" id="rightEmpty" style="display:none;"></div>
            </div>
        </div>
    </div>

    <div class="modalOverlay" id="modalOverlay">
        <div class="modal">
            <div class="modalLeft">
                <img id="mThumb" class="modalThumb" alt="thumbnail"/>
                <div id="mTitle" style="font-weight:700; font-size:16px;"></div>
                <div id="mSub" style="font-size:13px; color:rgba(234,234,234,0.6);"></div>
                <div style="display:flex; flex-direction:column; gap:8px;">
                    <div style="display:flex; gap:8px;">
                        <a class="mLink" id="mLink" target="_blank" style="flex:1; background:rgba(255,255,255,0.08); padding:10px; border-radius:10px; text-decoration:none; text-align:center; color:white; font-size:13px;">🔗 원본 열기</a>
                        <button class="actionBtn" id="mPipBtn" type="button" style="border-radius:10px;">📺 PIP 팝업</button>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="actionBtn" id="mCopyBtn" type="button" style="flex:1; border-radius:10px;">📋 링크 복사</button>
                        <button class="actionBtn" id="mShareBtn" type="button" style="flex:1; border-radius:10px; background:rgba(255,71,87,0.1);">🔗 공유 URL</button>
                    </div>
                </div>
            </div>
            <div class="modalRight">
                <div class="modalHead">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span id="mCounts" style="font-size:13px;">👍 0 · 💬 0</span>
                        <button class="actionBtn like" id="mLikeBtn">👍 <span id="mLikeCnt">0</span></button>
                    </div>
                    <button class="xBtn" id="mClose" style="background:none; border:none; color:white; cursor:pointer;">닫기 ✕</button>
                </div>
                <div id="mVideoPlayer" style="width:100%; background:#000; border-radius:12px; overflow:hidden; display:none;">
                    <iframe id="mIframe" width="100%" height="100%" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                </div>
                <div class="memoList" id="mList"></div>
                <div class="memoComposer">
                    <input id="mNick" type="text" placeholder="닉네임" />
                    <input id="mMemo" type="text" placeholder="메모" />
                    <button class="primaryBtn" id="mSend">등록</button>
                </div>
            </div>
        </div>
    </div>

    <script>
const SHEET_URL = "https://opensheet.elk.sh/1GgTfXN-iChTCdW3vHYFwQu2WSlwmgOm2-pHs2WIBBAY/ARCHIVE";
const API_URL = "https://script.google.com/macros/s/AKfycbzHucb9jQ128D4vvCnX1nzTzZaWDqK6gopqS45KoJRknGG_Zr5gSIB-lDxpe8MohZVRKg/exec";
const KEY = { genre: "장르", channel: "채널명", title: "TITLE", media: "매체", url: "URL", format: "포맷", tag: "TAG", date: "발행일", thumbCandidates: ["thumb", "THUMB", "썸네일"] };

        let allData = [], baseGenres = [], baseMedias = [], baseFormats = [], baseTags = [];
        let activeGenre = null, activeMedia = null, activeFormat = null, activeTags = new Set();
        let viewMode = "all", selectedChannel = null, showLikedOnly = false, sortMode = "date", renderLimit = 30;
        const RENDER_CHUNK = 30;
        const interactionsCache = new Map();
        const LS_NICK = "vra:nickname", LS_UID = "vra:userId", LS_LIKED = "vra:liked";

        const gridEl = document.getElementById("grid"), dashEl = document.getElementById("dash"), statsEl = document.getElementById("stats"), searchEl = document.getElementById("search"), resetBtn = document.getElementById("resetBtn"), viewAllBtn = document.getElementById("viewAllBtn"), viewDashBtn = document.getElementById("viewDashBtn"), genreChipsEl = document.getElementById("genreChips"), mediaChipsEl = document.getElementById("mediaChips"), formatChipsEl = document.getElementById("formatChips"), tagChipsEl = document.getElementById("tagChips"), leftNavEl = document.getElementById("leftNav"), rightTitleEl = document.getElementById("rightTitle"), rightListEl = document.getElementById("rightList"), rightEmptyEl = document.getElementById("rightEmpty"), modalOverlay = document.getElementById("modalOverlay"), mClose = document.getElementById("mClose"), mThumb = document.getElementById("mThumb"), mTitle = document.getElementById("mTitle"), mSub = document.getElementById("mSub"), mLink = document.getElementById("mLink"), mCopyBtn = document.getElementById("mCopyBtn"), mCounts = document.getElementById("mCounts"), mLikeBtn = document.getElementById("mLikeBtn"), mLikeCnt = document.getElementById("mLikeCnt"), mList = document.getElementById("mList"), mNick = document.getElementById("mNick"), mMemo = document.getElementById("mMemo"), mSend = document.getElementById("mSend"), fab = document.getElementById("fab"), mVideoPlayer = document.getElementById("mVideoPlayer"), mIframe = document.getElementById("mIframe"), mPipBtn = document.getElementById("mPipBtn"), mShareBtn = document.getElementById("mShareBtn");

        function escapeHTML(str) { return String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
        function splitTags(s) { return (s || "").split(/[ ,/]+/).filter(Boolean); }
        function fnv1a(str){ let h = 0x811c9dc5; for (let i=0; i<str.length; i++){ h ^= str.charCodeAt(i); h = (h + ((h<<1) + (h<<4) + (h<<7) + (h<<8) + (h<<24))) >>> 0; } return h.toString(16).padStart(8,"0"); }
        function getItemId(item){ return fnv1a((item[KEY.url] || "").trim()); }
        function getNickname(){ return localStorage.getItem(LS_NICK) || ""; }
        function setNickname(nick){ localStorage.setItem(LS_NICK, nick); }
        function getUserId() { let uid = localStorage.getItem(LS_UID); if (!uid) { uid = crypto.randomUUID(); localStorage.setItem(LS_UID, uid); } return uid; }
        function getLikedMap(){ try{ return JSON.parse(localStorage.getItem(LS_LIKED) || "{}"); }catch{ return {}; } }
        function isLiked(itemId){ return !!getLikedMap()[itemId]; }
        function setLikedState(itemId, liked){ const m = getLikedMap(); if (liked) m[itemId] = true; else delete m[itemId]; localStorage.setItem(LS_LIKED, JSON.stringify(m)); }
        function debounce(func, delay) { let timer; return function(...args) { clearTimeout(timer); timer = setTimeout(() => func.apply(this, args), delay); }; }
        function showToast(msg) { const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 3000); }
        function sortByDateDesc(data) { return [...data].sort((a, b) => new Date((b[KEY.date]||"").replace(/\./g,'-')) - new Date((a[KEY.date]||"").replace(/\./g,'-'))); }
        
        function getYoutubeID(url) {
            try {
                const u = new URL(url);
                if (u.pathname.includes("/shorts/")) { return u.pathname.split("/shorts/")[1].split(/[?#]/)[0]; }
                if (u.hostname.includes("youtu.be")) { return u.pathname.slice(1).split(/[?#]/)[0]; }
                return u.searchParams.get("v");
            } catch { return null; }
        }

        async function resolveThumbnail(item) { const ytId = getYoutubeID(item[KEY.url]); return ytId ? `https://img.youtube.com/vi/${ytId}/hqdefault.jpg` : "https://via.placeholder.com/400x225?text=No+Thumbnail"; }
        async function fetchInteractions(itemId){ if (interactionsCache.has(itemId)) return interactionsCache.get(itemId); try { const res = await fetch(API_URL + "?itemId=" + itemId); const data = await res.json(); const norm = { likes: data.likes || 0, memos: data.memos || [] }; interactionsCache.set(itemId, norm); return norm; } catch { return { likes: 0, memos: [] }; } }
        async function postInteraction(payload){ await fetch(API_URL, { method: "POST", mode: "cors", body: JSON.stringify(payload) }); }
        
        function updateCountersInDOM(itemId){ 
            const data = interactionsCache.get(itemId); 
            if (!data) return; 
            document.querySelectorAll("#like-" + itemId).forEach(el => el.textContent = data.likes); 
            document.querySelectorAll("#memo-" + itemId).forEach(el => el.textContent = data.memos.length); 
            if (modalOverlay.classList.contains("open") && modalOverlay.dataset.itemid === itemId){ 
                mLikeCnt.textContent = data.likes; 
                mCounts.textContent = `👍 ${data.likes} · 💬 ${data.memos.length}`; 
                mLikeBtn.classList.toggle("active", isLiked(itemId)); 
            } 
        }

        async function hydrateCountersFor(ids){ for (const id of [...new Set(ids)]) { await fetchInteractions(id); updateCountersInDOM(id); } }
        async function toggleLike(itemId){ const wasLiked = isLiked(itemId); setLikedState(itemId, !wasLiked); render(); await postInteraction({ itemId, action: "like", userId: getUserId(), nickname: getNickname() || "익명" }); interactionsCache.delete(itemId); await fetchInteractions(itemId); updateCountersInDOM(itemId); }

        function buildGenreChannelIndex(items){ const genreMap = new Map(); items.forEach(it => { const g = (it[KEY.genre] || "기타").trim(), c = (it[KEY.channel] || "미분류").trim(); if (!genreMap.has(g)) genreMap.set(g, new Map()); const cm = genreMap.get(g); cm.set(c, (cm.get(c) || 0) + 1); }); return [...genreMap.entries()].map(([g, cm]) => ({ g, total: [...cm.values()].reduce((a,b)=>a+b,0), channels: [...cm.entries()].map(([c, cnt]) => ({ c, cnt })).sort((a,b)=> a.c.localeCompare(b.c, "ko")) })).sort((a,b)=> b.total - a.total); }

        function renderChipGroup(container, labelAll, baseList, countMap, activeState, onPick, isMulti = false) { container.innerHTML = ""; const isAllActive = isMulti ? activeState.size === 0 : activeState === null; const allChip = document.createElement("div"); allChip.className = "chip" + (isAllActive ? " active" : ""); allChip.textContent = labelAll; allChip.onclick = () => onPick(null); container.appendChild(allChip); baseList.forEach(val => { const isActive = isMulti ? activeState.has(val) : activeState === val; const chip = document.createElement("div"); chip.className = "chip" + (isActive ? " active" : ""); chip.innerHTML = `${escapeHTML(val)} <span class="count">${countMap.get(val)||0}</span>`; chip.onclick = () => onPick(val); container.appendChild(chip); }); }
        function updateChipsUI(filtered) { const gMap = new Map(), mMap = new Map(), fMap = new Map(), tMap = new Map(); allData.forEach(it => { gMap.set(it[KEY.genre], (gMap.get(it[KEY.genre])||0)+1); mMap.set(it[KEY.media], (mMap.get(it[KEY.media])||0)+1); fMap.set(it[KEY.format], (fMap.get(it[KEY.format])||0)+1); }); filtered.forEach(it => splitTags(it[KEY.tag]).forEach(t => tMap.set(t, (tMap.get(t)||0)+1))); renderChipGroup(genreChipsEl, "All", baseGenres, gMap, activeGenre, (v) => { activeGenre = v; render(true); }); renderChipGroup(mediaChipsEl, "All", baseMedias, mMap, activeMedia, (v) => { activeMedia = v; render(true); }); renderChipGroup(formatChipsEl, "All", baseFormats, fMap, activeFormat, (v) => { activeFormat = v; render(true); }); renderChipGroup(tagChipsEl, "All", baseTags, tMap, activeTags, (v) => { if (v === null) activeTags.clear(); else activeTags.has(v) ? activeTags.delete(v) : activeTags.add(v); render(true); }, true); }

        function renderLeftNav() {
            leftNavEl.innerHTML = "";
            const index = buildGenreChannelIndex(allData);
            index.forEach((group, idx) => {
                const isGenreActive = group.channels.some(ch => ch.c === selectedChannel);
                const wrap = document.createElement("div");
                wrap.className = "genreGroup" + (isGenreActive ? " active" : "");
                const head = document.createElement("button");
                head.className = "genreHead";
                head.innerHTML = `<span>${escapeHTML(group.g)}</span><span style="font-size:11px; opacity:0.6;">${group.channels.length}ch</span>`;
                const body = document.createElement("div");
                body.className = "genreBody";
                body.style.display = (isGenreActive || idx < 2) ? "block" : "none";
                head.onclick = () => { body.style.display = body.style.display === "none" ? "block" : "none"; };
                group.channels.forEach(({c, cnt}) => {
                    const b = document.createElement("button");
                    b.className = "channelItem" + (selectedChannel === c ? " active" : "");
                    b.innerHTML = `<span>${escapeHTML(c)}</span><span style="font-size:11px; opacity:0.5;">${cnt}</span>`;
                    b.onclick = () => { selectedChannel = c; render(true); renderLeftNav(); };
                    body.appendChild(b);
                });
                wrap.append(head, body);
                leftNavEl.appendChild(wrap);
            });
        }

        async function render(resetPagination = false){
            if (resetPagination) renderLimit = RENDER_CHUNK;
            const filtered = allData.filter(item => {
                const q = searchEl.value.toLowerCase();
                const okSearch = q ? (item[KEY.title]||"").toLowerCase().includes(q) : true;
                const okGenre = activeGenre ? item[KEY.genre] === activeGenre : true;
                const okMedia = activeMedia ? item[KEY.media] === activeMedia : true;
                const okFormat = activeFormat ? item[KEY.format] === activeFormat : true;
                const okTag = activeTags.size === 0 ? true : [...activeTags].every(t => splitTags(item[KEY.tag]).includes(t));
                const okLiked = showLikedOnly ? isLiked(getItemId(item)) : true;
                return okSearch && okGenre && okMedia && okFormat && okTag && okLiked;
            });
            updateChipsUI(filtered);
            statsEl.textContent = `표시: ${filtered.length} / 전체: ${allData.length}`;
            if (viewMode === "all"){
                gridEl.style.display = "grid"; dashEl.style.display = "none";
                const list = (sortMode === "likes") ? [...filtered].sort((a,b)=> (interactionsCache.get(getItemId(b))?.likes||0) - (interactionsCache.get(getItemId(a))?.likes||0)) : sortByDateDesc(filtered);
                const sliced = list.slice(0, renderLimit);
                gridEl.innerHTML = sliced.map(it => `
                    <div class="card">
                        <div class="thumbWrap" onclick='openModalForItem(${JSON.stringify(it)})'>
                            <img class="thumb" src="https://via.placeholder.com/400x225?text=Loading..." id="img-${getItemId(it)}">
                        </div>
                        <div class="metaBox">
                            <div class="metaLeft"><div class="channel">${escapeHTML(it[KEY.channel])}</div><div class="titleLine">${escapeHTML(it[KEY.title])}</div></div>
                            <div class="actionsBar">
                                <button class="actionBtn ${isLiked(getItemId(it))?'active':''}" onclick="toggleLike('${getItemId(it)}')">👍 <span id="like-${getItemId(it)}">0</span></button>
                                <button class="actionBtn" onclick='openModalForItem(${JSON.stringify(it)})'>💬 <span id="memo-${getItemId(it)}">0</span></button>
                            </div>
                        </div>
                    </div>`).join("");
                sliced.forEach(async it => { const t = await resolveThumbnail(it); document.getElementById(`img-${getItemId(it)}`).src = t; });
                hydrateCountersFor(sliced.map(getItemId));
            } else {
                gridEl.style.display = "none"; dashEl.style.display = "grid";
                if (!selectedChannel) { rightTitleEl.textContent = "채널 선택"; rightListEl.innerHTML = ""; return; }
                rightTitleEl.textContent = selectedChannel;
                const list = sortByDateDesc(filtered.filter(it => it[KEY.channel] === selectedChannel));
                rightListEl.innerHTML = list.map(it => `<div class="row" onclick='openModalForItem(${JSON.stringify(it)})'><img class="rowThumb" src="https://via.placeholder.com/160x90" id="rowimg-${getItemId(it)}"><div class="rowMeta"><strong>${escapeHTML(it[KEY.title])}</strong><div style="font-size:12px;">${it[KEY.date]}</div></div></div>`).join("");
                list.forEach(async it => { const t = await resolveThumbnail(it); const img = document.getElementById(`rowimg-${getItemId(it)}`); if(img) img.src = t; });
            }
        }

        async function openModalForItem(item){
            const itemId = getItemId(item); 
            modalOverlay.dataset.itemid = itemId;
            mTitle.textContent = item[KEY.title]; 
            mSub.textContent = `${item[KEY.channel]} · ${item[KEY.date]}`;
            mLink.href = item[KEY.url]; 
            mThumb.src = await resolveThumbnail(item);
            mNick.value = getNickname();

            const url = item[KEY.url] || "";
            const ytId = getYoutubeID(url);
            const isInstagram = url.includes("instagram.com");

            mVideoPlayer.innerHTML = '<iframe id="mIframe" width="100%" height="100%" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>';
            const newIframe = document.getElementById("mIframe");

            if(ytId) {
                mVideoPlayer.style.display = "block";
                mVideoPlayer.style.background = "#000";
                newIframe.src = `https://www.youtube.com/embed/${ytId}?autoplay=1`;
            } else if (isInstagram) {
                mVideoPlayer.style.display = "block";
                mVideoPlayer.style.background = "#1a1a1c";
                mVideoPlayer.innerHTML = `<div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#aaa; text-align:center; padding:20px;">
                    <div style="font-size:40px; margin-bottom:15px;">📸</div>
                    <p style="font-size:15px; line-height:1.5;">인스타그램은 보안 정책상 여기서 재생 불가</p>
                    <a href="${url}" target="_blank" style="margin-top:15px; color:#ff4757; text-decoration:underline; font-weight:700;">원본 보기</a>
                </div>`;
            } else {
                mVideoPlayer.style.display = "none";
            }

            const isShorts = url.includes("/shorts/");
const modalContainer = modalOverlay.querySelector('.modal');
            if (isShorts) {
    modalContainer.classList.add('shorts-mode');
} else {
    // 가로형 영상일 때는 반드시 이 클래스를 제거해야 원래 크기로 돌아옵니다!
    modalContainer.classList.remove('shorts-mode'); 
}
const memoSection = document.querySelector('.memoList');
const memoComposer = document.querySelector('.memoComposer');
const leftSection = document.querySelector('.modalLeft');
const rightSection = document.querySelector('.modalRight');

if (isShorts) {
    modalContainer.classList.add('shorts-mode');
    // 쇼츠일 때: 메모 리스트와 입력창을 왼쪽으로 이동
    leftSection.appendChild(memoSection);
    leftSection.appendChild(memoComposer);
} else {
    modalContainer.classList.remove('shorts-mode');
    // 일반일 때: 메모 리스트와 입력창을 원래 위치(오른쪽)로 복구
    rightSection.appendChild(memoSection);
    rightSection.appendChild(memoComposer);
}

modalOverlay.classList.add("open");

            const data = await fetchInteractions(itemId);
            mLikeCnt.textContent = data.likes; 
            mCounts.textContent = `👍 ${data.likes} · 💬 ${data.memos.length}`;
            mList.innerHTML = data.memos.map(m => `<div style="padding:10px; border-bottom:1px solid rgba(255,255,255,0.05);"><strong>${escapeHTML(m.nickname)}</strong>: ${escapeHTML(m.memo)}</div>`).join("");
        }

        function checkDeepLink() { const params = new URLSearchParams(window.location.search); const id = params.get('id'); if (id) { const item = allData.find(it => getItemId(it) === id); if (item) openModalForItem(item); } }

        // 1. PIP 팝업 버튼: 브라우저 차단 회피 및 모든 영상 재생 가능 버전
        mPipBtn.onclick = () => {
            const url = mLink.href;
            const ytId = getYoutubeID(url);

            if (ytId) {
                // 클릭 즉시 빈 창을 먼저 열어 브라우저의 '팝업 차단'을 방지합니다.
                const newWindow = window.open('about:blank', 'pip', 'width=800,height=600');
                
                // 퍼가기 금지 영상까지 모두 열리도록 표준 watch 주소를 사용합니다.
                const finalUrl = `https://www.youtube.com/watch?v=${ytId}`;
                
                if (newWindow) {
                    newWindow.location.href = finalUrl;
                } else {
                    showToast("팝업이 차단되었습니다. 설정을 확인해주세요.");
                }
            } else {
                // 유튜브가 아닐 경우 원본 링크 새 탭 열기
                window.open(url, '_blank');
            }
        };

        // 2. 공유 버튼 (기존 유지)
        mShareBtn.onclick = () => { 
            const url = window.location.origin + window.location.pathname + "?id=" + modalOverlay.dataset.itemid; 
            navigator.clipboard.writeText(url); 
            showToast("공유 링크 복사됨!"); 
        };

        // 3. 링크 복사 버튼 (기존 유지)
        mCopyBtn.onclick = () => { 
            navigator.clipboard.writeText(mLink.href); 
            showToast("원본 링크 복사됨!"); 
        };
      // --- 팝업 및 공유 관련 기능 시작 (기존 코드를 지우고 이 부분을 넣으세요) ---
        mPipBtn.onclick = () => {
            const url = mLink.href;
            const ytId = getYoutubeID(url);
            if (ytId) {
                // 브라우저 팝업 차단을 피하기 위해 즉시 빈 창을 엽니다.
                const newWin = window.open('about:blank', 'pip', 'width=800,height=600');
                if (newWin) {
                    newWin.location.href = "https://www.youtube.com/watch?v=" + ytId;
                } else {
                    showToast("팝업이 차단되었습니다. 브라우저 설정을 확인해주세요.");
                }
            } else {
                // 유튜브가 아닐 경우 원본 링크를 새 탭으로 엽니다.
                window.open(url, '_blank');
            }
        };

        mShareBtn.onclick = () => {
            const currentId = modalOverlay.dataset.itemid;
            const shareUrl = window.location.origin + window.location.pathname + "?id=" + currentId;
            navigator.clipboard.writeText(shareUrl);
            showToast("공유 링크 복사됨!");
        };

        mCopyBtn.onclick = () => {
            navigator.clipboard.writeText(mLink.href);
            showToast("원본 링크 복사됨!");
        };
        // --- 기능 끝 ---

        // 찾으신 기준점 함수 (여기서부터는 건드리지 마세요)
        function closeModal() {
            modalOverlay.classList.remove("open");
            const iframe = document.getElementById("mIframe");
            if (iframe) iframe.src = "";
            mVideoPlayer.innerHTML = ""; 
        }

        mClose.onclick = closeModal;
        modalOverlay.onclick = (e) => { if (e.target === modalOverlay) closeModal(); };

        mSend.onclick = async () => { const itemId = modalOverlay.dataset.itemid, nick = mNick.value.trim(), memo = mMemo.value.trim(); if (!nick || !memo) return; setNickname(nick); await postInteraction({ itemId, action: "memo", nickname: nick, memo, userId: getUserId() }); mMemo.value = ""; interactionsCache.delete(itemId); openModalForItem(allData.find(it => getItemId(it) === itemId)); };

        window.addEventListener("scroll", () => { if (viewMode === "all" && (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) { if (renderLimit < allData.length) { renderLimit += RENDER_CHUNK; render(false); } } });
        
        async function init() {
            try {
                const res = await fetch(SHEET_URL);
                allData = (await res.json()).filter(x => x && (x[KEY.url] || x[KEY.title]));
                baseGenres = [...new Set(allData.map(i => (i[KEY.genre]||"").trim()).filter(Boolean))].sort();
                baseMedias = [...new Set(allData.map(i => (i[KEY.media]||"").trim()).filter(Boolean))].sort();
                baseFormats = [...new Set(allData.map(i => (i[KEY.format]||"").trim()).filter(Boolean))].sort();
                baseTags = [...new Set(allData.flatMap(i => splitTags(i[KEY.tag])))].sort();
                renderLeftNav(); render(true); checkDeepLink();
            } catch (e) { console.error(e); gridEl.innerHTML = "데이터 로드 실패"; }
        }
        
        searchEl.oninput = debounce(() => render(true), 300);
        viewAllBtn.onclick = () => { viewMode = "all"; viewAllBtn.classList.add("active"); viewDashBtn.classList.remove("active"); render(true); };
        viewDashBtn.onclick = () => { viewMode = "dash"; viewDashBtn.classList.add("active"); viewAllBtn.classList.remove("active"); render(true); };
        resetBtn.onclick = () => { activeGenre = activeMedia = activeFormat = null; activeTags.clear(); searchEl.value = ""; render(true); };
        document.querySelectorAll('.tab').forEach(t => t.onclick = (e) => { document.querySelectorAll('.tab, .chipsPanel').forEach(el => el.classList.remove('active')); e.target.classList.add('active'); document.getElementById(e.target.dataset.tab + "Chips").classList.add('active'); });
        
        init();
    </script>
</body>
