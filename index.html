<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Video Reference Archive</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root{ 
            --bg:#0b0b0c; 
            --panel-bg: rgba(20, 20, 22, 0.85);
            --text:#eaeaea; 
            --muted:rgba(234,234,234,.6); 
            --line:rgba(255,255,255,0.08); 
            --line2:rgba(255,255,255,0.15); 
            --accent:#ff4757; 
            --accent-glow: rgba(255, 71, 87, 0.3);
            --shadow: 0 14px 40px rgba(0,0,0,.5); 
            --radius:16px; 
            --glass: blur(16px) saturate(180%);
        }
        *{ box-sizing:border-box; outline: none; }
        
        /* 스크롤바 스타일 정의 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        body{ 
            margin:0; padding:22px; 
            background: radial-gradient(1200px 600px at 10% 0%, rgba(255,71,87,.08), transparent 55%), radial-gradient(1000px 600px at 90% 10%, rgba(43,143,163,.08), transparent 55%), var(--bg); 
            color:var(--text); 
            font-family: "Pretendard", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; 
            overflow-x: hidden;
        }
        
        h1{ margin:0 0 12px 0; font-size:24px; letter-spacing:.2px; display:flex; align-items:center; gap:12px; color: #fff; }
        
        /* 2-2. 유리 질감 상단 바 & 애니메이션 정의 */
        .topbarWrapper { 
            position: sticky; top: -22px; margin: -22px -22px 12px -22px; padding: 22px 22px 12px 22px; 
            background: rgba(11, 11, 12, 0.6); 
            backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass); 
            z-index: 100; border-bottom: 1px solid var(--line); 
        }
        .topbar{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
        
        input[type="text"]{ 
            padding:12px 16px; width:320px; max-width:100%; border-radius:14px; border:1px solid var(--line); 
            background: rgba(0,0,0,0.2); color:var(--text); font-size: 14px; transition: 0.2s;
        }
        input[type="text"]:focus{ border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        
        .btn{ 
            padding:10px 16px; border-radius:12px; border:1px solid var(--line); 
            background: rgba(255,255,255,0.03); color:var(--text); cursor:pointer; 
            font-size:13px; font-weight:700; white-space:nowrap; transition: 0.2s; 
        }
        .btn:hover{ border-color: var(--line2); background: rgba(255,255,255,0.06); }
        .btn.active{ border-color: var(--accent); background: rgba(255,71,87,0.1); color: var(--accent); }
        
        /* 1. <RF 업데이트> 버튼 스티키 & 고정 배치 */
        .admin-controls { margin-left: auto; display: flex; align-items: center; gap: 12px; }
        .stats{ font-size:13px; color: var(--muted); white-space:nowrap; }
        .update-btn { 
            background: rgba(255,71,87,0.15); border: 1px solid var(--accent); color: var(--accent); 
            padding: 10px 18px; text-decoration: none; border-radius: 12px; font-weight: 800; font-size: 13px; 
            transition: 0.2s; box-shadow: 0 4px 12px var(--accent-glow); 
        }
        .update-btn:hover { background: rgba(255,71,87,0.25); box-shadow: 0 6px 16px var(--accent-glow); transform: translateY(-1px); }

        .divider{ height:1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent); margin: 12px 0; }
        
        .filterTabs{ display:flex; flex-wrap:wrap; gap:8px; margin: 8px 0 10px 0; }
        .tab{ 
            padding:8px 12px; border-radius:10px; border:1px solid transparent; 
            background: transparent; color: var(--muted); font-size:13px; font-weight:700; cursor:pointer; 
            transition: 0.2s; 
        }
        .tab:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .tab.active{ border-color: var(--line2); background: rgba(255,255,255,0.08); color: #fff; }
        
        .filterPanel{ border:1px solid var(--line); background: rgba(0,0,0,0.1); border-radius:14px; padding:12px; }
        .chips{ display:flex; flex-wrap:wrap; gap:8px; }
        .chipsPanel{ display:none; }
        .chipsPanel.active{ display:flex; }
        
        /* 2-2. 칩 애니메이션 & 디자인 정의 */
        .chip{ 
            padding:7px 12px; border-radius:999px; border:1px solid var(--line); 
            background: rgba(255,255,255,0.03); color: var(--muted); cursor:pointer; 
            font-size:12px; font-weight: 600; white-space:nowrap; transition: all 0.3s ease; 
        }
        .chip:hover{ border-color: var(--line2); color: #fff; transform: translateY(-1px); }
        .chip.active{ border-color: var(--accent); background: rgba(255,71,87,0.1); color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
        .chip .count{ opacity:.6; margin-left:6px; font-size:11px; }

        .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:20px; margin-top: 14px; }
        
        /* 2-1. 카드 디자인 고도화 (Neon Border & Glow) */
        .card{ 
            background: var(--panel-bg); border:1px solid var(--line); border-radius: var(--radius); 
            overflow:hidden; box-shadow: var(--shadow); transition: all 0.3s ease; position:relative; 
        }
        .card:hover{ 
            transform: translateY(-5px) scale(1.01); 
            border-color: var(--accent); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 15px var(--accent-glow); 
        }
        
        .thumbWrap{ width:100%; background:#000; overflow:hidden; cursor:pointer; position: relative; aspect-ratio: 16/9; }
        .thumb{ width:100%; height:100%; object-fit:cover; display:block; transition: transform 0.5s ease; }
        .card:hover .thumb { transform: scale(1.08); }
        
        /* 카드 내 미니 태그 스타일 */
        .card-tags { padding: 0 14px; display: flex; flex-wrap: wrap; gap: 4px; margin-top: -8px; margin-bottom: 10px; }
        .mini-tag { font-size: 10px; color: var(--muted); background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; }

        .metaBox{ padding:14px; border-top:1px solid var(--line); }
        .metaLeft .channel{ font-size:14px; font-weight:800; color: #fff; margin:0 0 4px 0; }
        .metaLeft .titleLine{ font-size:13px; color: rgba(234,234,234,.8); line-height:1.5; margin:0 0 12px 0; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; height: 2.9em; }
        
        .actionsBar{ margin-top:12px; display:flex; gap:8px; align-items:center; }
        .actionBtn{ 
            border:1px solid var(--line); background: rgba(255,255,255,0.03); color: var(--muted); 
            padding:8px 14px; border-radius:999px; font-size:12px; font-weight:700; cursor:pointer; 
            display:inline-flex; align-items:center; gap:6px; transition: 0.2s; 
        }
        .actionBtn:hover { border-color: var(--line2); color: #fff; background: rgba(255,255,255,0.06); }
        .actionBtn.like.active{ border-color: var(--accent); background: rgba(255,71,87,0.15); color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        .actionBtn.like.active span { color: var(--accent); }

        .dash{ display:none; grid-template-columns: 320px 1fr; gap:16px; margin-top: 14px; align-items:start; }
        .dash.active{ display:grid; }
        .panel{ border:1px solid var(--line); background: var(--panel-bg); border-radius:16px; overflow:hidden; box-shadow: var(--shadow); height: calc(100vh - 260px); display: flex; flex-direction: column; }
        .panelHeader{ padding:14px 16px; border-bottom:1px solid var(--line); background: rgba(0,0,0,0.1); }
        .panelHeader .title{ font-size:14px; font-weight:800; color: #fff; }
       /* 1. 왼쪽 스크롤 패널 (부모) - 여기서 sticky 기준점이 잡힙니다 */
.leftScroll { 
    flex: 1; 
    overflow-y: auto; 
    padding: 12px; 
    /* 패널 안에서 장르 제목이 돌아다닐 수 있도록 상대 위치 설정 */
    position: relative; 
}

/* 2. 장르 그룹 박스 - overflow 설정을 완전히 끕니다 */
.genreGroup { 
    border: 1px solid var(--line); 
    border-radius: 14px; 
    margin-bottom: 8px; 
    background: rgba(0,0,0,0.1); 
    /* 중요: overflow가 hidden이면 sticky가 절대 안 됩니다 */
    overflow: visible !important; 
}

/* 3. 장르 헤더 (핵심) - 스크롤 시 패널 최상단에 붙음 */
.genreHead { 
    width: 100%; 
    border: 0; 
    /* 고정 시 뒤가 안 비치게 패널과 같은 배경색을 강제로 지정 */
    background: #0b0b0c !important; 
    color: #fff; 
    padding: 14px; 
    cursor: pointer; 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    gap: 10px; 
    font-size: 13px; 
    font-weight: 800; 
    transition: 0.2s;

    /* sticky 속성 강제 적용 */
    position: -webkit-sticky !important;
    position: sticky !important; 
    top: -12px !important; /* leftScroll의 padding-top 값만큼 조절 */
    z-index: 100 !important; /* 채널 리스트보다 무조건 위 */
    
    border-bottom: 1px solid var(--line);
    border-radius: 14px 14px 0 0;
}

/* 마우스 올렸을 때 */
.genreHead:hover { 
    background: #1a1a1c !important; 
}

/* 장르가 열려있을 때(활성화) */
.genreGroup.active { 
    border-color: var(--line2); 
}
.genreGroup.active .genreHead {
    color: var(--accent);
}

/* 채널 리스트 몸체 */
.genreBody { 
    padding: 8px 8px 12px 14px; 
    border-top: 1px solid var(--line); 
    display: none; 
}
.genreGroup.active .genreBody { 
    display: block; 
}
        
        /* 2-3. 채널 아이콘(자동 생성) 디자인 정의 */
        .channelItem { 
            width:100%; border:1px solid transparent; background: transparent; color: var(--muted); 
            padding:9px 12px; border-radius:10px; cursor:pointer; display:flex; align-items:center; gap:10px; 
            margin-bottom:4px; font-size:13px; font-weight:600; transition: 0.2s; 
        }
        .channelItem:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
        .channelItem.active { background: rgba(255, 71, 87, 0.1) !important; color: var(--accent) !important; font-weight: 800; }
        
        /* 채널 아이콘 원형 프레임 */
        .channel-icon { 
            width: 24px; height: 24px; border-radius: 50%; 
            background: linear-gradient(135deg, var(--accent), #4b6cb7); 
            display: flex; align-items: center; justify-content: center; 
            color: #fff; font-size: 11px; font-weight: 800; text-transform: uppercase; 
            border: 1px solid rgba(255,255,255,0.1);
        }
        .channelItem.active .channel-icon { box-shadow: 0 0 8px var(--accent-glow); border-color: var(--accent); }

        .rightWrap { flex: 1; overflow-y: auto; padding: 16px; }
        .list{ display:flex; flex-direction:column; gap:12px; }
        .row{ 
            display:grid; grid-template-columns: 160px 1fr; gap:14px; border:1px solid var(--line); 
            background: rgba(255,255,255,0.02); border-radius:12px; overflow:hidden; cursor:pointer; 
            transition: 0.2s; 
        }
        .row:hover { border-color: var(--line2); background: rgba(255,255,255,0.05); transform: translateX(2px); }
        .rowThumb{ width:100%; height:90px; background:#000; object-fit:cover; display:block; }
        .rowMeta{ padding:12px; display:flex; flex-direction:column; gap:6px; min-width:0; }

        .modalOverlay{ position:fixed; inset:0; background: rgba(0,0,0,.8); backdrop-filter: blur(8px); display:none; align-items:center; justify-content:center; padding:20px; z-index:9999; }
        .modalOverlay.open{ display:flex; }
        .modal { 
            width: min(1400px, 95vw); max-height: 90vh; overflow: hidden; border-radius: 20px; 
            border: 1px solid var(--line2); background: #161618; box-shadow: 0 30px 80px rgba(0,0,0,0.8); 
            display: grid; grid-template-columns: 350px 1fr; 
        }
        .modalLeft { border-right: 1px solid var(--line); padding: 24px; background: rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 18px; overflow-y: auto; }
        .modalThumb { width: 100%; height: auto; aspect-ratio: 16/9; object-fit: contain; background: #000; border-radius: 12px; border: 1px solid var(--line); }
        .modalRight { padding: 24px; display: flex; flex-direction: column; gap: 14px; min-height: 0; }
        .modalHead { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding-bottom: 8px; }

        .memoList{ border:1px solid var(--line); border-radius:12px; background: rgba(0,0,0,0.1); padding:14px; overflow:auto; flex:1; }
        .memoComposer{ display:grid; grid-template-columns: 120px 1fr auto; gap:10px; align-items:center; margin-top: 10px; }
        .memoComposer input{ width:100%; padding:12px; border-radius:10px; border:1px solid var(--line); background: rgba(0,0,0,0.2); color: #fff; font-size: 13px; }
        .primaryBtn{ padding:12px 20px; border-radius:10px; border:1px solid var(--accent); background: rgba(255,71,87,0.1); color: var(--accent); cursor:pointer; font-weight:800; font-size: 13px; transition: 0.2s; }
        .primaryBtn:hover { background: rgba(255,71,87,0.2); box-shadow: 0 0 10px var(--accent-glow); }

        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; padding: 14px 28px; border-radius: 999px; font-weight: 700; font-size: 14px; transition: 0.4s; z-index: 10000; box-shadow: 0 10px 30px var(--accent-glow); }
        #toast.show { bottom: 40px; }

        @media (max-width: 980px){ 
            .topbar input[type="text"] { width: 100%; }
            .admin-controls { width: 100%; justify-content: space-between; margin-top: 10px; }
            .dash.active{ grid-template-columns: 1fr; } 
            .panel { height: 50vh; }
            .modal{ grid-template-columns: 1fr; max-height: 95vh; overflow-y: auto; } 
            .modalLeft{ border-right:0; border-bottom:1px solid var(--line); } 
            .modal #mVideoPlayer { height: auto !important; aspect-ratio: 16/9 !important; }
        }

        @media (min-width: 981px) {
            .modal #mVideoPlayer { aspect-ratio: 16 / 9 !important; height: auto !important; width: 100% !important; max-height: 75vh; }
            .modal.shorts-mode { grid-template-columns: 420px 1fr !important; max-width: 1000px !important; height: 90vh !important; }
            .modal.shorts-mode #mVideoPlayer { aspect-ratio: auto !important; height: calc(85vh - 120px) !important; width: 100%; }
            .modal.shorts-mode .modalLeft { order: 1; border-right: 1px solid var(--line); }
            .modal.shorts-mode .modalRight { order: 2; background: #000; display: flex; align-items: center; justify-content: center; }
        }
   
    /* 1. 보기 모드 토글 버튼 디자인 복구 */
.viewToggle { 
    display: inline-flex; 
    border: 1px solid var(--line); 
    background: rgba(255, 255, 255, 0.03); 
    border-radius: 12px; 
    overflow: hidden; 
    padding: 3px;
    gap: 4px;
}
.viewToggle button { 
    border: 0; 
    background: transparent; 
    color: var(--muted); 
    padding: 8px 14px; 
    font-size: 13px; 
    font-weight: 700; 
    cursor: pointer; 
    font-family: inherit; 
    border-radius: 9px;
    transition: 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
}
.viewToggle button:hover {
    color: #fff;
    background: rgba(255, 255, 255, 0.05);
}
.viewToggle button.active { 
    background: var(--accent) !important; 
    color: #fff !important; 
    box-shadow: 0 4px 12px var(--accent-glow);
}

/* 2. 장르 그룹 및 상단 고정(Sticky) 헤더 스타일 */
.genreGroup { 
    border: 1px solid var(--line); 
    border-radius: 14px; 
    overflow: hidden; 
    margin-bottom: 8px; 
    background: rgba(0,0,0,0.1); 
}
.genreHead { 
    width: 100%; 
    border: 0; 
    background: #1a1a1c; 
    color: #fff; 
    padding: 12px 14px; 
    cursor: pointer; 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    gap: 10px; 
    font-size: 13px; 
    font-weight: 700; 
    transition: 0.2s;
    position: sticky; 
    top: 0; 
    z-index: 10; 
    border-bottom: 1px solid var(--line);
}
.genreHead:hover { 
    background: #252528; 
}
.genreBody { 
    padding: 4px 8px 12px 14px; 
    border-top: 1px solid var(--line); 
    display: none; 
}
.genreGroup.active { 
    border-color: var(--line2); 
    background: rgba(255, 255, 255, 0.03); 
}
.genreGroup.active .genreHead {
    color: var(--accent);
}
.genreGroup.active .genreBody { 
    display: block; 
}
    </style>
</head>
<body>
    <div id="toast">알림 메시지</div>

    <div class="topbarWrapper">
        <h1>🎬 Video Reference Archive</h1>
        <div class="topbar">
            <input id="search" type="text" placeholder="제목 검색..." />
            <div class="viewToggle">
                <button id="viewAllBtn" class="active">🟦 전체 보기</button>
                <button id="viewDashBtn">📺 채널별 보기</button>
            </div>
            <button class="btn" id="likedOnlyBtn">❤️ 좋아요</button>
            <button class="btn" id="sortLikesBtn">🔥 인기순</button>
            <button class="btn" id="resetBtn">초기화</button>
            
            <div class="admin-controls">
                <div class="stats" id="stats">표시: 0 / 전체: 0</div>
                <a href="https://docs.google.com/spreadsheets/d/1GgTfXN-iChTCdW3vHYFwQu2WSlwmgOm2-pHs2WIBBAY/edit" target="_blank" class="update-btn">📊 &lt;RF 업데이트&gt;</a>
            </div>
        </div>
        <div class="divider"></div>
        <div class="filterTabs" id="filterTabs">
            <button class="tab active" data-tab="genre">장르</button>
            <button class="tab" data-tab="media">매체</button>
            <button class="tab" data-tab="format">포맷</button>
            <button class="tab" data-tab="tag">TAG</button>
        </div>
        <div class="filterPanel">
            <div class="chips chipsPanel active" id="genreChips"></div>
            <div class="chips chipsPanel" id="mediaChips"></div>
            <div class="chips chipsPanel" id="formatChips"></div>
            <div class="chips chipsPanel" id="tagChips"></div>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="dash" id="dash">
        <div class="panel">
            <div class="panelHeader"><div class="title">장르 → 채널</div></div>
            <div class="leftScroll" id="leftNav"></div>
        </div>
        <div class="panel">
            <div class="panelHeader"><div class="title" id="rightTitle">채널 콘텐츠</div></div>
            <div class="rightWrap">
                <div class="list" id="rightList"></div>
            </div>
        </div>
    </div>

    <div class="modalOverlay" id="modalOverlay">
        <div class="modal">
            <div class="modalLeft">
                <img id="mThumb" class="modalThumb" alt="thumbnail"/>
                <div id="mTitle" style="font-weight:800; font-size:18px; color:#fff;"></div>
                <div id="mSub" style="font-size:13px; color:var(--muted);"></div>
                <div style="display:flex; flex-direction:column; gap:8px; margin-top: 10px;">
                    <div style="display:flex; gap:8px;">
                        <a class="update-btn mLink" id="mLink" target="_blank" style="flex:1; text-align:center; font-size:13px;">🔗 원본 열기</a>
                        <button class="actionBtn" id="mPipBtn" type="button" style="border-radius:12px; background:rgba(255,255,255,0.05);">📺 PIP 팝업</button>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="actionBtn" id="mCopyBtn" type="button" style="flex:1; border-radius:12px;">📋 링크 복사</button>
                        <button class="actionBtn" id="mShareBtn" type="button" style="flex:1; border-radius:12px; background:rgba(255,71,87,0.08); color:var(--accent);">🔗 공유 URL</button>
                    </div>
                </div>
                <div id="memoSectionPlaceholder"></div>
            </div>
            <div class="modalRight">
                <div class="modalHead">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span id="mCounts" style="font-size:13px; color:var(--muted);">👍 0 · 💬 0</span>
                        <button class="actionBtn like" id="mLikeBtn">👍 <span id="mLikeCnt" style="font-weight:800; color:var(--muted);">0</span></button>
                    </div>
                    <button class="xBtn" id="mClose" style="background:none; border:none; color:var(--muted); cursor:pointer; font-size: 20px; font-weight: 300;">✕</button>
                </div>
                <div id="mVideoPlayer" style="width:100%; background:#000; border-radius:14px; overflow:hidden; display:none;">
                    <iframe id="mIframe" width="100%" height="100%" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen style="border:0;"></iframe>
                </div>
                <div class="memoList" id="mList"></div>
                <div class="memoComposer">
                    <input id="mNick" type="text" placeholder="닉네임" />
                    <input id="mMemo" type="text" placeholder="메모 내용" />
                    <button class="primaryBtn" id="mSend">등록</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://opensheet.elk.sh/1GgTfXN-iChTCdW3vHYFwQu2WSlwmgOm2-pHs2WIBBAY/ARCHIVE";
        const API_URL = "https://script.google.com/macros/s/AKfycbzHucb9jQ128D4vvCnX1nzTzZaWDqK6gopqS45KoJRknGG_Zr5gSIB-lDxpe8MohZVRKg/exec";
        const KEY = { genre: "장르", channel: "채널명", title: "TITLE", media: "매체", url: "URL", format: "포맷", tag: "TAG", date: "발행일" };

        let allData = [], baseGenres = [], baseMedias = [], baseFormats = [], baseTags = [];
        let activeGenre = null, activeMedia = null, activeFormat = null, activeTags = new Set();
        let viewMode = "all", selectedChannel = null, showLikedOnly = false, sortMode = "date", renderLimit = 30;
        const RENDER_CHUNK = 30;
        const interactionsCache = new Map();
        const LS_NICK = "vra:nickname", LS_UID = "vra:userId", LS_LIKED = "vra:liked";

        const gridEl = document.getElementById("grid"), dashEl = document.getElementById("dash"), statsEl = document.getElementById("stats"), searchEl = document.getElementById("search"), resetBtn = document.getElementById("resetBtn"), viewAllBtn = document.getElementById("viewAllBtn"), viewDashBtn = document.getElementById("viewDashBtn"), genreChipsEl = document.getElementById("genreChips"), mediaChipsEl = document.getElementById("mediaChips"), formatChipsEl = document.getElementById("formatChips"), tagChipsEl = document.getElementById("tagChips"), leftNavEl = document.getElementById("leftNav"), rightTitleEl = document.getElementById("rightTitle"), rightListEl = document.getElementById("rightList"), modalOverlay = document.getElementById("modalOverlay"), mClose = document.getElementById("mClose"), mThumb = document.getElementById("mThumb"), mTitle = document.getElementById("mTitle"), mSub = document.getElementById("mSub"), mLink = document.getElementById("mLink"), mCopyBtn = document.getElementById("mCopyBtn"), mCounts = document.getElementById("mCounts"), mLikeBtn = document.getElementById("mLikeBtn"), mLikeCnt = document.getElementById("mLikeCnt"), mList = document.getElementById("mList"), mNick = document.getElementById("mNick"), mMemo = document.getElementById("mMemo"), mSend = document.getElementById("mSend"), mVideoPlayer = document.getElementById("mVideoPlayer"), mIframe = document.getElementById("mIframe"), mPipBtn = document.getElementById("mPipBtn"), mShareBtn = document.getElementById("mShareBtn");

        function escapeHTML(str) { return String(str || "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
        function splitTags(s) { return (s || "").split(/[ ,/]+/).filter(Boolean); }
        function fnv1a(str){ let h = 0x811c9dc5; for (let i=0; i<str.length; i++){ h ^= str.charCodeAt(i); h = (h + ((h<<1) + (h<<4) + (h<<7) + (h<<8) + (h<<24))) >>> 0; } return h.toString(16).padStart(8,"0"); }
        function getItemId(item){ return fnv1a((item[KEY.url] || "").trim()); }
        function getNickname(){ return localStorage.getItem(LS_NICK) || ""; }
        function setNickname(nick){ localStorage.setItem(LS_NICK, nick); }
        function getUserId() { let uid = localStorage.getItem(LS_UID); if (!uid) { uid = crypto.randomUUID(); localStorage.setItem(LS_UID, uid); } return uid; }
        function getLikedMap(){ try{ return JSON.parse(localStorage.getItem(LS_LIKED) || "{}"); }catch{ return {}; } }
        function isLiked(itemId){ return !!getLikedMap()[itemId]; }
        function setLikedState(itemId, liked){ const m = getLikedMap(); if (liked) m[itemId] = true; else delete m[itemId]; localStorage.setItem(LS_LIKED, JSON.stringify(m)); }
        function debounce(func, delay) { let timer; return function(...args) { clearTimeout(timer); timer = setTimeout(() => func.apply(this, args), delay); }; }
        function showToast(msg) { const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 3000); }
        function sortByDateDesc(data) { return [...data].sort((a, b) => new Date((b[KEY.date]||"").replace(/\./g,'-')) - new Date((a[KEY.date]||"").replace(/\./g,'-'))); }
        
        function getYoutubeID(url) {
            try {
                const u = new URL(url);
                if (u.pathname.includes("/shorts/")) return u.pathname.split("/shorts/")[1].split(/[?#]/)[0];
                if (u.hostname.includes("youtu.be")) return u.pathname.slice(1).split(/[?#]/)[0];
                return u.searchParams.get("v");
            } catch { return null; }
        }

        async function resolveThumbnail(item) { const ytId = getYoutubeID(item[KEY.url]); return ytId ? `https://img.youtube.com/vi/${ytId}/hqdefault.jpg` : "https://via.placeholder.com/400x225?text=No+Thumbnail"; }
        async function fetchInteractions(itemId){ if (interactionsCache.has(itemId)) return interactionsCache.get(itemId); try { const res = await fetch(API_URL + "?itemId=" + itemId); const data = await res.json(); const norm = { likes: data.likes || 0, memos: data.memos || [] }; interactionsCache.set(itemId, norm); return norm; } catch { return { likes: 0, memos: [] }; } }
        async function postInteraction(payload){ try { await fetch(API_URL, { method: "POST", mode: "cors", body: JSON.stringify(payload) }); } catch(e) {} }
        
        function updateCountersInDOM(itemId){ 
            const data = interactionsCache.get(itemId); 
            if (!data) return; 
            document.querySelectorAll("#like-" + itemId).forEach(el => el.textContent = data.likes); 
            document.querySelectorAll("#memo-" + itemId).forEach(el => el.textContent = data.memos.length); 
            if (modalOverlay.classList.contains("open") && modalOverlay.dataset.itemid === itemId){ 
                mLikeCnt.textContent = data.likes; 
                mCounts.textContent = `👍 ${data.likes} · 💬 ${data.memos.length}`; 
                mLikeBtn.classList.toggle("active", isLiked(itemId)); 
            } 
        }

        async function hydrateCountersFor(ids){ for (const id of [...new Set(ids)]) { await fetchInteractions(id); updateCountersInDOM(id); } }
        async function toggleLike(itemId){ 
            const wasLiked = isLiked(itemId); 
            setLikedState(itemId, !wasLiked); 
            updateCountersInDOM(itemId); // 즉시 반영
            await postInteraction({ itemId, action: "like", userId: getUserId(), nickname: getNickname() || "익명" }); 
            interactionsCache.delete(itemId); 
            await fetchInteractions(itemId); 
            updateCountersInDOM(itemId); 
        }

        function buildGenreChannelIndex(items){ const genreMap = new Map(); items.forEach(it => { const g = (it[KEY.genre] || "기타").trim(), c = (it[KEY.channel] || "미분류").trim(); if (!genreMap.has(g)) genreMap.set(g, new Map()); const cm = genreMap.get(g); cm.set(c, (cm.get(c) || 0) + 1); }); return [...genreMap.entries()].map(([g, cm]) => ({ g, total: [...cm.values()].reduce((a,b)=>a+b,0), channels: [...cm.entries()].map(([c, cnt]) => ({ c, cnt })).sort((a,b)=> a.c.localeCompare(b.c, "ko")) })).sort((a,b)=> b.total - a.total); }

        function renderChipGroup(container, labelAll, baseList, countMap, activeState, onPick, isMulti = false) { container.innerHTML = ""; const isAllActive = isMulti ? activeState.size === 0 : activeState === null; const allChip = document.createElement("div"); allChip.className = "chip" + (isAllActive ? " active" : ""); allChip.textContent = labelAll; allChip.onclick = () => onPick(null); container.appendChild(allChip); baseList.forEach(val => { const isActive = isMulti ? activeState.has(val) : activeState === val; const chip = document.createElement("div"); chip.className = "chip" + (isActive ? " active" : ""); chip.innerHTML = `${escapeHTML(val)} <span class="count">${countMap.get(val)||0}</span>`; chip.onclick = () => onPick(val); container.appendChild(chip); }); }
        
        function updateChipsUI(filtered) { const gMap = new Map(), mMap = new Map(), fMap = new Map(), tMap = new Map(); allData.forEach(it => { gMap.set(it[KEY.genre], (gMap.get(it[KEY.genre])||0)+1); mMap.set(it[KEY.media], (mMap.get(it[KEY.media])||0)+1); fMap.set(it[KEY.format], (fMap.get(it[KEY.format])||0)+1); }); filtered.forEach(it => splitTags(it[KEY.tag]).forEach(t => tMap.set(t, (tMap.get(t)||0)+1))); renderChipGroup(genreChipsEl, "All", baseGenres, gMap, activeGenre, (v) => { activeGenre = v; render(true); }); renderChipGroup(mediaChipsEl, "All", baseMedias, mMap, activeMedia, (v) => { activeMedia = v; render(true); }); renderChipGroup(formatChipsEl, "All", baseFormats, fMap, activeFormat, (v) => { activeFormat = v; render(true); }); renderChipGroup(tagChipsEl, "All", baseTags, tMap, activeTags, (v) => { if (v === null) activeTags.clear(); else activeTags.has(v) ? activeTags.delete(v) : activeTags.add(v); render(true); }, true); }

        // 2-3. 채널 아이콘 생성 도우미 함수
        function getChannelIcon(name) {
            const firstChar = name.trim().charAt(0).toUpperCase();
            // 장르/채널에 따른 고정 색상 해시 로직 (미구현, 기본 그라데이션 사용)
            return `<div class="channel-icon">${firstChar}</div>`;
        }

        function renderLeftNav() {
            leftNavEl.innerHTML = "";
            const index = buildGenreChannelIndex(allData);
            index.forEach((group, idx) => {
                const isGenreActive = group.channels.some(ch => ch.c === selectedChannel);
                const wrap = document.createElement("div");
                wrap.className = "genreGroup" + (isGenreActive ? " active" : "");
                const head = document.createElement("button");
                head.className = "genreHead";
                head.innerHTML = `<span>${escapeHTML(group.g)}</span><span style="font-size:11px; opacity:0.6;">${group.channels.length}ch</span>`;
                const body = document.createElement("div");
                body.className = "genreBody";
                body.style.display = (isGenreActive || idx < 2) ? "block" : "none";
                head.onclick = () => { wrap.classList.toggle("active"); const b = wrap.querySelector(".genreBody"); b.style.display = b.style.display === "none" ? "block" : "none"; };
                group.channels.forEach(({c, cnt}) => {
                    const b = document.createElement("button");
                    b.className = "channelItem" + (selectedChannel === c ? " active" : "");
                    // 2-3. 채널 아이콘 추가
                    b.innerHTML = `${getChannelIcon(c)}<span>${escapeHTML(c)}</span><span style="font-size:11px; opacity:0.5; margin-left:auto;">${cnt}</span>`;
                    b.onclick = () => { selectedChannel = c; render(true); renderLeftNav(); };
                    body.appendChild(b);
                });
                wrap.append(head, body);
                leftNavEl.appendChild(wrap);
            });
        }

        // 1. render 함수 내부의 정렬 로직 수정
async function render(resetPagination = false){
    if (resetPagination) renderLimit = RENDER_CHUNK;
    
    const filtered = allData.filter(item => {
        const q = searchEl.value.toLowerCase();
        const okSearch = q ? (item[KEY.title]||"").toLowerCase().includes(q) : true;
        const okGenre = activeGenre ? item[KEY.genre] === activeGenre : true;
        const okMedia = activeMedia ? item[KEY.media] === activeMedia : true;
        const okFormat = activeFormat ? item[KEY.format] === activeFormat : true;
        const okTag = activeTags.size === 0 ? true : [...activeTags].every(t => splitTags(item[KEY.tag]).includes(t));
        const okLiked = showLikedOnly ? isLiked(getItemId(item)) : true;
        return okSearch && okGenre && okMedia && okFormat && okTag && okLiked;
    });

    updateChipsUI(filtered);
    statsEl.textContent = `표시: ${filtered.length} / 전체: ${allData.length}`;

    if (viewMode === "all"){
        gridEl.style.display = "grid"; dashEl.style.display = "none";
        
        // --- 정렬 로직 시작 ---
        let list = [...filtered];
        if (sortMode === "likes") {
            list.sort((a,b)=> {
                const likesA = interactionsCache.get(getItemId(a))?.likes || 0;
                const likesB = interactionsCache.get(getItemId(b))?.likes || 0;
                return likesB - likesA;
            });
        } else if (sortMode === "date") {
            list = sortByDateDesc(list); // 발행일순 (기존 함수 활용)
        } else if (sortMode === "update") {
            // 시트의 가장 아래에 있는 데이터가 가장 최근 업데이트된 것이므로 역순 정렬
            list = [...filtered].reverse(); 
        }
        // --- 정렬 로직 끝 ---

        const sliced = list.slice(0, renderLimit);
        // ... (이하 렌더링 코드는 기존과 동일)
        gridEl.innerHTML = sliced.map(it => {
            const itemId = getItemId(it);
            const isLikedState = isLiked(itemId);
            const tagsHTML = splitTags(it[KEY.tag]).slice(0, 3).map(t => `<span class="mini-tag">#${escapeHTML(t)}</span>`).join("");
            return `
            <div class="card">
                <div class="thumbWrap" onclick='openModalById("${itemId}")'>
                    <img class="thumb" src="https://via.placeholder.com/400x225?text=Loading..." id="img-${itemId}">
                </div>
                <div class="metaBox">
                    <div class="metaLeft"><div class="channel">${escapeHTML(it[KEY.channel])}</div><div class="titleLine">${escapeHTML(it[KEY.title])}</div></div>
                    <div class="card-tags">${tagsHTML}</div>
                    <div class="actionsBar">
                        <button class="actionBtn like ${isLikedState?'active':''}" onclick="event.stopPropagation(); toggleLike('${itemId}')">👍 <span id="like-${itemId}" style="font-weight:800;">0</span></button>
                        <button class="actionBtn" onclick='openModalById("${itemId}")'>💬 <span id="memo-${itemId}" style="font-weight:800;">0</span></button>
                    </div>
                </div>
            </div>`;
        }).join("");
        sliced.forEach(async it => { const t = await resolveThumbnail(it); const img = document.getElementById(`img-${getItemId(it)}`); if(img) img.src = t; });
        hydrateCountersFor(sliced.map(getItemId));
    } else {
        // 채널별 보기(Dash) 모드에서도 동일한 정렬 적용 가능 (필요시)
        gridEl.style.display = "none"; dashEl.style.display = "grid";
        if (!selectedChannel) { rightTitleEl.textContent = "채널 선택"; rightListEl.innerHTML = ""; return; }
        rightTitleEl.textContent = selectedChannel;
        
        let list = filtered.filter(it => it[KEY.channel] === selectedChannel);
        if (sortMode === "date") list = sortByDateDesc(list);
        else if (sortMode === "update") list.reverse();

        rightListEl.innerHTML = list.map(it => {
            const itemId = getItemId(it);
            return `<div class="row" onclick='openModalById("${itemId}")'><img class="rowThumb" src="https://via.placeholder.com/160x90" id="rowimg-${itemId}"><div class="rowMeta"><strong>${escapeHTML(it[KEY.title])}</strong><div style="font-size:12px;">${it[KEY.date]}</div></div></div>`;
        }).join("");
        list.forEach(async it => { const t = await resolveThumbnail(it); const img = document.getElementById(`rowimg-${getItemId(it)}`); if(img) img.src = t; });
    }
}

// 2. 버튼 클릭 이벤트 리스너 수정
document.getElementById("sortLikesBtn").onclick = (e) => { 
    // date -> update -> likes 순서로 순환
    if (sortMode === "date") {
        sortMode = "update";
        e.target.textContent = "🆕 업데이트순";
        e.target.classList.add("active");
    } else if (sortMode === "update") {
        sortMode = "likes";
        e.target.textContent = "🔥 인기순";
        e.target.classList.add("active");
    } else {
        sortMode = "date";
        e.target.textContent = "📅 날짜순";
        e.target.classList.remove("active");
    }
    render(true); 
};
        function openModalById(id) {
            const item = allData.find(it => getItemId(it) === id);
            if (item) openModalForItem(item);
        }

        async function openModalForItem(item){
            const itemId = getItemId(item); 
            modalOverlay.dataset.itemid = itemId;
            mTitle.textContent = item[KEY.title]; 
            mSub.textContent = `${item[KEY.channel]} · ${item[KEY.date]}`;
            mLink.href = item[KEY.url]; 
            mThumb.src = await resolveThumbnail(item);
            mNick.value = getNickname();

            const url = item[KEY.url] || "";
            const ytId = getYoutubeID(url);
            const isInstagram = url.includes("instagram.com");
            const isShorts = url.includes("/shorts/");

            mIframe.src = ""; // Reset
            if(ytId) {
                mVideoPlayer.style.display = "block";
                mVideoPlayer.style.background = "#000";
                mIframe.src = `https://www.youtube.com/embed/${ytId}?autoplay=1`;
            } else if (isInstagram) {
                mVideoPlayer.style.display = "block";
                mVideoPlayer.style.background = "#1a1a1c";
                mVideoPlayer.innerHTML = `<div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#aaa; text-align:center; padding:20px;">
                    <div style="font-size:40px; margin-bottom:15px;">📸</div>
                    <p style="font-size:15px; line-height:1.5;">인스타그램은 보안 정책상 여기서 재생 불가</p>
                    <a href="${url}" target="_blank" style="margin-top:15px; color:#ff4757; text-decoration:underline; font-weight:700;">원본 보기</a>
                </div>`;
            } else {
                mVideoPlayer.style.display = "none";
            }

            const modalContainer = modalOverlay.querySelector('.modal');
            const memoSection = document.querySelector('.memoList');
            const memoComposer = document.querySelector('.memoComposer');
            const leftSection = document.querySelector('.modalLeft');
            const rightSection = document.querySelector('.modalRight');

            if (isShorts) {
                modalContainer.classList.add('shorts-mode');
                leftSection.appendChild(memoSection);
                leftSection.appendChild(memoComposer);
            } else {
                modalContainer.classList.remove('shorts-mode');
                rightSection.appendChild(memoSection);
                rightSection.appendChild(memoComposer);
            }

            modalOverlay.classList.add("open");
            const data = await fetchInteractions(itemId);
            mLikeCnt.textContent = data.likes; 
            mCounts.textContent = `👍 ${data.likes} · 💬 ${data.memos.length}`;
            mList.innerHTML = data.memos.map(m => `<div style="padding:10px; border-bottom:1px solid rgba(255,255,255,0.05); font-size:13px;"><strong style="color:#fff;">${escapeHTML(m.nickname)}</strong>: ${escapeHTML(m.memo)}</div>`).join("");
        }

        function closeModal() {
            modalOverlay.classList.remove("open");
            mIframe.src = "";
            mVideoPlayer.innerHTML = '<iframe id="mIframe" width="100%" height="100%" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen style="border:0;"></iframe>';
        }

        mClose.onclick = closeModal;
        modalOverlay.onclick = (e) => { if (e.target === modalOverlay) closeModal(); };

        mPipBtn.onclick = () => { const ytId = getYoutubeID(mLink.href); if (ytId) window.open(`https://www.youtube.com/embed/${ytId}?autoplay=1`, 'pip', 'width=560,height=315'); };
        mShareBtn.onclick = () => { const url = window.location.origin + window.location.pathname + "?id=" + modalOverlay.dataset.itemid; navigator.clipboard.writeText(url); showToast("공유 링크 복사됨!"); };
        mCopyBtn.onclick = () => { navigator.clipboard.writeText(mLink.href); showToast("원본 링크 복사됨!"); };
        
        mSend.onclick = async () => {
            const itemId = modalOverlay.dataset.itemid, nick = mNick.value.trim(), memo = mMemo.value.trim();
            if (!nick || !memo) return;
            setNickname(nick);
            await postInteraction({ itemId, action: "memo", nickname: nick, memo, userId: getUserId() });
            mMemo.value = "";
            interactionsCache.delete(itemId);
            // 모달 데이터 갱신
            const item = allData.find(it => getItemId(it) === itemId);
            if (item) openModalForItem(item);
        };

        async function init() {
            try {
                statsEl.textContent = "데이터 로딩 중...";
                const res = await fetch(SHEET_URL);
                allData = (await res.json()).filter(x => x && (x[KEY.url] || x[KEY.title]));
                
                baseGenres = [...new Set(allData.map(i => (i[KEY.genre]||"").trim()).filter(Boolean))].sort();
                baseMedias = [...new Set(allData.map(i => (i[KEY.media]||"").trim()).filter(Boolean))].sort();
                baseFormats = [...new Set(allData.map(i => (i[KEY.format]||"").trim()).filter(Boolean))].sort();
                // 태그 자동 추출 로직 (A|B,C 등 다양한 구분자 처리)
                baseTags = [...new Set(allData.flatMap(i => splitTags(i[KEY.tag])))].sort();
                
                renderLeftNav(); render(true);
                const params = new URLSearchParams(window.location.search);
                if(params.get('id')) openModalById(params.get('id'));
            } catch (e) { 
                console.error(e); 
                statsEl.textContent = "데이터 로드 실패";
                gridEl.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:50px; color:var(--accent);">데이터 로드 실패: 구글 시트 링크나 인터넷 연결을 확인하세요.</div>`;
            }
        }
        
        // Event Listeners
        searchEl.oninput = debounce(() => render(true), 300);
        viewAllBtn.onclick = () => { viewMode = "all"; viewAllBtn.classList.add("active"); viewDashBtn.classList.remove("active"); render(true); };
        viewDashBtn.onclick = () => { viewMode = "dash"; viewDashBtn.classList.add("active"); viewAllBtn.classList.remove("active"); render(true); };
        resetBtn.onclick = () => { activeGenre = activeMedia = activeFormat = null; activeTags.clear(); searchEl.value = ""; render(true); };
        
        // 좋아요만 필터링
        document.getElementById("likedOnlyBtn").onclick = (e) => { 
            showLikedOnly = !showLikedOnly; 
            e.target.classList.toggle("active", showLikedOnly); 
            render(true); 
        };
        // 좋아요순 정렬
        document.getElementById("sortLikesBtn").onclick = (e) => { 
            sortMode = (sortMode === "date") ? "likes" : "date";
            e.target.classList.toggle("active", sortMode === "likes");
            e.target.textContent = (sortMode === "likes") ? "🔥 인기순" : "📅 날짜순";
            render(true); 
        };

        document.querySelectorAll('.tab').forEach(t => t.onclick = (e) => {
            document.querySelectorAll('.tab, .chipsPanel').forEach(el => el.classList.remove('active'));
            e.target.classList.add('active');
            document.getElementById(e.target.dataset.tab + "Chips").classList.add('active');
        });

        window.addEventListener("scroll", () => {
            if (viewMode === "all" && (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                if (renderLimit < allData.length) { renderLimit += RENDER_CHUNK; render(false); }
            }
        });

        init();
    </script>
</body>
