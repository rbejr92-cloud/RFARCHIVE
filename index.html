<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Video Reference Archive</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root{ 
            --bg:#0b0b0c; 
            --panel-bg: rgba(20, 20, 22, 0.85);
            --text:#eaeaea; 
            --muted:rgba(234,234,234,.6); 
            --line:rgba(255,255,255,0.08); 
            --line2:rgba(255,255,255,0.15); 
            --accent:#ff4757; 
            --accent-glow: rgba(255, 71, 87, 0.3);
            --shadow: 0 14px 40px rgba(0,0,0,.5); 
            --radius:16px; 
            --glass: blur(16px) saturate(180%);
        }
        *{ box-sizing:border-box; outline: none; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
        body{ margin:0; padding:22px; background: radial-gradient(1200px 600px at 10% 0%, rgba(255,71,87,.08), transparent 55%), radial-gradient(1000px 600px at 90% 10%, rgba(43,143,163,.08), transparent 55%), var(--bg); color:var(--text); font-family: "Pretendard", sans-serif; overflow-x: hidden; }
        h1{ margin:0 0 12px 0; font-size:24px; letter-spacing:.2px; display:flex; align-items:center; gap:12px; color: #fff; }
        .topbarWrapper { position: sticky; top: -22px; margin: -22px -22px 12px -22px; padding: 22px 22px 12px 22px; background: rgba(11, 11, 12, 0.6); backdrop-filter: var(--glass); z-index: 100; border-bottom: 1px solid var(--line); }
        .topbar{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
        input[type="text"]{ padding:12px 16px; width:320px; max-width:100%; border-radius:14px; border:1px solid var(--line); background: rgba(0,0,0,0.2); color:var(--text); font-size: 14px; }
        .btn{ padding:10px 16px; border-radius:12px; border:1px solid var(--line); background: rgba(255,255,255,0.03); color:var(--text); cursor:pointer; font-size:13px; font-weight:700; transition: 0.2s; }
        .btn.active{ border-color: var(--accent); background: rgba(255,71,87,0.1); color: var(--accent); }
        .admin-controls { margin-left: auto; display: flex; align-items: center; gap: 12px; }
        .stats{ font-size:13px; color: var(--muted); }
        .filterTabs{ display:flex; flex-wrap:wrap; gap:8px; margin: 8px 0 10px 0; }
        .tab{ padding:8px 12px; border-radius:10px; background: transparent; color: var(--muted); font-size:13px; font-weight:700; cursor:pointer; }
        .tab.active{ border:1px solid var(--line2); background: rgba(255,255,255,0.08); color: #fff; }
        .filterPanel{ border:1px solid var(--line); background: rgba(0,0,0,0.1); border-radius:14px; padding:12px; }
        .chips{ display:flex; flex-wrap:wrap; gap:8px; }
        .chipsPanel{ display:none; }
        .chipsPanel.active{ display:flex; flex-wrap: wrap; }
        .chip{ padding:7px 12px; border-radius:999px; border:1px solid var(--line); background: rgba(255,255,255,0.03); color: var(--muted); cursor:pointer; font-size:12px; font-weight: 600; transition: all 0.3s ease; }
        .chip.active{ border-color: var(--accent); background: rgba(255,71,87,0.1); color: var(--accent); }
        .chip .count{ opacity:.6; margin-left:6px; font-size:11px; }
        .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:20px; margin-top: 14px; }
        .card{ background: var(--panel-bg); border:1px solid var(--line); border-radius: var(--radius); padding:14px; }
        .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
        .mini-tag { font-size: 10px; color: var(--muted); background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="topbarWrapper">
        <h1>🎬 Video Reference Archive</h1>
        <div class="topbar">
            <input id="search" type="text" placeholder="제목 검색..." />
            <button class="btn active" id="sortDateBtn">📅 발행일순</button>
            <button class="btn" id="resetBtn">초기화</button>
            <div class="admin-controls">
                <div class="stats" id="stats">표시: 0 / 전체: 0</div>
            </div>
        </div>
        <div class="filterTabs" id="filterTabs">
            <button class="tab active" data-tab="genre">장르</button>
            <button class="tab" data-tab="cast">출연자</button>
        </div>
        <div class="filterPanel">
            <div class="chips chipsPanel active" id="genreChips"></div>
            <div class="chips chipsPanel" id="castChips"></div>
        </div>
    </div>
    <div class="grid" id="grid"></div>

    <script>
    const SHEET_URL = "https://opensheet.elk.sh/1GgTfXN-iChTCdW3vHYFwQu2WSlwmgOm2-pHs2WIBBAY/ARCHIVE";
    const KEY = { genre: "장르", channel: "채널명", title: "TITLE", url: "URL", cast: "출연자", date: "발행일" };

    let allData = [], baseGenres = [], baseCasts = [];
    let activeGenre = new Set(), activeCast = new Set(), activeCastRole = "전체";
    const gridEl = document.getElementById("grid"), searchEl = document.getElementById("search"), genreChipsEl = document.getElementById("genreChips"), castChipsEl = document.getElementById("castChips");

    // 1. splitTags: 슬래시 제거 (콤마와 공백만 사용)
    function splitTags(s) { return (s || "").split(/[ ,]+/).filter(Boolean); }

    // 2. getRole: 직원 그룹핑 및 대분류 승격
    function getRole(tag) {
        const match = tag.match(/\(([^)]+)\)/);
        if (!match) return tag; // 괄호 없으면 태그 자체가 대분류
        const role = match[1];
        if (['개발자', '마케터', '사업'].includes(role)) return '직원'; // 그룹핑
        return role;
    }

    async function init() {
        const res = await fetch(SHEET_URL);
        allData = await res.json();
        baseGenres = [...new Set(allData.flatMap(i => splitTags(i[KEY.genre])))].sort();
        baseCasts = [...new Set(allData.flatMap(i => splitTags(i[KEY.cast])))].sort();
        render();
    }

    function render() {
        // 필터링 및 렌더링 로직 (약식)
        gridEl.innerHTML = allData.map(it => `<div class="card">${it[KEY.title]}</div>`).join("");
        
        // 칩 업데이트
        updateCastChips();
    }

    function updateCastChips() {
        castChipsEl.innerHTML = "";
        const roles = ["전체", ...new Set(baseCasts.map(getRole))];
        
        // 1. 대분류 필터 생성
        const roleRow = document.createElement("div"); roleRow.className = "chips";
        roles.forEach(role => {
            const btn = document.createElement("div");
            btn.className = "chip" + (activeCastRole === role ? " active" : "");
            btn.textContent = role;
            btn.onclick = () => { activeCastRole = role; updateCastChips(); };
            roleRow.appendChild(btn);
        });
        castChipsEl.appendChild(roleRow);

        // 2. 출연자 리스트 생성
        const filteredCasts = activeCastRole === "전체" ? baseCasts : baseCasts.filter(c => getRole(c) === activeCastRole);
        filteredCasts.forEach(val => {
            const chip = document.createElement("div");
            chip.className = "chip";
            chip.textContent = val;
            castChipsEl.appendChild(chip);
        });
    }

    document.querySelectorAll('.tab').forEach(t => t.onclick = (e) => {
        document.querySelectorAll('.tab, .chipsPanel').forEach(el => el.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById(e.target.dataset.tab + "Chips").classList.add('active');
    });

    init();
    </script>
</body>
</html>
