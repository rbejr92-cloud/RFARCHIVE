<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Reference Archive</title>

  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <style>
    :root{
      --bg:#0f0f10;
      --text:#eaeaea;
      --muted:rgba(234,234,234,.7);
      --line:#26262a;
      --line2:#2f2f35;
      --accent:#ff4757;
      --shadow: 0 14px 40px rgba(0,0,0,.35);
      --radius:16px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      padding:22px;
      background:
        radial-gradient(1200px 600px at 10% 0%, rgba(255,71,87,.08), transparent 55%),
        radial-gradient(1000px 600px at 90% 10%, rgba(43,143,163,.08), transparent 55%),
        var(--bg);
      color:var(--text);
      font-family: "Pretendard", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    h1{
      margin:0 0 12px 0;
      font-size:24px;
      letter-spacing:.2px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .topbarWrapper {
      position: sticky;
      top: -22px;
      margin: -22px -22px 12px -22px;
      padding: 22px 22px 12px 22px;
      background: rgba(15, 15, 16, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .topbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }

    input[type="text"]{
      padding:10px 12px;
      width:320px;
      max-width:100%;
      border-radius:14px;
      border:1px solid var(--line);
      background: rgba(20,20,22,.7);
      color:var(--text);
      outline:none;
      font-family: inherit;
    }
    input[type="text"]::placeholder{ color: rgba(234,234,234,.45); }

    .btn{
      padding:10px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background: rgba(20,20,22,.7);
      color:var(--text);
      cursor:pointer;
      font-size:13px;
      white-space:nowrap;
      font-weight:700;
      font-family: inherit;
    }
    .btn:hover{ border-color: var(--line2); }
    .btn.active{
      border-color: rgba(255,71,87,.65);
      box-shadow: 0 0 0 3px rgba(255,71,87,.12);
    }

    .stats{
      font-size:13px;
      color: var(--muted);
      margin-left:auto;
      white-space:nowrap;
    }

    .divider{
      height:1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent);
      margin: 12px 0;
    }

    .viewToggle{
      display:inline-flex;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(20,20,22,.55);
      border-radius:999px;
      overflow:hidden;
    }
    .viewToggle button{
      border:0;
      background: transparent;
      color: rgba(234,234,234,.78);
      padding:9px 12px;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:6px;
      font-family: inherit;
    }
    .viewToggle button.active{
      background: rgba(255,71,87,.14);
      color: rgba(234,234,234,.95);
    }

    .filterTabs{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin: 8px 0 10px 0;
    }
    .tab{
      padding:8px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(20,20,22,.55);
      color: rgba(234,234,234,.88);
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      line-height:1;
      white-space:nowrap;
      font-family: inherit;
    }
    .tab:hover{ border-color: rgba(255,255,255,.18); }
    .tab.active{
      border-color: rgba(255,71,87,.65);
      box-shadow: 0 0 0 3px rgba(255,71,87,.12);
      background: rgba(20,20,22,.75);
    }
    .filterPanel{
      border:1px solid rgba(255,255,255,.08);
      background: rgba(20,20,22,.35);
      border-radius:14px;
      padding:10px;
    }
    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .chipsPanel{ display:none; }
    .chipsPanel.active{ display:flex; }
    .chip{
      padding:7px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background: rgba(23,23,26,.8);
      cursor:pointer;
      user-select:none;
      font-size:13px;
      color: rgba(234,234,234,.9);
      white-space:nowrap;
      transition: all 0.2s ease;
    }
    .chip:hover{ border-color: var(--line2); }
    .chip.active{
      border-color: rgba(255,71,87,.7);
      background: rgba(255,71,87,.1);
      box-shadow: 0 0 0 3px rgba(255,71,87,.12);
    }
    .chip .count{
      opacity:.55;
      margin-left:6px;
      font-size:12px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap:16px;
      margin-top: 14px;
    }
    
    .skeleton-card {
      background: rgba(20,20,22,.5);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: var(--radius);
      height: 340px;
      animation: pulse 1.5s infinite ease-in-out;
    }
    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }

    .card{
      background: rgba(20,20,22,.92);
      border:1px solid var(--line);
      border-radius: var(--radius);
      overflow:hidden;
      box-shadow: var(--shadow);
      transition: transform .2s ease, border-color .2s ease;
      position:relative;
    }
    .card:hover{
      transform: translateY(-4px);
      border-color: rgba(255,255,255,.16);
    }
    a.cleanLink{
      color:inherit;
      text-decoration:none;
      display:block;
    }
    .thumbWrap{
      width:100%;
      background:#0b0b0c;
      overflow:hidden;
    }
    
    .thumb{
      width:100%;
      height:220px;
      object-fit:contain;
      display:block;
      background:#0b0b0c;
      transition: transform 0.3s ease;
    }
    .card:hover .thumb {
      transform: scale(1.05);
    }

    .metaBox{
      padding:14px 14px 15px;
      border-top:1px solid rgba(255,255,255,.06);
    }
    .metaTopRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .metaDate{
      font-size:12px;
      color: rgba(234,234,234,.70);
      white-space:nowrap;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:12px;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      color: rgba(234,234,234,.85);
      white-space:nowrap;
      font-weight:600;
    }
    .metaLeft .channel{
      font-size:15px;
      font-weight:700;
      line-height:1.25;
      margin:0 0 6px 0;
    }
    .metaLeft .titleLine{
      font-size:13.5px;
      color: rgba(234,234,234,.86);
      line-height:1.45;
      margin:0 0 10px 0;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
    .metaTagLine{
      margin-top:0;
      font-size:13px;
      color: rgba(234,234,234,.70);
      line-height:1.45;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
      word-break:break-word;
    }
    .metaPills{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-top:12px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:12px;
      padding:5px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      color: rgba(234,234,234,.86);
      white-space:nowrap;
    }
    .pill .k{ color: rgba(234,234,234,.55); font-weight:600; }
    .pill .v{ color: rgba(234,234,234,.92); font-weight:600; }

    .actionsBar{
      margin-top:10px;
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:flex-start;
    }
    .actionBtn{
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      color: rgba(234,234,234,.9);
      padding:7px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:600;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:8px;
      line-height:1;
      user-select:none;
      font-family: inherit;
      transition: all 0.2s ease;
    }
    .actionBtn:hover{ border-color: rgba(255,255,255,.25); background: rgba(255,255,255,.12); }
    .actionBtn.like.active{
      border-color: rgba(255,71,87,.65);
      background: rgba(255,71,87,.15);
      box-shadow: 0 0 0 3px rgba(255,71,87,.10);
    }
    .actionBtn .cnt{ opacity:.75; font-weight:700; font-size:12px; }

    .dash{
      display:none;
      grid-template-columns: 320px 1fr;
      gap:14px;
      margin-top: 14px;
      align-items:start;
    }
    .dash.active{ display:grid; }
    .panel{
      border:1px solid rgba(255,255,255,.08);
      background: rgba(20,20,22,.40);
      border-radius:16px;
      overflow:hidden;
      box-shadow: var(--shadow);
    }
    .panelHeader{
      padding:12px 12px;
      border-bottom:1px solid rgba(255,255,255,.06);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background: rgba(20,20,22,.55);
    }
    .panelHeader .title{ font-size:13px; font-weight:700; color: rgba(234,234,234,.9); }
    .panelHeader .hint{ font-size:12px; color: rgba(234,234,234,.55); white-space:nowrap; }
    .leftScroll{ max-height: calc(100vh - 320px); overflow:auto; padding:10px; }
    .genreGroup{
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;
      overflow:hidden;
      margin-bottom:10px;
      background: rgba(20,20,22,.35);
    }
    .genreHead{
      width:100%; border:0; background: rgba(20,20,22,.55);
      color: rgba(234,234,234,.92); padding:10px 10px; cursor:pointer;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      font-size:13px; font-weight:700; font-family: inherit;
    }
    .genreHead .meta{
      display:flex; gap:8px; align-items:center; color: rgba(234,234,234,.65); font-weight:600; font-size:12px;
    }
    .genreBody{ padding:8px; display:none; }
    .genreBody.open{ display:block; }
    .channelItem{
      width:100%; border:1px solid rgba(255,255,255,.08); background: rgba(20,20,22,.55);
      color: rgba(234,234,234,.88); padding:9px 10px; border-radius:12px; cursor:pointer;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      margin-bottom:6px; font-size:13px; font-weight:600; font-family: inherit;
    }
    .channelItem:hover{ border-color: rgba(255,255,255,.14); }
    .channelItem.active{
      border-color: rgba(255,71,87,.70); box-shadow: 0 0 0 3px rgba(255,71,87,.12);
      background: rgba(255,71,87,.08);
    }
    .channelItem .count{ font-size:12px; color: rgba(234,234,234,.55); font-weight:700; white-space:nowrap; }
    .rightWrap{ padding: 10px; }
    .list{ display:flex; flex-direction:column; gap:10px; }
    .row{
      display:grid; grid-template-columns: 160px 1fr; gap:12px;
      border:1px solid rgba(255,255,255,.08); background: rgba(20,20,22,.55);
      border-radius:16px; overflow:hidden; position:relative;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .row:hover { transform: translateX(4px); border-color: rgba(255,255,255,0.16); }
    .rowThumb{ width:100%; height:96px; background:#0b0b0c; object-fit:cover; display:block; }
    .rowMeta{ padding:10px 12px; display:flex; flex-direction:column; gap:6px; min-width:0; }
    .rowTop{ display:flex; align-items:center; justify-content:space-between; gap:10px; min-width:0; }
    .rowTitle{ font-size:14px; font-weight:700; color: rgba(234,234,234,.95); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
    .rowSub{ font-size:13px; color: rgba(234,234,234,.78); line-height:1.35; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .rowTags{ font-size:12px; color: rgba(234,234,234,.62); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .rowPills{ display:flex; gap:6px; flex-wrap:wrap; margin-top:2px; align-items:center; justify-content:space-between; }
    .rowActions{ display:flex; gap:8px; align-items:center; justify-content:flex-end; margin-left:auto; }

    .mutebox{ padding:18px 12px; font-size:14px; color: rgba(234,234,234,.72); text-align:center; }

    .modalOverlay{
      position:fixed; inset:0; background: rgba(0,0,0,.75); backdrop-filter: blur(4px);
      display:none; align-items:center; justify-content:center; padding:18px; z-index:9999;
    }
    .modalOverlay.open{ display:flex; }
    .modal{
      width:min(920px, 100%); max-height: min(86vh, 720px); overflow:hidden;
      border-radius:20px; border:1px solid rgba(255,255,255,.10); background: rgba(20,20,22,.96);
      box-shadow: 0 30px 80px rgba(0,0,0,.65); display:grid; grid-template-columns: 320px 1fr;
    }
    .modalLeft{
      border-right:1px solid rgba(255,255,255,.06); padding:16px; background: rgba(16,16,18,.55);
      display:flex; flex-direction:column; gap:12px;
    }
    .modalThumb{
      width:100%; height:180px; object-fit:contain; background:#0b0b0c;
      border-radius:14px; border:1px solid rgba(255,255,255,.06);
    }
    .modalLeft .mTitle{ font-size:14px; font-weight:700; color: rgba(234,234,234,.9); line-height:1.4; max-height: 4.2em; overflow:hidden; }
    .modalLeft .mSub{ font-size:13px; color: rgba(234,234,234,.65); display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .modalLeft .mLink{
      font-size:13px; color: rgba(234,234,234,.95); text-decoration:none; border:1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.08); padding:10px 12px; border-radius:12px; display:inline-flex;
      justify-content:center; align-items:center; gap:6px; transition: all 0.2s; font-weight: 600;
    }
    .modalLeft .mLink:hover{ border-color: rgba(255,255,255,.25); background: rgba(255,255,255,.12); }

    .modalRight{ padding:16px; display:flex; flex-direction:column; gap:12px; min-height:0; }
    .modalHead{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .modalHead .h{ font-size:14px; font-weight:700; color: rgba(234,234,234,.92); display:flex; gap:10px; align-items:center; }
    .xBtn{
      border:1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.04); color: rgba(234,234,234,.92);
      border-radius:12px; padding:8px 12px; cursor:pointer; font-weight:700; font-size:13px; font-family: inherit;
    }
    .xBtn:hover{ border-color: rgba(255,255,255,.2); background: rgba(255,255,255,.1); }

    .memoList{
      border:1px solid rgba(255,255,255,.08); border-radius:14px; background: rgba(255,255,255,.02);
      padding:12px; overflow:auto; min-height:0; flex:1;
    }
    .memoItem{
      padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,.06);
      background: rgba(20,20,22,.60); margin-bottom:10px;
    }
    .memoTop{ display:flex; gap:10px; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .memoNick{ font-size:13px; font-weight:700; color: rgba(234,234,234,.95); }
    .memoTs{ font-size:12px; color: rgba(234,234,234,.55); white-space:nowrap; }
    .memoText{ font-size:13px; color: rgba(234,234,234,.85); line-height:1.5; white-space:pre-wrap; word-break:break-word; }
    .memoComposer{ display:grid; grid-template-columns: 140px 1fr auto; gap:10px; align-items:center; }
    .memoComposer input{
      width:100%; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,.12);
      background: rgba(20,20,22,.65); color: rgba(234,234,234,.95); outline:none; font-size:13px; font-family: inherit;
    }
    .primaryBtn{
      padding:12px 16px; border-radius:12px; border:1px solid rgba(255,71,87,.55);
      background: rgba(255,71,87,.20); color: rgba(234,234,234,.95); cursor:pointer; font-weight:700; font-size:13px; white-space:nowrap; font-family: inherit; transition: all 0.2s;
    }

    #toast {
      position: fixed;
      bottom: -100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 71, 87, 0.95);
      backdrop-filter: blur(8px);
      color: #fff;
      padding: 12px 24px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
      transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 10000;
      pointer-events: none;
    }
    #toast.show { bottom: 40px; }

    #fab {
      position: fixed;
      bottom: 40px;
      right: 30px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(30, 30, 34, 0.85);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 9000;
      backdrop-filter: blur(8px);
    }
    #fab.visible { opacity: 1; pointer-events: auto; }

    @media (max-width: 980px){
      .dash.active{ grid-template-columns: 1fr; }
      .row{ grid-template-columns: 140px 1fr; }
      .modal{ grid-template-columns: 1fr; }
      .modalLeft{ border-right:0; border-bottom:1px solid rgba(255,255,255,.06); }
      .memoComposer{ grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div id="toast">알림 메시지</div>
  <div id="fab" title="맨 위로 가기">⬆️</div>

  <div class="topbarWrapper">
    <h1>🎬 Video Reference Archive</h1>

    <div class="topbar">
      <input id="search" type="text" placeholder="제목 검색..." />

      <div class="viewToggle" role="tablist" aria-label="View Mode">
        <button id="viewAllBtn" class="active" type="button">🟦 전체</button>
        <button id="viewDashBtn" type="button">📺 채널별</button>
      </div>

      <button class="btn" id="likedOnlyBtn">❤️ 좋아요만</button>
      <button class="btn" id="sortLikesBtn">🔥 좋아요순</button>
      <button class="btn" id="adminBtn">🛠 관리자</button>
      <button class="btn" id="resetBtn">초기화</button>

      <div class="stats" id="stats">표시: 0 / 전체: 0</div>
    </div>

    <div class="divider"></div>

    <div class="filterTabs" id="filterTabs">
      <button class="tab active" data-tab="genre">장르</button>
      <button class="tab" data-tab="media">매체</button>
      <button class="tab" data-tab="format">포맷</button>
      <button class="tab" data-tab="tag">TAG (다중선택)</button>
    </div>

    <div class="filterPanel">
      <div class="chips chipsPanel active" id="genreChips"></div>
      <div class="chips chipsPanel" id="mediaChips"></div>
      <div class="chips chipsPanel" id="formatChips"></div>
      <div class="chips chipsPanel" id="tagChips"></div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="dash" id="dash">
    <div class="panel">
      <div class="panelHeader">
        <div class="title">장르 → 채널</div>
        <div class="hint" id="leftHint">채널 선택</div>
      </div>
      <div class="leftScroll" id="leftNav"></div>
    </div>

    <div class="panel">
      <div class="panelHeader">
        <div class="title" id="rightTitle">채널 콘텐츠</div>
        <div class="hint" id="rightHint">최신순</div>
      </div>
      <div class="rightWrap">
        <div class="list" id="rightList"></div>
        <div class="mutebox" id="rightEmpty" style="display:none;"></div>
      </div>
    </div>
  </div>

  <div class="modalOverlay" id="modalOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modalLeft">
        <img id="mThumb" class="modalThumb" alt="thumbnail"/>
        <div class="mTitle" id="mTitle"></div>
        <div class="mSub" id="mSub"></div>
       <div style="display:flex; flex-direction:column; gap:8px;">
  <div style="display:flex; gap:8px;">
    <a class="mLink" id="mLink" target="_blank" rel="noopener noreferrer" style="flex:1;">🔗 원본 열기</a>
    <button class="actionBtn" id="mPipBtn" type="button" style="border-radius:12px;">📺 PIP 팝업</button>
  </div>
  <div style="display:flex; gap:8px;">
    <button class="actionBtn" id="mCopyBtn" type="button" style="flex:1; border-radius:12px;">📋 링크 복사</button>
    <button class="actionBtn" id="mShareBtn" type="button" style="flex:1; border-radius:12px; background:rgba(255,71,87,0.1); border-color:rgba(255,71,87,0.3);">🔗 공유 URL 생성</button>
  </div>
</div>

<div class="modalRight">
  <div class="modalHead">
    <div class="modalHeadLeft h">
      <span id="mCounts">👍 0 · 💬 0</span>
      <button class="actionBtn like" id="mLikeBtn" type="button">👍 <span class="cnt" id="mLikeCnt">0</span></button>
    </div>
    <button class="xBtn" id="mClose" type="button">닫기 ✕</button>
  </div>

  <div id="mVideoPlayer" style="width:100%; aspect-ratio:16/9; background:#000; border-radius:12px; overflow:hidden; margin-bottom:10px; display:none;">
    <iframe id="mIframe" width="100%" height="100%" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
  </div>

  <div class="memoList" id="mList"></div>
  
  <div class="memoComposer">
    <input id="mNick" type="text" placeholder="닉네임 (필수)" maxlength="24"/>
    <input id="mMemo" type="text" placeholder="메모 (최대 200자)" maxlength="200"/>
    <button class="primaryBtn" id="mSend" type="button">등록</button>
  </div>
</div>

  <script>
    // ===== DATA SOURCES =====
    const SHEET_URL = "https://opensheet.elk.sh/1GgTfXN-iChTCdW3vHYFwQu2WSlwmgOm2-pHs2WIBBAY/ARCHIVE";
    const API_URL = "https://script.google.com/macros/s/AKfycbzHucb9jQ128D4vvCnX1nzTzZaWDqK6gopqS45KoJRknGG_Zr5gSIB-lDxpe8MohZVRKg/exec";

    const KEY = {
      genre: "장르", channel: "채널명", title: "TITLE", media: "매체",
      url: "URL", format: "포맷", tag: "TAG", date: "발행일",
      thumbCandidates: ["thumb", "THUMB", "썸네일"]
    };

    // ===== STATE =====
    let allData = [];
    let baseGenres = [], baseMedias = [], baseFormats = [], baseTags = [];
    let activeGenre = null, activeMedia = null, activeFormat = null, activeTags = new Set(); 
    let viewMode = "all", selectedChannel = null;
    let showLikedOnly = false, sortMode = "date", renderLimit = 300;
    const RENDER_CHUNK = 30;

    const thumbCache = new Map(), interactionsCache = new Map(), inFlight = new Map();
    const LS_NICK = "vra:nickname", LS_UID = "vra:userId", LS_LIKED = "vra:liked";

    // ===== DOM =====
    const gridEl = document.getElementById("grid"), dashEl = document.getElementById("dash"), statsEl = document.getElementById("stats");
    const searchEl = document.getElementById("search"), resetBtn = document.getElementById("resetBtn");
    const viewAllBtn = document.getElementById("viewAllBtn"), viewDashBtn = document.getElementById("viewDashBtn");
    const likedOnlyBtn = document.getElementById("likedOnlyBtn"), sortLikesBtn = document.getElementById("sortLikesBtn");
    const genreChipsEl = document.getElementById("genreChips"), mediaChipsEl = document.getElementById("mediaChips"), formatChipsEl = document.getElementById("formatChips"), tagChipsEl = document.getElementById("tagChips");
    const leftNavEl = document.getElementById("leftNav"), leftHintEl = document.getElementById("leftHint");
    const rightTitleEl = document.getElementById("rightTitle"), rightListEl = document.getElementById("rightList"), rightEmptyEl = document.getElementById("rightEmpty");
    const modalOverlay = document.getElementById("modalOverlay"), mClose = document.getElementById("mClose"), mThumb = document.getElementById("mThumb"), mTitle = document.getElementById("mTitle"), mSub = document.getElementById("mSub"), mLink = document.getElementById("mLink"), mCopyBtn = document.getElementById("mCopyBtn"), mCounts = document.getElementById("mCounts"), mLikeBtn = document.getElementById("mLikeBtn"), mLikeCnt = document.getElementById("mLikeCnt"), mList = document.getElementById("mList"), mNick = document.getElementById("mNick"), mMemo = document.getElementById("mMemo"), mSend = document.getElementById("mSend");
    const fab = document.getElementById("fab");

    // ===== UTIL =====
    function escapeHTML(str) { return String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
    function splitTags(s) { return (s || "").replaceAll("，", ",").replaceAll(" / ", ",").replaceAll("/", ",").trim().split(",").map(t => t.trim()).filter(Boolean); }
    function fnv1a(str){ let h = 0x811c9dc5; for (let i=0; i<str.length; i++){ h ^= str.charCodeAt(i); h = (h + ((h<<1) + (h<<4) + (h<<7) + (h<<8) + (h<<24))) >>> 0; } return h.toString(16).padStart(8,"0"); }
    function getItemId(item){ return fnv1a((item[KEY.url] || "").trim()); }
    function getNickname(){ return (localStorage.getItem(LS_NICK) || "").trim(); }
    function setNickname(nick){ localStorage.setItem(LS_NICK, (nick || "").trim()); }
    function getUserId() { let uid = localStorage.getItem(LS_UID); if (!uid) { uid = (crypto?.randomUUID?.() || (Date.now() + "-" + Math.random().toString(16).slice(2))); localStorage.setItem(LS_UID, uid); } return uid; }
    function getLikedMap(){ try{ return JSON.parse(localStorage.getItem(LS_LIKED) || "{}"); }catch{ return {}; } }
    function isLiked(itemId){ return !!getLikedMap()[itemId]; }
    function setLikedState(itemId, liked){ const m = getLikedMap(); if (liked) m[itemId] = true; else delete m[itemId]; localStorage.setItem(LS_LIKED, JSON.stringify(m)); }
    function debounce(func, delay) { let timer; return function(...args) { clearTimeout(timer); timer = setTimeout(() => func.apply(this, args), delay); }; }
    function showToast(msg) { const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 3000); }
    function sortByDateDesc(data) { return [...data].sort((a, b) => { const da = new Date((a[KEY.date]||"").replaceAll(".","-")), db = new Date((b[KEY.date]||"").replaceAll(".","-")); return (isNaN(db.getTime()) ? 0 : db.getTime()) - (isNaN(da.getTime()) ? 0 : da.getTime()); }); }

    // ===== THUMBNAIL LOGIC =====
    function getYoutubeID(url) { try { const u = new URL(url); if (u.hostname.includes("youtu.be")) return u.pathname.replace("/", "").slice(0, 11); if (u.searchParams.get("v")) return u.searchParams.get("v").slice(0, 11); return null; } catch { return null; } }
    async function resolveThumbnail(item) {
      const url = (item[KEY.url] || "").trim();
      const sheetThumb = KEY.thumbCandidates.map(k => item[k]).find(v => v && String(v).trim());
      if (sheetThumb) return sheetThumb;
      const ytId = getYoutubeID(url);
      return ytId ? `https://img.youtube.com/vi/${ytId}/hqdefault.jpg` : "https://via.placeholder.com/400x225?text=No+Thumbnail";
    }

    // ===== INTERACTION API =====
    async function fetchInteractions(itemId){
      if (interactionsCache.has(itemId)) return interactionsCache.get(itemId);
      const url = API_URL + "?itemId=" + encodeURIComponent(itemId) + "&t=" + Date.now();
      try {
        const res = await fetch(url, { mode:"cors" });
        const data = await res.json();
        const norm = { likes: Number(data.likes || 0), memos: Array.isArray(data.memos) ? data.memos : [] };
        interactionsCache.set(itemId, norm);
        return norm;
      } catch { return { likes: 0, memos: [] }; }
    }
    async function postInteraction(payload){ await fetch(API_URL, { method: "POST", mode: "cors", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) }); }
    function updateCountersInDOM(itemId){
      const data = interactionsCache.get(itemId); if (!data) return;
      document.querySelectorAll("#like-" + CSS.escape(itemId)).forEach(el => el.textContent = String(data.likes));
      document.querySelectorAll("#memo-" + CSS.escape(itemId)).forEach(el => el.textContent = String(data.memos.length));
      if (modalOverlay.classList.contains("open") && modalOverlay.dataset.itemid === itemId){
        mLikeCnt.textContent = String(data.likes);
        mCounts.textContent = `👍 ${data.likes} · 💬 ${data.memos.length}`;
        mLikeBtn.classList.toggle("active", isLiked(itemId));
      }
    }
    async function hydrateCountersFor(ids){
      for (const id of [...new Set(ids)]) {
        await fetchInteractions(id);
        updateCountersInDOM(id);
      }
    }

    // ===== INDEXING & FILTERING =====
    function buildGenreChannelIndex(items){
      const genreMap = new Map();
      items.forEach(it => {
        const g = (it[KEY.genre] || "기타").trim(), c = (it[KEY.channel] || "미분류").trim();
        if (!genreMap.has(g)) genreMap.set(g, new Map());
        const cm = genreMap.get(g); cm.set(c, (cm.get(c) || 0) + 1);
      });
      return [...genreMap.entries()].map(([g, cm]) => ({
        g, total: [...cm.values()].reduce((a,b)=>a+b,0),
        // 🔥 정렬: 채널명 가나다순
        channels: [...cm.entries()].map(([c, cnt]) => ({ c, cnt })).sort((a,b)=> a.c.localeCompare(b.c, "ko"))
      })).sort((a,b)=> b.total - a.total);
    }

    function matchesFilter(item) {
      const q = searchEl.value.toLowerCase().trim();
      const title = (item[KEY.title] || "").toLowerCase(), genre = (item[KEY.genre] || "").trim(), media = (item[KEY.media] || "").trim(), format = (item[KEY.format] || "").trim(), tags = splitTags(item[KEY.tag]);
      const okSearch = q ? title.includes(q) : true;
      const okGenre = activeGenre ? genre === activeGenre : true;
      const okMedia = activeMedia ? media === activeMedia : true;
      const okFormat = activeFormat ? format === activeFormat : true;
      const okTag = activeTags.size === 0 ? true : [...activeTags].every(t => tags.includes(t));
      const okLiked = showLikedOnly ? isLiked(getItemId(item)) : true;
      return okSearch && okGenre && okMedia && okFormat && okTag && okLiked;
    }

    // ===== RENDER LOGIC =====
    function renderChipGroup(container, labelAll, baseList, countMap, activeState, onPick, isMulti = false) {
      container.innerHTML = "";
      const isAllActive = isMulti ? activeState.size === 0 : activeState === null;
      const allChip = document.createElement("div");
      allChip.className = "chip" + (isAllActive ? " active" : "");
      allChip.textContent = labelAll;
      allChip.onclick = () => onPick(null);
      container.appendChild(allChip);

      baseList.forEach(val => {
        const count = countMap.get(val) || 0;
        const isActive = isMulti ? activeState.has(val) : activeState === val;
        if (isMulti && count === 0 && !isActive) return;
        const chip = document.createElement("div");
        chip.className = "chip" + (isActive ? " active" : "");
        chip.innerHTML = `${escapeHTML(val)} <span class="count">${count}</span>`;
        chip.onclick = () => onPick(val);
        container.appendChild(chip);
      });
    }

    function updateChipsUI(filtered) {
      const gMap = new Map(), mMap = new Map(), fMap = new Map(), tMap = new Map();
      allData.forEach(it => { 
        gMap.set(it[KEY.genre], (gMap.get(it[KEY.genre])||0)+1);
        mMap.set(it[KEY.media], (mMap.get(it[KEY.media])||0)+1);
        fMap.set(it[KEY.format], (fMap.get(it[KEY.format])||0)+1);
      });
      filtered.forEach(it => splitTags(it[KEY.tag]).forEach(t => tMap.set(t, (tMap.get(t)||0)+1)));

      renderChipGroup(genreChipsEl, "All", baseGenres, gMap, activeGenre, (v) => { activeGenre = v; render(true); });
      renderChipGroup(mediaChipsEl, "All", baseMedias, mMap, activeMedia, (v) => { activeMedia = v; render(true); });
      renderChipGroup(formatChipsEl, "All", baseFormats, fMap, activeFormat, (v) => { activeFormat = v; render(true); });
      renderChipGroup(tagChipsEl, "All", baseTags, tMap, activeTags, (v) => {
        if (v === null) activeTags.clear();
        else activeTags.has(v) ? activeTags.delete(v) : activeTags.add(v);
        render(true);
      }, true);
    }

    function renderLeftNav() {
      leftNavEl.innerHTML = "";
      // 🔥 리스트 유지: allData 기준
      const index = buildGenreChannelIndex(allData);
      index.forEach((group, idx) => {
        const wrap = document.createElement("div"); wrap.className = "genreGroup";
        const head = document.createElement("button"); head.className = "genreHead"; 
        head.innerHTML = `<span>${escapeHTML(group.g)}</span><span class="meta">${group.channels.length}ch · ${group.total}</span>`;
        const body = document.createElement("div"); body.className = "genreBody" + (idx < 2 ? " open" : "");
        head.onclick = () => body.classList.toggle("open");
        group.channels.forEach(({c, cnt}) => {
          const b = document.createElement("button");
          b.id = `nav-ch-${fnv1a(c)}`;
          b.className = "channelItem" + (selectedChannel === c ? " active" : "");
          b.innerHTML = `<span>${escapeHTML(c)}</span><span class="count">${cnt}</span>`;
          b.onclick = () => { selectedChannel = c; render(true); };
          body.appendChild(b);
        });
        wrap.append(head, body); leftNavEl.appendChild(wrap);
      });
    }

    async function render(resetPagination = false){
      if (resetPagination) renderLimit = RENDER_CHUNK;
      const filtered = allData.filter(matchesFilter);
      updateChipsUI(filtered);
      statsEl.textContent = `표시: ${filtered.length} / 전체: ${allData.length}`;

      if (viewMode === "all"){
        gridEl.style.display = "grid"; dashEl.classList.remove("active");
        const list = (sortMode === "likes") ? [...filtered].sort((a,b)=> (interactionsCache.get(getItemId(b))?.likes||0) - (interactionsCache.get(getItemId(a))?.likes||0)) : sortByDateDesc(filtered);
        const sliced = list.slice(0, renderLimit);
        gridEl.innerHTML = sliced.map(it => `
          <div class="card" data-itemid="${getItemId(it)}">
            <div class="thumbWrap" onclick="openModalForItem(${JSON.stringify(it).replace(/"/g, '&quot;')})">
              <img class="thumb" src="https://via.placeholder.com/400x225?text=Loading..." data-src="${getItemId(it)}">
            </div>
            <div class="metaBox">
              <div class="channel">${escapeHTML(it[KEY.channel])}</div>
              <div class="titleLine">${escapeHTML(it[KEY.title])}</div>
              <div class="actionsBar">
                <button class="actionBtn like ${isLiked(getItemId(it))?'active':''}" onclick="toggleLike('${getItemId(it)}')">👍 <span class="cnt" id="like-${getItemId(it)}">…</span></button>
                <button class="actionBtn" onclick="openModalForItem(${JSON.stringify(it).replace(/"/g, '&quot;')})">💬 <span class="cnt" id="memo-${getItemId(it)}">…</span></button>
              </div>
            </div>
          </div>`).join("");
        sliced.forEach(async it => { const t = await resolveThumbnail(it); document.querySelector(`[data-src="${getItemId(it)}"]`).src = t; });
        hydrateCountersFor(sliced.map(getItemId));
      } else {
        gridEl.style.display = "none"; dashEl.classList.add("active");
        document.querySelectorAll('.channelItem').forEach(el => el.classList.remove('active'));
        if (selectedChannel) {
          const activeEl = document.getElementById(`nav-ch-${fnv1a(selectedChannel)}`);
          if (activeEl) activeEl.classList.add('active');
        }
        if (!selectedChannel) { rightTitleEl.textContent = "채널 콘텐츠"; rightListEl.innerHTML = ""; rightEmptyEl.style.display = "block"; rightEmptyEl.textContent = "왼쪽에서 채널을 선택하세요."; return; }
        
        rightTitleEl.textContent = selectedChannel;
        const chFiltered = filtered.filter(it => (it[KEY.channel]||"").trim() === selectedChannel);
        const list = (sortMode === "likes") ? [...chFiltered].sort((a,b)=> (interactionsCache.get(getItemId(b))?.likes||0) - (interactionsCache.get(getItemId(a))?.likes||0)) : sortByDateDesc(chFiltered);
        
        if (!list.length) { rightListEl.innerHTML = ""; rightEmptyEl.style.display = "block"; rightEmptyEl.textContent = "조건에 맞는 영상이 없습니다."; return; }
        rightEmptyEl.style.display = "none";
        rightListEl.innerHTML = list.slice(0, renderLimit).map(it => `
          <div class="row" onclick="openModalForItem(${JSON.stringify(it).replace(/"/g, '&quot;')})">
            <img class="rowThumb" src="https://via.placeholder.com/160x90?text=Loading..." data-rowsrc="${getItemId(it)}">
            <div class="rowMeta">
              <div class="rowTitle">${escapeHTML(it[KEY.title])}</div>
              <div class="metaDate">${it[KEY.date]}</div>
            </div>
          </div>`).join("");
        list.slice(0, renderLimit).forEach(async it => { const t = await resolveThumbnail(it); const img = document.querySelector(`[data-rowsrc="${getItemId(it)}"]`); if(img) img.src = t; });
        hydrateCountersFor(list.slice(0, renderLimit).map(getItemId));
      }
    }

// ===== INTERACTIONS & MODAL =====

// [변수 선언] 중복을 제거하고 하나로 합쳤습니다.
const mVideoPlayer = document.getElementById("mVideoPlayer");
const mIframe = document.getElementById("mIframe");
const mPipBtn = document.getElementById("mPipBtn");
const mShareBtn = document.getElementById("mShareBtn");

// 1. PIP 모드 실행 (기존 팝업 방식 유지 혹은 재생 용도)
mPipBtn.onclick = () => {
  const url = mLink.href;
  const ytId = getYoutubeID(url);
  if (ytId) {
    const width = 560, height = 315;
    const left = window.screen.width - width - 20;
    const top = window.screen.height - height - 60;
    window.open(
      `https://www.youtube.com/embed/${ytId}?autoplay=1`, 
      'pipWindow', 
      `width=${width},height=${height},left=${left},top=${top},menubar=no,toolbar=no,location=no,status=no,resizable=yes`
    );
    showToast("PIP 팝업이 생성되었습니다.");
  } else {
    showToast("유튜브 영상만 PIP 팝업을 지원합니다.");
  }
};

// 2. 공유 전용 URL 복사
mShareBtn.onclick = () => {
  const itemId = modalOverlay.dataset.itemid;
  const shareUrl = `${window.location.origin}${window.location.pathname}?id=${itemId}`;
  navigator.clipboard.writeText(shareUrl).then(() => {
    showToast("공유용 직통 링크가 복사되었습니다!");
  });
};

// 3. 모달 열기 함수 (우측 영상 자동 재생 포함)
async function openModalForItem(item){
  const itemId = getItemId(item); modalOverlay.dataset.itemid = itemId;
  mTitle.textContent = item[KEY.title]; mSub.textContent = `${item[KEY.channel]} · ${item[KEY.date]}`;
  mLink.href = item[KEY.url]; mThumb.src = await resolveThumbnail(item);
  mNick.value = getNickname(); mLikeBtn.classList.toggle("active", isLiked(itemId));
  
  // 🎥 영상 처리: 모달 우측 iframe에 주소 할당
  const ytId = getYoutubeID(item[KEY.url]);
  if(ytId) {
    mVideoPlayer.style.display = "block";
    mIframe.src = `https://www.youtube.com/embed/${ytId}?autoplay=1`;
  } else {
    mVideoPlayer.style.display = "none";
    mIframe.src = "";
  }

  modalOverlay.classList.add("open");
  const data = await fetchInteractions(itemId);
  mLikeCnt.textContent = data.likes;
  mList.innerHTML = data.memos.map(m => `<div class="memoItem"><div class="memoTop"><span class="memoNick">${escapeHTML(m.nickname)}</span></div><div class="memoText">${escapeHTML(m.memo)}</div></div>`).join("");
}

// 4. [중요] C. 배경 클릭 시 모달 닫기 및 영상 정지
modalOverlay.onclick = (e) => {
  // 클릭한 대상이 모달 내부가 아니라 바깥쪽 검은 배경(modalOverlay)일 때만 작동
  if (e.target === modalOverlay) {
    modalOverlay.classList.remove("open");
    mIframe.src = ""; // 영상 주소를 비워야 소리가 멈춥니다.
  }
};

// 5. 닫기 버튼 클릭 시 영상 정지
mClose.onclick = () => {
  modalOverlay.classList.remove("open");
  mIframe.src = ""; // 영상 정지
};

// ===== INIT =====
async function init() {
  try {
    const res = await fetch(SHEET_URL);
    allData = (await res.json()).filter(x => x && (x[KEY.url] || x[KEY.title]));
        baseGenres = [...new Set(allData.map(i => (i[KEY.genre]||"").trim()).filter(Boolean))].sort();
        baseMedias = [...new Set(allData.map(i => (i[KEY.media]||"").trim()).filter(Boolean))].sort();
        baseFormats = [...new Set(allData.map(i => (i[KEY.format]||"").trim()).filter(Boolean))].sort();
        baseTags = [...new Set(allData.flatMap(i => splitTags(i[KEY.tag])))].sort();
       renderLeftNav(); 
    render(true);
    
    checkDeepLink(); // <--- 이 줄을 여기에 추가하세요!
    
  } catch (e) { gridEl.innerHTML = "데이터 로드 실패"; }
}

    searchEl.oninput = debounce(() => render(true), 300);
    viewAllBtn.onclick = () => { viewMode = "all"; viewAllBtn.classList.add("active"); viewDashBtn.classList.remove("active"); render(true); };
    viewDashBtn.onclick = () => { viewMode = "dash"; viewDashBtn.classList.add("active"); viewAllBtn.classList.remove("active"); render(true); };
    resetBtn.onclick = () => { activeGenre = activeMedia = activeFormat = null; activeTags.clear(); searchEl.value = ""; render(true); };
    
    document.querySelectorAll('.tab').forEach(t => t.onclick = (e) => {
      document.querySelectorAll('.tab, .chipsPanel').forEach(el => el.classList.remove('active'));
      e.target.classList.add('active'); document.getElementById(e.target.dataset.tab + "Chips").classList.add('active');
    });

    window.onscroll = () => fab.classList.toggle("visible", window.scrollY > 400);
fab.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

// ⬇️ 여기에 무한 스크롤 코드를 추가하세요 ⬇️
window.addEventListener("scroll", () => {
  if (viewMode !== "all") return; // 전체 보기 모드일 때만 작동

  // 바닥 근처(500px 남음)에 도달하면 추가 로드
  if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
    const filtered = allData.filter(matchesFilter);
    if (renderLimit < filtered.length) {
      renderLimit += RENDER_CHUNK; // 30개 단위로 제한 증가
      render(false); // 기존 목록을 유지하면서 추가로 그리기
    }
  }
});

init(); // 964번 라인: 초기화 함수 호출
</script>
  </script>
</body>
</html>
