<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Reference Archive</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root{
      --bg:#0f0f10; --text:#eaeaea; --muted:rgba(234,234,234,.7);
      --line:#26262a; --line2:#2f2f35; --accent:#ff4757;
      --shadow: 0 14px 40px rgba(0,0,0,.35); --radius:16px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; padding:22px; color:var(--text);
      background: radial-gradient(1200px 600px at 10% 0%, rgba(255,71,87,.08), transparent 55%),
                  radial-gradient(1000px 600px at 90% 10%, rgba(43,143,163,.08), transparent 55%), var(--bg);
      font-family: "Pretendard", ui-sans-serif, system-ui, sans-serif;
    }
    h1{ margin:0 0 12px 0; font-size:24px; display:flex; align-items:center; gap:10px; }
    .topbarWrapper {
      position: sticky; top: -22px; margin: -22px -22px 12px -22px; padding: 22px 22px 12px 22px;
      background: rgba(15, 15, 16, 0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .topbar{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
    input[type="text"]{
      padding:10px 12px; width:320px; max-width:100%; border-radius:14px; border:1px solid var(--line);
      background: rgba(20,20,22,.7); color:var(--text); outline:none;
    }
    .btn{
      padding:10px 12px; border-radius:14px; border:1px solid var(--line); background: rgba(20,20,22,.7);
      color:var(--text); cursor:pointer; font-size:13px; font-weight:700;
    }
    .btn.active{ border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,71,87,.12); }
    .stats{ font-size:13px; color: var(--muted); margin-left:auto; }
    .divider{ height:1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent); margin: 12px 0; }
    .viewToggle{ display:inline-flex; border:1px solid rgba(255,255,255,.10); background: rgba(20,20,22,.55); border-radius:999px; overflow:hidden; }
    .viewToggle button{ border:0; background: transparent; color: rgba(234,234,234,.78); padding:9px 12px; font-size:13px; font-weight:700; cursor:pointer; }
    .viewToggle button.active{ background: rgba(255,71,87,.14); color: #fff; }
    .filterTabs{ display:flex; flex-wrap:wrap; gap:8px; margin: 8px 0 10px 0; }
    .tab{ padding:8px 10px; border-radius:12px; border:1px solid rgba(255,255,255,.12); background: rgba(20,20,22,.55); color: #fff; font-size:13px; cursor:pointer; }
    .tab.active{ border-color: var(--accent); background: rgba(20,20,22,.75); }
    .filterPanel{ border:1px solid rgba(255,255,255,.08); background: rgba(20,20,22,.35); border-radius:14px; padding:10px; }
    .chips{ display:flex; flex-wrap:wrap; gap:8px; }
    .chipsPanel{ display:none; }
    .chipsPanel.active{ display:flex; }
    .chip{ padding:7px 10px; border-radius:999px; border:1px solid var(--line); background: rgba(23,23,26,.8); cursor:pointer; font-size:13px; }
    .chip.active{ border-color: var(--accent); background: rgba(255,71,87,.1); }
    .chip .count{ opacity:.55; margin-left:6px; font-size:12px; }
    .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:16px; margin-top: 14px; }
    .skeleton-card { background: rgba(20,20,22,.5); border-radius: var(--radius); height: 340px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    .card{ background: rgba(20,20,22,.92); border:1px solid var(--line); border-radius: var(--radius); overflow:hidden; transition: transform .2s; position:relative; cursor:pointer; }
    .card:hover{ transform: translateY(-4px); border-color: rgba(255,255,255,.16); }
    .thumbWrap{ width:100%; height:220px; background:#0b0b0c; overflow:hidden; }
    .thumb{ width:100%; height:100%; object-fit:contain; transition: transform 0.3s; }
    .card:hover .thumb { transform: scale(1.05); }
    .metaBox{ padding:14px; border-top:1px solid rgba(255,255,255,.06); }
    .channel{ font-size:15px; font-weight:700; margin:0 0 6px 0; }
    .titleLine{ font-size:13.5px; line-height:1.45; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .dash{ display:none; grid-template-columns: 320px 1fr; gap:14px; margin-top: 14px; align-items:start; }
    .dash.active{ display:grid; }
    .panel{ border:1px solid rgba(255,255,255,.08); background: rgba(20,20,22,.40); border-radius:16px; overflow:hidden; }
    .panelHeader{ padding:12px; border-bottom:1px solid rgba(255,255,255,.06); display:flex; justify-content:space-between; background: rgba(20,20,22,.55); }
    .leftScroll{ max-height: calc(100vh - 320px); overflow:auto; padding:10px; }
    .genreGroup{ border:1px solid rgba(255,255,255,.06); border-radius:14px; overflow:hidden; margin-bottom:10px; }
    .genreHead{ width:100%; border:0; background: rgba(20,20,22,.55); color: #fff; padding:10px; cursor:pointer; display:flex; justify-content:space-between; font-weight:700; font-family: inherit; }
    .genreBody{ padding:8px; display:none; }
    .genreBody.open{ display:block; }
    .channelItem{ width:100%; border:1px solid rgba(255,255,255,.08); background: rgba(20,20,22,.55); color: #eee; padding:9px 10px; border-radius:12px; cursor:pointer; display:flex; justify-content:space-between; margin-bottom:6px; font-size:13px; font-family: inherit; }
    .channelItem.active{ border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,71,87,.12); color: #fff; }
    .row{ display:grid; grid-template-columns: 160px 1fr; gap:12px; border:1px solid rgba(255,255,255,.08); background: rgba(20,20,22,.55); border-radius:16px; overflow:hidden; margin-bottom:10px; transition: transform 0.2s; cursor:pointer; }
    .row:hover { transform: translateX(4px); }
    .rowThumb{ width:100%; height:96px; object-fit:cover; }
    .rowMeta{ padding:10px 12px; min-width:0; display:flex; flex-direction:column; gap:4px; }
    .modalOverlay{ position:fixed; inset:0; background: rgba(0,0,0,.75); backdrop-filter: blur(4px); display:none; align-items:center; justify-content:center; padding:18px; z-index:9999; }
    .modalOverlay.open{ display:flex; }
    .modal{ width:min(920px, 100%); max-height: 86vh; border-radius:20px; background: rgba(20,20,22,.96); display:grid; grid-template-columns: 320px 1fr; overflow:hidden; }
    #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; padding: 12px 24px; border-radius: 999px; transition: bottom 0.4s; z-index: 10000; }
    #toast.show { bottom: 40px; }
    #fab { position: fixed; bottom: 40px; right: 30px; width: 50px; height: 50px; border-radius: 50%; background: rgba(30, 30, 34, 0.85); color: white; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 9000; }
    @media (max-width: 980px){ .dash.active{ grid-template-columns: 1fr; } .modal{ grid-template-columns: 1fr; } }
  </style>
</head>

<body>
  <div id="toast">알림 메시지</div>
  <div id="fab">⬆️</div>

  <div class="topbarWrapper">
    <h1>🎬 Video Reference Archive</h1>
    <div class="topbar">
      <input id="search" type="text" placeholder="제목 검색..." />
      <div class="viewToggle">
        <button id="viewAllBtn" class="active">🟦 전체</button>
        <button id="viewDashBtn">📺 채널별</button>
      </div>
      <button class="btn" id="likedOnlyBtn">❤️ 좋아요만</button>
      <button class="btn" id="sortLikesBtn">🔥 좋아요순</button>
      <button class="btn" id="adminBtn">🛠 관리자</button>
      <button class="btn" id="resetBtn">초기화</button>
      <div class="stats" id="stats">표시: 0 / 전체: 0</div>
    </div>
    <div class="divider"></div>
    <div class="filterTabs" id="filterTabs">
      <button class="tab active" data-tab="genre">장르</button>
      <button class="tab" data-tab="tag">TAG (다중선택)</button>
    </div>
    <div class="filterPanel">
      <div class="chips chipsPanel active" id="genreChips"></div>
      <div class="chips chipsPanel" id="tagChips"></div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="dash" id="dash">
    <div class="panel">
      <div class="panelHeader">
        <div class="title">장르 → 채널</div>
        <div class="hint" id="leftHint">채널 선택</div>
      </div>
      <div class="leftScroll" id="leftNav"></div>
    </div>
    <div class="panel">
      <div class="panelHeader">
        <div class="title" id="rightTitle">채널 콘텐츠</div>
        <div class="hint" id="rightHint">최신순</div>
      </div>
      <div class="rightWrap" style="padding:10px;">
        <div class="list" id="rightList"></div>
        <div class="mutebox" id="rightEmpty" style="display:none; text-align:center; padding:40px;"></div>
      </div>
    </div>
  </div>

  <div class="modalOverlay" id="modalOverlay">
    <div class="modal">
        <div style="padding:20px; border-right:1px solid #222;">
            <img id="mThumb" style="width:100%; border-radius:10px; background:#000;">
            <div id="mTitle" style="font-weight:700; margin-top:15px;"></div>
            <div id="mSub" style="font-size:12px; opacity:0.7; margin-top:10px; display:flex; flex-wrap:wrap; gap:5px;"></div>
            <a id="mLink" target="_blank" style="display:block; margin-top:15px; text-align:center; background:#333; padding:10px; border-radius:8px; text-decoration:none; color:#fff;">🔗 원본 열기</a>
        </div>
        <div style="padding:20px; display:flex; flex-direction:column;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <div id="mCounts">👍 0 · 💬 0</div>
                <button id="mClose" style="background:none; border:none; color:#fff; cursor:pointer;">닫기 ✕</button>
            </div>
            <div id="mList" style="flex:1; overflow:auto; border:1px solid #222; border-radius:10px; padding:10px; margin-bottom:15px;"></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr auto; gap:10px;">
                <input id="mNick" placeholder="닉네임" style="background:#111; border:1px solid #333; color:#fff; padding:8px; border-radius:5px;">
                <input id="mMemo" placeholder="메모" style="background:#111; border:1px solid #333; color:#fff; padding:8px; border-radius:5px;">
                <button id="mSend" style="background:var(--accent); border:none; color:#fff; padding:8px 15px; border-radius:5px; cursor:pointer;">등록</button>
            </div>
        </div>
    </div>
  </div>

  <script>
    const SHEET_URL = "https://opensheet.elk.sh/1GgTfXN-iChTCdW3vHYFwQu2WSlwmgOm2-pHs2WIBBAY/ARCHIVE";
    const API_URL = "https://script.google.com/macros/s/AKfycbzHucb9jQ128D4vvCnX1nzTzZaWDqK6gopqS45KoJRknGG_Zr5gSIB-lDxpe8MohZVRKg/exec";

    const KEY = { genre: "장르", channel: "채널명", title: "TITLE", media: "매체", url: "URL", format: "포맷", tag: "TAG", date: "발행일" };
    let allData = [], baseGenres = [], baseTags = [];
    let activeGenre = null, activeTags = new Set();
    let viewMode = "all", selectedChannel = null, showLikedOnly = false, sortMode = "date", renderLimit = 30;

    const gridEl = document.getElementById("grid"), dashEl = document.getElementById("dash"), statsEl = document.getElementById("stats"), searchEl = document.getElementById("search");
    const leftNavEl = document.getElementById("leftNav"), rightListEl = document.getElementById("rightList"), rightTitleEl = document.getElementById("rightTitle");
    const genreChipsEl = document.getElementById("genreChips"), tagChipsEl = document.getElementById("tagChips");

    // UTILS
    function escapeHTML(s) { return String(s||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
    function fnv1a(s){ let h = 0x811c9dc5; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=(h+(h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24))>>>0; } return h.toString(16).padStart(8,'0'); }
    function getItemId(it){ return fnv1a((it[KEY.url] || "").trim()); }
    function splitTags(s){ return (s||"").replace(/，/g,',').split(',').map(t=>t.trim()).filter(Boolean); }
    function isLiked(id){ try{ return !!JSON.parse(localStorage.getItem("vra:liked")||"{}")[id]; }catch{return false;} }

    // BUILD INDEX
    function buildGenreChannelIndex(items) {
      const genreMap = new Map();
      items.forEach(it => {
        const g = (it[KEY.genre] || "기타").trim(), c = (it[KEY.channel] || "미분류").trim();
        if (!genreMap.has(g)) genreMap.set(g, new Map());
        const cm = genreMap.get(g); cm.set(c, (cm.get(c) || 0) + 1);
      });
      return [...genreMap.entries()].map(([g, cm]) => ({
        g, total: [...cm.values()].reduce((a, b) => a + b, 0),
        channels: [...cm.entries()].map(([c, cnt]) => ({ c, cnt })).sort((a, b) => a.c.localeCompare(b.c, "ko"))
      })).sort((a, b) => b.total - a.total);
    }

    // RENDER COMPONENTS
    function renderLeftNav() {
      leftNavEl.innerHTML = "";
      const index = buildGenreChannelIndex(allData);
      index.forEach((group, idx) => {
        const wrap = document.createElement("div"); wrap.className = "genreGroup";
        const head = document.createElement("button"); head.className = "genreHead"; 
        head.innerHTML = `<span>${escapeHTML(group.g)}</span><span style="font-size:11px; opacity:0.6;">${group.channels.length}ch · ${group.total}</span>`;
        const body = document.createElement("div"); body.className = "genreBody" + (idx < 2 ? " open" : "");
        head.onclick = () => body.classList.toggle("open");
        group.channels.forEach(({c, cnt}) => {
          const b = document.createElement("button"); b.id = `nav-ch-${fnv1a(c)}`; 
          b.className = "channelItem" + (selectedChannel === c ? " active" : "");
          b.innerHTML = `<span>${escapeHTML(c)}</span><span style="opacity:0.5;">${cnt}</span>`;
          b.onclick = () => { selectedChannel = c; render(true); };
          body.appendChild(b);
        });
        wrap.append(head, body); leftNavEl.appendChild(wrap);
      });
    }

    function updateChipsUI(filtered) {
      genreChipsEl.innerHTML = `<div class="chip ${!activeGenre?'active':''}" onclick="activeGenre=null; render(true);">All</div>`;
      baseGenres.forEach(g => {
        const chip = document.createElement("div"); chip.className = `chip ${activeGenre===g?'active':''}`;
        chip.textContent = g; chip.onclick = () => { activeGenre=g; render(true); };
        genreChipsEl.appendChild(chip);
      });
    }

    // MAIN RENDER
    async function render(reset = false) {
      if (reset) renderLimit = 30;
      const filtered = allData.filter(it => {
        const q = searchEl.value.toLowerCase().trim();
        const okSearch = q ? (it[KEY.title]||"").toLowerCase().includes(q) : true;
        const okGenre = activeGenre ? it[KEY.genre] === activeGenre : true;
        const okTag = activeTags.size === 0 ? true : [...activeTags].every(t => splitTags(it[KEY.tag]).includes(t));
        const okLiked = showLikedOnly ? isLiked(getItemId(it)) : true;
        return okSearch && okGenre && okTag && okLiked;
      });

      updateChipsUI(filtered);
      statsEl.textContent = `표시: ${filtered.length} / 전체: ${allData.length}`;

      if (viewMode === "all") {
        gridEl.style.display = "grid"; dashEl.classList.remove("active");
        gridEl.innerHTML = filtered.slice(0, renderLimit).map(it => `
          <div class="card" onclick='openModalForItem(${JSON.stringify(it).replace(/'/g, "&#39;")})'>
            <div class="thumbWrap"><img class="thumb" src="https://img.youtube.com/vi/${getYoutubeID(it[KEY.url])}/hqdefault.jpg"></div>
            <div class="metaBox">
              <div class="channel">${escapeHTML(it[KEY.channel]||"")}</div>
              <div class="titleLine">${escapeHTML(it[KEY.title]||"")}</div>
            </div>
          </div>`).join("");
      } else {
        gridEl.style.display = "none"; dashEl.classList.add("active");
        document.querySelectorAll('.channelItem').forEach(el => el.classList.remove('active'));
        const activeNav = document.getElementById(`nav-ch-${fnv1a(selectedChannel||"")}`);
        if(activeNav) activeNav.classList.add('active');
        
        rightTitleEl.textContent = selectedChannel || "채널 선택";
        const chList = filtered.filter(it => (it[KEY.channel]||"").trim() === selectedChannel);
        rightListEl.innerHTML = chList.map(it => `
          <div class="row" onclick='openModalForItem(${JSON.stringify(it).replace(/'/g, "&#39;")})'>
            <img class="rowThumb" src="https://img.youtube.com/vi/${getYoutubeID(it[KEY.url])}/mqdefault.jpg">
            <div class="rowMeta">
              <div style="font-weight:700; font-size:14px;">${escapeHTML(it[KEY.title]||"")}</div>
              <div style="font-size:12px; opacity:0.6;">${it[KEY.date]||""}</div>
            </div>
          </div>`).join("");
      }
    }

    function getYoutubeID(url) {
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = (url||"").match(regExp);
      return (match && match[2].length === 11) ? match[2] : "";
    }

    function openModalForItem(it) {
      document.getElementById("mTitle").textContent = it[KEY.title];
      document.getElementById("mThumb").src = `https://img.youtube.com/vi/${getYoutubeID(it[KEY.url])}/maxresdefault.jpg`;
      document.getElementById("mLink").href = it[KEY.url];
      document.getElementById("modalOverlay").classList.add("open");
    }

    document.getElementById("mClose").onclick = () => document.getElementById("modalOverlay").classList.remove("open");

    async function init() {
      try {
        const res = await fetch(SHEET_URL);
        const data = await res.json();
        allData = data.filter(x => x && (x[KEY.url] || x[KEY.title]));
        baseGenres = [...new Set(allData.map(i => (i[KEY.genre]||"").trim()).filter(Boolean))].sort();
        renderLeftNav();
        render();
      } catch (e) { document.getElementById("grid").innerHTML = "데이터 로딩 실패"; }
    }
    
    document.getElementById("viewAllBtn").onclick = () => { viewMode="all"; document.getElementById("viewAllBtn").classList.add("active"); document.getElementById("viewDashBtn").classList.remove("active"); render(); };
    document.getElementById("viewDashBtn").onclick = () => { viewMode="dash"; document.getElementById("viewDashBtn").classList.add("active"); document.getElementById("viewAllBtn").classList.remove("active"); render(); };
    searchEl.oninput = () => render(true);
    init();
  </script>
</body>
</html>
