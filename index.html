<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Video Reference Archive</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root{ 
            --bg:#0b0b0c; --panel-bg: rgba(20, 20, 22, 0.85); --text:#eaeaea; 
            --muted:rgba(234,234,234,.6); --line:rgba(255,255,255,0.08); 
            --line2:rgba(255,255,255,0.15); --accent:#ff4757; 
            --accent-glow: rgba(255, 71, 87, 0.3); --shadow: 0 14px 40px rgba(0,0,0,.5); 
            --radius:16px; --glass: blur(16px) saturate(180%);
        }
        *{ box-sizing:border-box; outline: none; }
        body{ 
            margin:0; padding:22px; color:var(--text); 
            background: radial-gradient(1200px 600px at 10% 0%, rgba(255,71,87,.08), transparent 55%), var(--bg); 
            font-family: "Pretendard", system-ui; overflow-x: hidden;
        }
        .topbarWrapper { position: sticky; top: -22px; margin: -22px -22px 12px -22px; padding: 22px 22px 12px 22px; background: rgba(11, 11, 12, 0.6); backdrop-filter: var(--glass); z-index: 100; border-bottom: 1px solid var(--line); }
        .topbar{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
        input[type="text"]{ padding:12px 16px; width:300px; border-radius:14px; border:1px solid var(--line); background: rgba(0,0,0,0.2); color:var(--text); }
        .btn{ padding:10px 16px; border-radius:12px; border:1px solid var(--line); background: rgba(255,255,255,0.03); color:var(--text); cursor:pointer; font-size:13px; font-weight:700; transition: 0.2s; }
        .btn.active{ border-color: var(--accent); background: rgba(255,71,87,0.1); color: var(--accent); }
        .filterPanel{ border:1px solid var(--line); background: rgba(0,0,0,0.1); border-radius:14px; padding:12px; margin-top:10px; }
        .chipsPanel{ display:none; flex-wrap:wrap; gap:8px; }
        .chipsPanel.active{ display:flex; }
        .chip{ padding:7px 12px; border-radius:999px; border:1px solid var(--line); background: rgba(255,255,255,0.03); color: var(--muted); cursor:pointer; font-size:12px; }
        .chip.active{ border-color: var(--accent); background: rgba(255,71,87,0.1); color: var(--accent); }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .skeleton { height: 250px; border-radius: var(--radius); background: #1a1a1c; animation: pulse 1.5s infinite; }
        .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:20px; margin-top: 14px; }
        .card{ background: var(--panel-bg); border:1px solid var(--line); border-radius: var(--radius); overflow:hidden; transition: 0.3s; cursor: pointer; }
        .card:hover{ border-color: var(--accent); transform: translateY(-4px); }
        .thumbWrap{ width:100%; aspect-ratio: 16/9; background:#000; overflow:hidden; }
        .thumb{ width:100%; height:100%; object-fit:cover; }
        .metaBox{ padding:14px; border-top:1px solid var(--line); }
        .dash{ display:none; grid-template-columns: 280px 1fr; gap:16px; margin-top: 14px; height: calc(100vh - 300px); }
        .dash.active{ display:grid; }
        .panel{ border:1px solid var(--line); background: var(--panel-bg); border-radius:16px; display: flex; flex-direction: column; overflow: hidden; }
        .modalOverlay{ position:fixed; inset:0; background: rgba(0,0,0,.85); backdrop-filter: blur(8px); display:none; align-items:center; justify-content:center; z-index:9999; }
        .modalOverlay.open{ display:flex; }
        .modal { width: min(1200px, 95vw); max-height: 90vh; background: #161618; border-radius: 20px; display: grid; grid-template-columns: 320px 1fr; overflow: hidden; }
    </style>
</head>
<body>
    <div class="topbarWrapper">
        <h1 onclick="location.reload()" style="cursor:pointer">🎬 Video Reference Archive</h1>
        <div class="topbar">
            <input id="search" type="text" placeholder="제목 검색..." />
            <button id="viewAllBtn" class="btn active">🟦 전체 보기</button>
            <button id="viewDashBtn" class="btn">📺 채널별 보기</button>
            <button id="sortDateBtn" class="btn active">📅 발행일순</button>
            <button id="sortUpdateBtn" class="btn">🆕 업데이트순</button>
            <button id="resetBtn" class="btn">초기화</button>
            <div style="margin-left:auto; font-size:12px; color:var(--muted)" id="stats">시트 확인 중...</div>
        </div>
        <div class="filterTabs" style="margin-top:12px; display:flex; gap:10px;">
            <button class="tab active" data-tab="genre">장르</button>
            <button class="tab" data-tab="media">매체</button>
            <button class="tab" data-tab="cast">출연자</button>
        </div>
        <div class="filterPanel">
            <div class="chipsPanel active" id="genreChips"></div>
            <div class="chipsPanel" id="mediaChips"></div>
            <div class="chipsPanel" id="castChips"></div>
        </div>
    </div>

    <div class="grid" id="grid"></div>
    <div id="scrollTrigger" style="height: 20px;"></div>

    <div class="dash" id="dash">
        <div class="panel"><div id="leftNav" style="padding:10px; overflow-y:auto;"></div></div>
        <div class="panel"><div id="rightList" style="padding:15px; overflow-y:auto;"></div></div>
    </div>

    <div class="modalOverlay" id="modalOverlay">
        <div class="modal">
            <div id="modalLeft" style="padding:20px; border-right:1px solid var(--line); overflow-y:auto;"></div>
            <div style="padding:20px; display:flex; flex-direction:column; gap:10px;">
                <div style="display:flex; justify-content:space-between">
                    <span id="mTitle" style="font-weight:bold"></span>
                    <button onclick="closeModal()" style="background:none; border:none; color:#fff; cursor:pointer">✕</button>
                </div>
                <div id="mPlayer" style="aspect-ratio:16/9; background:#000; border-radius:12px; overflow:hidden"></div>
            </div>
        </div>
    </div>

    <script>
    const SHEET_URL = "https://opensheet.elk.sh/1GgTfXN-iChTCdW3vHYFwQu2WSlwmgOm2-pHs2WIBBAY/ARCHIVE";
    let KEY = { genre: "장르", channel: "채널명", title: "TITLE", media: "매체", url: "URL", cast: "출연자", date: "발행일" };
    let allData = [], activeGenre = new Set(), activeMedia = new Set(), activeCast = new Set();
    let viewMode = "all", selectedChannel = null, sortMode = "date", renderLimit = 20, activeCastRole = "전체";

    function splitTags(s) { return (s || "").split(/[,/]+/).filter(Boolean).map(t => t.trim()); }
    function fnv1a(s) { let h = 0x811c9dc5; for(let i=0; i<s.length; i++){ h ^= s.charCodeAt(i); h = Math.imul(h, 0x01000193); } return (h >>> 0).toString(16); }
    function getYTId(url) { try { const u = new URL(url); return u.searchParams.get("v") || u.pathname.split("/").pop(); } catch { return ""; } }
    
    function renderSkeleton() { document.getElementById("grid").innerHTML = Array(8).fill('<div class="skeleton"></div>').join(""); }

    async function render(reset = false) {
        if (reset) renderLimit = 20;
        const q = document.getElementById("search").value.toLowerCase();
        
        const filtered = allData.filter(it => {
            const okSearch = q ? (it[KEY.title]||"").toLowerCase().includes(q) : true;
            const hasTags = (set, k) => set.size === 0 || [...set].every(t => splitTags(it[KEY[k]]).includes(t));
            
            let okCast = true;
            if (activeCastRole !== "전체") {
                okCast = splitTags(it[KEY.cast]).some(t => t.includes(`(${activeCastRole})`) || t === activeCastRole);
            }
            if (activeCast.size > 0) {
                okCast = okCast && [...activeCast].every(name => (it[KEY.cast]||"").includes(name));
            }
            return okSearch && hasTags(activeGenre, "genre") && hasTags(activeMedia, "media") && okCast;
        });

        document.getElementById("stats").textContent = `표시: ${filtered.length} / 전체: ${allData.length}`;
        updateChips(filtered);

        if (viewMode === "all") {
            document.getElementById("grid").style.display = "grid";
            document.getElementById("dash").classList.remove("active");
            let list = [...filtered];
            if (sortMode === "date") list.sort((a,b) => new Date(b[KEY.date]) - new Date(a[KEY.date]));
            
            const sliced = list.slice(0, renderLimit);
            document.getElementById("grid").innerHTML = sliced.map(it => `
                <div class="card" onclick="openModal('${fnv1a(it[KEY.url])}')">
                    <div class="thumbWrap"><img class="thumb" loading="lazy" src="https://img.youtube.com/vi/${getYTId(it[KEY.url])}/mqdefault.jpg"></div>
                    <div class="metaBox">
                        <div style="font-size:13px; font-weight:bold; height:2.8em; overflow:hidden">${it[KEY.title]}</div>
                        <div style="font-size:11px; color:var(--muted); margin-top:8px">${it[KEY.channel]}</div>
                    </div>
                </div>`).join("");
        } else {
            document.getElementById("grid").style.display = "none";
            document.getElementById("dash").classList.add("active");
            renderDash(filtered);
        }
    }

    function renderDash(data) {
        const channels = [...new Set(data.map(it => it[KEY.channel]))].sort();
        document.getElementById("leftNav").innerHTML = channels.map(c => `
            <button class="btn ${selectedChannel===c?'active':''}" style="width:100%; margin-bottom:5px; text-align:left" onclick="selectChannel('${c}')">📺 ${c}</button>
        `).join("");
        
        if (selectedChannel) {
            const list = data.filter(it => it[KEY.channel] === selectedChannel);
            document.getElementById("rightList").innerHTML = list.map(it => `
                <div style="padding:10px; border-bottom:1px solid var(--line); cursor:pointer" onclick="openModal('${fnv1a(it[KEY.url])}')">
                    <strong>${it[KEY.title]}</strong><br><small>${it[KEY.date]}</small>
                </div>`).join("");
        } else {
            document.getElementById("rightList").innerHTML = "채널을 선택하세요.";
        }
    }

    function selectChannel(c) { selectedChannel = c; render(); }

    function updateChips(data) {
        const gSet = new Set(), mSet = new Set(), cMap = new Map();
        data.forEach(it => {
            splitTags(it[KEY.genre]).forEach(t => gSet.add(t));
            splitTags(it[KEY.media]).forEach(t => mSet.add(t));
            splitTags(it[KEY.cast]).forEach(t => {
                const name = t.split('(')[0];
                const role = t.includes('(') ? t.split('(')[1].replace(')', '') : '기타';
                const finalRole = ['개발자','마케터','사업'].includes(role) ? '직원' : role;
                if(!cMap.has(finalRole)) cMap.set(finalRole, new Set());
                cMap.get(finalRole).add(name);
            });
        });

        const draw = (el, set, active, k) => {
            el.innerHTML = `<div class="chip ${active.size===0?'active':''}" onclick="resetFilter('${k}')">All</div>` + 
                [...set].sort().map(v => `<div class="chip ${active.has(v)?'active':''}" onclick="toggleFilter('${k}', '${v}')">${v}</div>`).join("");
        };
        draw(document.getElementById("genreChips"), gSet, activeGenre, "genre");
        draw(document.getElementById("mediaChips"), mSet, activeMedia, "media");

        // 출연자 2단
        const castEl = document.getElementById("castChips");
        castEl.innerHTML = `<div style="display:flex; gap:5px; margin-bottom:10px">` + 
            ["전체", ...[...cMap.keys()].sort()].map(r => `<div class="chip ${activeCastRole===r?'active':''}" onclick="activeCastRole='${r}';render(true)">${r}</div>`).join("") + `</div>`;
        if(activeCastRole !== "전체" && cMap.has(activeCastRole)) {
            castEl.innerHTML += `<div style="display:flex; gap:5px; flex-wrap:wrap">` + 
                [...cMap.get(activeCastRole)].sort().map(n => `<div class="chip ${activeCast.has(n)?'active':''}" onclick="toggleFilter('cast', '${n}')">${n}</div>`).join("") + `</div>`;
        }
    }

    function toggleFilter(k, v) {
        const s = k === 'genre' ? activeGenre : k === 'media' ? activeMedia : activeCast;
        s.has(v) ? s.delete(v) : s.add(v); render(true);
    }
    function resetFilter(k) {
        if(k==='genre') activeGenre.clear(); else if(k==='media') activeMedia.clear(); else activeCast.clear();
        render(true);
    }

    function openModal(id) {
        const it = allData.find(x => fnv1a(x[KEY.url]) === id);
        if(!it) return;
        document.getElementById("modalOverlay").classList.add("open");
        document.getElementById("mTitle").textContent = it[KEY.title];
        document.getElementById("modalLeft").innerHTML = `<img src="https://img.youtube.com/vi/${getYTId(it[KEY.url])}/hqdefault.jpg" style="width:100%; border-radius:10px">
            <p>${it[KEY.channel]}</p><p>${it[KEY.date]}</p><a href="${it[KEY.url]}" target="_blank" class="btn">원본 보기</a>`;
        document.getElementById("mPlayer").innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${getYTId(it[KEY.url])}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
    }
    function closeModal() { document.getElementById("modalOverlay").classList.remove("open"); document.getElementById("mPlayer").innerHTML=""; }

    async function init() {
        renderSkeleton();
        try {
            const res = await fetch(SHEET_URL);
            const data = await res.json();
            if(!Array.isArray(data)) throw new Error("배열 아님");
            allData = data.filter(x => x[Object.keys(x)[0]]).reverse();
            const first = allData[0];
            Object.keys(KEY).forEach(k => {
                const found = Object.keys(first).find(rk => rk.toLowerCase().trim() === KEY[k].toLowerCase());
                if(found) KEY[k] = found;
            });
            render();
        } catch (e) { document.getElementById("stats").textContent = "오류: " + e.message; }
    }

    document.getElementById("search").oninput = () => render(true);
    document.getElementById("viewAllBtn").onclick = () => { viewMode="all"; updateBtns("viewAllBtn"); render(true); };
    document.getElementById("viewDashBtn").onclick = () => { viewMode="dash"; updateBtns("viewDashBtn"); render(true); };
    document.getElementById("sortDateBtn").onclick = () => { sortMode="date"; updateBtns("sortDateBtn"); render(true); };
    document.getElementById("sortUpdateBtn").onclick = () => { sortMode="update"; updateBtns("sortUpdateBtn"); render(true); };
    document.getElementById("resetBtn").onclick = () => location.reload();
    
    function updateBtns(id) {
        const isView = id.includes("view");
        if(isView) ["viewAllBtn", "viewDashBtn"].forEach(b => document.getElementById(b).classList.remove("active"));
        else ["sortDateBtn", "sortUpdateBtn"].forEach(b => document.getElementById(b).classList.remove("active"));
        document.getElementById(id).classList.add("active");
    }

    document.querySelectorAll(".tab").forEach(t => t.onclick = (e) => {
        document.querySelectorAll(".tab, .chipsPanel").forEach(el => el.classList.remove("active"));
        e.target.classList.add("active");
        document.getElementById(e.target.dataset.tab + "Chips").classList.add("active");
    });

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && allData.length > 0 && viewMode === "all") {
            if (renderLimit < allData.length) { renderLimit += 20; render(false); }
        }
    });
    observer.observe(document.getElementById("scrollTrigger"));

    init();
    </script>
</body>
</html>
