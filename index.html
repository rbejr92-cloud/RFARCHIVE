<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Reference Archive</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root{
      --bg:#0f0f10; --text:#eaeaea; --muted:rgba(234,234,234,.7);
      --line:#26262a; --line2:#2f2f35; --accent:#ff4757;
      --shadow: 0 14px 40px rgba(0,0,0,.35); --radius:16px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; padding:22px; color:var(--text);
      background: radial-gradient(1200px 600px at 10% 0%, rgba(255,71,87,.08), transparent 55%),
                  radial-gradient(1000px 600px at 90% 10%, rgba(43,143,163,.08), transparent 55%), var(--bg);
      font-family: "Pretendard", ui-sans-serif, system-ui, sans-serif;
    }
    h1{ margin:0 0 12px 0; font-size:24px; display:flex; align-items:center; gap:10px; }
    .topbarWrapper {
      position: sticky; top: -22px; margin: -22px -22px 12px -22px; padding: 22px 22px 12px 22px;
      background: rgba(15, 15, 16, 0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .topbar{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
    input[type="text"]{
      padding:10px 12px; width:320px; max-width:100%; border-radius:14px; border:1px solid var(--line);
      background: rgba(20,20,22,.7); color:var(--text); outline:none; font-family: inherit;
    }
    .btn{
      padding:10px 12px; border-radius:14px; border:1px solid var(--line); background: rgba(20,20,22,.7);
      color:var(--text); cursor:pointer; font-size:13px; font-weight:700; font-family: inherit;
    }
    .btn.active{ border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,71,87,.12); }
    .stats{ font-size:13px; color: var(--muted); margin-left:auto; }
    .divider{ height:1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent); margin: 12px 0; }
    .viewToggle{ display:inline-flex; border:1px solid rgba(255,255,255,.10); background: rgba(20,20,22,.55); border-radius:999px; overflow:hidden; }
    .viewToggle button{ border:0; background: transparent; color: rgba(234,234,234,.78); padding:9px 12px; font-size:13px; font-weight:700; cursor:pointer; font-family: inherit; }
    .viewToggle button.active{ background: rgba(255,71,87,.14); color: #fff; }
    .filterTabs{ display:flex; flex-wrap:wrap; gap:8px; margin: 8px 0 10px 0; }
    .tab{ padding:8px 10px; border-radius:12px; border:1px solid rgba(255,255,255,.12); background: rgba(20,20,22,.55); color: #fff; font-size:13px; cursor:pointer; font-family: inherit; }
    .tab.active{ border-color: var(--accent); background: rgba(20,20,22,.75); }
    .filterPanel{ border:1px solid rgba(255,255,255,.08); background: rgba(20,20,22,.35); border-radius:14px; padding:10px; }
    .chips{ display:flex; flex-wrap:wrap; gap:8px; display:none; }
    .chips.active{ display:flex; }
    .chip{ padding:7px 10px; border-radius:999px; border:1px solid var(--line); background: rgba(23,23,26,.8); cursor:pointer; font-size:13px; color: #fff; }
    .chip.active{ border-color: var(--accent); background: rgba(255,71,87,.1); }
    .chip .count{ opacity:.55; margin-left:6px; font-size:12px; }
    .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:16px; margin-top: 14px; }
    .card{ background: rgba(20,20,22,.92); border:1px solid var(--line); border-radius: var(--radius); overflow:hidden; transition: transform .2s; position:relative; cursor:pointer; }
    .card:hover{ transform: translateY(-4px); border-color: rgba(255,255,255,.16); }
    .thumbWrap{ width:100%; height:200px; background:#0b0b0c; overflow:hidden; }
    .thumb{ width:100%; height:100%; object-fit:contain; }
    .metaBox{ padding:14px; border-top:1px solid rgba(255,255,255,.06); }
    .channel{ font-size:14px; font-weight:700; margin:0 0 6px 0; color: var(--accent); }
    .titleLine{ font-size:13.5px; line-height:1.45; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; color: #eee; }
    .dash{ display:none; grid-template-columns: 320px 1fr; gap:14px; margin-top: 14px; align-items:start; }
    .dash.active{ display:grid; }
    .panel{ border:1px solid rgba(255,255,255,.08); background: rgba(20,20,22,.40); border-radius:16px; overflow:hidden; }
    .leftScroll{ max-height: calc(100vh - 300px); overflow:auto; padding:10px; }
    .genreGroup{ border:1px solid rgba(255,255,255,.06); border-radius:14px; overflow:hidden; margin-bottom:10px; }
    .genreHead{ width:100%; border:0; background: rgba(20,20,22,.55); color: #fff; padding:10px; cursor:pointer; display:flex; justify-content:space-between; font-weight:700; font-family: inherit; }
    .genreBody{ padding:8px; display:none; }
    .genreBody.open{ display:block; }
    .channelItem{ width:100%; border:1px solid rgba(255,255,255,.08); background: rgba(20,20,22,.55); color: #eee; padding:9px 10px; border-radius:12px; cursor:pointer; display:flex; justify-content:space-between; margin-bottom:6px; font-size:13px; font-family: inherit; }
    .channelItem.active{ border-color: var(--accent); color: #fff; background: rgba(255,71,87,0.1); }
    .row{ display:grid; grid-template-columns: 140px 1fr; gap:12px; border:1px solid rgba(255,255,255,.08); background: rgba(20,20,22,.55); border-radius:12px; overflow:hidden; margin-bottom:10px; cursor:pointer; }
    .rowThumb{ width:100%; height:80px; object-fit:cover; }
    .rowMeta{ padding:10px 12px; min-width:0; display:flex; flex-direction:column; gap:4px; }
    
    /* PIP 및 모달 스타일 */
    .modalOverlay{ position:fixed; inset:0; background: rgba(0,0,0,.75); backdrop-filter: blur(4px); display:none; align-items:center; justify-content:center; padding:18px; z-index:9999; }
    .modalOverlay.open{ display:flex; }
    .modal{ width:min(900px, 100%); max-height: 85vh; border-radius:20px; background: #161618; display:flex; flex-direction:column; overflow:hidden; border: 1px solid #333; transition: all 0.3s ease; }
    
    /* 🔥 PIP(작게 보기) 모드 스타일 */
    .modal.pip { position: fixed; bottom: 20px; right: 20px; width: 360px; height: auto; z-index: 10001; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
    .modal.pip .modal-body { display: none; }
    
    #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; padding: 12px 24px; border-radius: 999px; transition: bottom 0.4s; z-index: 10000; font-weight: 700; }
    #toast.show { bottom: 40px; }
    #fab { position: fixed; bottom: 40px; right: 30px; width: 50px; height: 50px; border-radius: 50%; background: rgba(30, 30, 34, 0.85); border: 1px solid rgba(255,255,255,0.15); color: white; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 9000; backdrop-filter: blur(8px); }
  </style>
</head>

<body>
  <div id="toast">알림 메시지</div>
  <div id="fab">⬆️</div>

  <div class="topbarWrapper">
    <h1>🎬 Video Reference Archive</h1>
    <div class="topbar">
      <input id="search" type="text" placeholder="제목 검색..." />
      <div class="viewToggle">
        <button id="viewAllBtn" class="active">🟦 전체</button>
        <button id="viewDashBtn">📺 채널별</button>
      </div>
      <button class="btn" id="resetBtn">초기화</button>
      <div class="stats" id="stats">표시: 0 / 전체: 0</div>
    </div>
    <div class="divider"></div>
    <div class="filterTabs" id="filterTabs">
      <button class="tab active" data-tab="genre">장르</button>
      <button class="tab" data-tab="media">매체</button>
      <button class="tab" data-tab="format">포맷</button>
      <button class="tab" data-tab="tag">TAG</button>
    </div>
    <div class="filterPanel">
      <div class="chips active" id="genreChips"></div>
      <div class="chips" id="mediaChips"></div>
      <div class="chips" id="formatChips"></div>
      <div class="chips" id="tagChips"></div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="dash" id="dash">
    <div class="panel">
      <div class="panelHeader" style="padding:12px; background:#1c1c1e; border-bottom:1px solid #333;">장르 → 채널</div>
      <div class="leftScroll" id="leftNav"></div>
    </div>
    <div class="panel">
      <div class="panelHeader" style="padding:12px; background:#1c1c1e; border-bottom:1px solid #333;" id="rightTitle">채널 콘텐츠</div>
      <div class="rightWrap" style="padding:10px;"><div class="list" id="rightList"></div></div>
    </div>
  </div>

  <div class="modalOverlay" id="modalOverlay">
    <div class="modal" id="videoModal">
        <div style="position:relative; padding-top: 56.25%; background: #000;">
          <iframe id="mIframe" style="position:absolute; top:0; left:0; width:100%; height:100%;" frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="modal-body" style="padding:20px; flex:1; overflow:auto;">
          <div id="mChannel" style="color: var(--accent); font-weight:700;"></div>
          <div id="mTitle" style="font-size:18px; font-weight:700; margin-top:5px;"></div>
          <div style="display:flex; gap:10px; margin-top:20px;">
            <button id="pipBtn" style="flex:1; padding:12px; background:#444; border:none; color:#fff; border-radius:10px; cursor:pointer; font-weight:700;">작게 보기</button>
            <button id="mClose" style="flex:1; padding:12px; background:#333; border:none; color:#fff; border-radius:10px; cursor:pointer; font-weight:700;">닫기</button>
          </div>
        </div>
    </div>
  </div>

  <script>
    const SHEET_URL = "https://opensheet.elk.sh/1GgTfXN-iChTCdW3vHYFwQu2WSlwmgOm2-pHs2WIBBAY/ARCHIVE";
    const KEY = { genre: "장르", channel: "채널명", title: "TITLE", url: "URL", tag: "TAG", date: "발행일", media: "매체", format: "포맷" };
    
    let allData = [], baseFilters = { genre: [], media: [], format: [], tag: [] };
    let activeFilters = { genre: null, media: null, format: null, tag: new Set() };
    let viewMode = "all", selectedChannel = null;

    function escapeHTML(s) { return String(s||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
    function fnv1a(s){ let h = 0x811c9dc5; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=(h+(h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24))>>>0; } return h.toString(16).padStart(8,'0'); }
    function getYoutubeID(url) { const match = (url||"").match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/); return (match && match[2].length === 11) ? match[2] : ""; }

    // ===== URL 파라미터 로직 =====
    function updateURL(ch) {
      const url = new URL(window.location);
      if (ch) url.searchParams.set('ch', ch);
      else url.searchParams.delete('ch');
      window.history.replaceState({}, '', url);
    }

    function renderLeftNav() {
      const leftNavEl = document.getElementById("leftNav");
      leftNavEl.innerHTML = "";
      const genreMap = new Map();
      allData.forEach(it => {
        const g = (it[KEY.genre] || "기타").trim(), c = (it[KEY.channel] || "미분류").trim();
        if (!genreMap.has(g)) genreMap.set(g, new Map());
        const cm = genreMap.get(g); cm.set(c, (cm.get(c) || 0) + 1);
      });
      const index = [...genreMap.entries()].map(([g, cm]) => ({
        g, total: [...cm.values()].reduce((a, b) => a + b, 0),
        channels: [...cm.entries()].map(([c, cnt]) => ({ c, cnt })).sort((a, b) => a.c.localeCompare(b.c, "ko"))
      })).sort((a, b) => b.total - a.total);

      index.forEach((group, idx) => {
        const wrap = document.createElement("div"); wrap.className = "genreGroup";
        const head = document.createElement("button"); head.className = "genreHead"; 
        head.innerHTML = `<span>${escapeHTML(group.g)}</span><span style="font-size:11px; opacity:0.5;">${group.channels.length}ch</span>`;
        const body = document.createElement("div"); body.className = "genreBody" + (idx < 1 ? " open" : "");
        head.onclick = () => body.classList.toggle("open");
        group.channels.forEach(({c, cnt}) => {
          const b = document.createElement("button"); b.id = `nav-ch-${fnv1a(c)}`; 
          b.className = "channelItem" + (selectedChannel === c ? " active" : "");
          b.innerHTML = `<span>${escapeHTML(c)}</span><span style="opacity:0.4;">${cnt}</span>`;
          b.onclick = () => { selectedChannel = c; updateURL(c); render(); };
          body.appendChild(b);
        });
        wrap.append(head, body); leftNavEl.appendChild(wrap);
      });
    }

    function render() {
      const q = document.getElementById("search").value.toLowerCase().trim();
      const filtered = allData.filter(it => {
        const okSearch = q ? (it[KEY.title]||"").toLowerCase().includes(q) : true;
        const okGenre = activeFilters.genre ? it[KEY.genre] === activeFilters.genre : true;
        const okMedia = activeFilters.media ? it[KEY.media] === activeFilters.media : true;
        const okFormat = activeFilters.format ? it[KEY.format] === activeFilters.format : true;
        const okTag = activeFilters.tag.size === 0 ? true : [...activeFilters.tag].every(t => (it[KEY.tag]||"").includes(t));
        return okSearch && okGenre && okMedia && okFormat && okTag;
      });

      document.getElementById("stats").textContent = `표시: ${filtered.length} / 전체: ${allData.length}`;
      const gridEl = document.getElementById("grid");
      const dashEl = document.getElementById("dash");

      if (viewMode === "all") {
        gridEl.style.display = "grid"; dashEl.style.display = "none";
        gridEl.innerHTML = filtered.slice(0, 60).map(it => `
          <div class="card" onclick="openModal('${getYoutubeID(it[KEY.url])}', '${escapeHTML(it[KEY.channel])}', '${escapeHTML(it[KEY.title])}')">
            <div class="thumbWrap"><img class="thumb" src="https://img.youtube.com/vi/${getYoutubeID(it[KEY.url])}/mqdefault.jpg"></div>
            <div class="metaBox"><div class="channel">${escapeHTML(it[KEY.channel])}</div><div class="titleLine">${escapeHTML(it[KEY.title])}</div></div>
          </div>`).join("");
      } else {
        gridEl.style.display = "none"; dashEl.style.display = "grid"; dashEl.classList.add("active");
        document.querySelectorAll('.channelItem').forEach(el => el.classList.remove('active'));
        const activeNav = document.getElementById(`nav-ch-${fnv1a(selectedChannel||"")}`);
        if(activeNav) activeNav.classList.add('active');
        document.getElementById("rightTitle").textContent = selectedChannel || "채널 선택";
        const chList = filtered.filter(it => (it[KEY.channel]||"").trim() === selectedChannel);
        document.getElementById("rightList").innerHTML = chList.map(it => `
          <div class="row" onclick="openModal('${getYoutubeID(it[KEY.url])}', '${escapeHTML(it[KEY.channel])}', '${escapeHTML(it[KEY.title])}')">
            <img class="rowThumb" src="https://img.youtube.com/vi/${getYoutubeID(it[KEY.url])}/mqdefault.jpg">
            <div class="rowMeta"><div style="font-weight:700; font-size:14px; color:#fff;">${escapeHTML(it[KEY.title])}</div><div style="font-size:12px; opacity:0.5;">${it[KEY.date]||""}</div></div>
          </div>`).join("");
      }
      updateChipsUI(filtered);
    }

    function updateChipsUI(filtered) {
      const counts = { genre: new Map(), media: new Map(), format: new Map(), tag: new Map() };
      filtered.forEach(it => {
        if(it[KEY.genre]) counts.genre.set(it[KEY.genre], (counts.genre.get(it[KEY.genre])||0)+1);
        if(it[KEY.media]) counts.media.set(it[KEY.media], (counts.media.get(it[KEY.media])||0)+1);
        if(it[KEY.format]) counts.format.set(it[KEY.format], (counts.format.get(it[KEY.format])||0)+1);
        (it[KEY.tag]||"").split(',').map(t=>t.trim()).filter(Boolean).forEach(t => counts.tag.set(t, (counts.tag.get(t)||0)+1));
      });
      ['genre', 'media', 'format', 'tag'].forEach(type => {
        const panel = document.getElementById(type + 'Chips');
        panel.innerHTML = `<div class="chip ${!activeFilters[type] || (type==='tag' && activeFilters.tag.size===0) ? 'active' : ''}" onclick="resetFilter('${type}')">All</div>`;
        baseFilters[type].forEach(val => {
          const count = counts[type].get(val) || 0;
          if(count === 0 && (type !== 'tag' || !activeFilters.tag.has(val))) return;
          const chip = document.createElement("div");
          chip.className = `chip ${(type==='tag' ? activeFilters.tag.has(val) : activeFilters[type]===val) ? 'active' : ''}`;
          chip.innerHTML = `${escapeHTML(val)} <span style="opacity:0.5; font-size:11px;">${count}</span>`;
          chip.onclick = () => toggleFilter(type, val);
          panel.appendChild(chip);
        });
      });
    }

    function resetFilter(type) { if(type==='tag') activeFilters.tag.clear(); else activeFilters[type]=null; render(); }
    function toggleFilter(type, val) {
      if(type==='tag') { activeFilters.tag.has(val) ? activeFilters.tag.delete(val) : activeFilters.tag.add(val); }
      else { activeFilters[type] = activeFilters[type] === val ? null : val; }
      render();
    }

    // ===== 모달 & PIP 함수 =====
    function openModal(id, ch, tit) {
      if(!id) return;
      const modal = document.getElementById("videoModal");
      modal.classList.remove('pip'); // PIP 모드 초기화
      document.getElementById("mIframe").src = `https://www.youtube.com/embed/${id}?autoplay=1`;
      document.getElementById("mChannel").textContent = ch;
      document.getElementById("mTitle").textContent = tit;
      document.getElementById("modalOverlay").classList.add("open");
      document.getElementById("pipBtn").textContent = "작게 보기";
    }

    document.getElementById("pipBtn").onclick = function(e) {
      e.stopPropagation();
      const modal = document.getElementById("videoModal");
      const overlay = document.getElementById("modalOverlay");
      modal.classList.toggle('pip');
      if (modal.classList.contains('pip')) {
        overlay.style.pointerEvents = "none"; // 뒤쪽 클릭 가능하게
        overlay.style.background = "transparent";
        overlay.style.backdropFilter = "none";
        this.textContent = "크게 보기";
      } else {
        overlay.style.pointerEvents = "auto";
        overlay.style.background = "rgba(0,0,0,.75)";
        overlay.style.backdropFilter = "blur(4px)";
        this.textContent = "작게 보기";
      }
    };

    document.getElementById("mClose").onclick = function() {
      const modal = document.getElementById("videoModal");
      const overlay = document.getElementById("modalOverlay");
      document.getElementById("mIframe").src = "";
      overlay.classList.remove("open");
      modal.classList.remove('pip');
      overlay.style.pointerEvents = "auto";
      overlay.style.background = "rgba(0,0,0,.75)";
    };

    async function init() {
      try {
        const res = await fetch(SHEET_URL);
        allData = (await res.json()).filter(x => x && x[KEY.url]);
        ['genre', 'media', 'format'].forEach(k => baseFilters[k] = [...new Set(allData.map(i => (i[KEY[k]]||"").trim()).filter(Boolean))].sort());
        baseFilters.tag = [...new Set(allData.flatMap(i => (i[KEY.tag]||"").split(',').map(t=>t.trim()).filter(Boolean)))].sort();
        
        // 🔥 URL 파라미터 체크
        const params = new URLSearchParams(window.location.search);
        const shareCh = params.get('ch');
        if (shareCh) { selectedChannel = shareCh; viewMode = "dash"; }

        document.querySelectorAll('.tab').forEach(t => t.onclick = function() {
          document.querySelectorAll('.tab, .chips').forEach(x => x.classList.remove('active'));
          this.classList.add('active'); document.getElementById(this.dataset.tab + 'Chips').classList.add('active');
        });

        renderLeftNav(); render();
      } catch (e) { document.body.innerHTML = "로딩 실패: " + e; }
    }

    document.getElementById("viewAllBtn").onclick = function() { viewMode="all"; this.classList.add("active"); document.getElementById("viewDashBtn").classList.remove("active"); updateURL(null); render(); };
    document.getElementById("viewDashBtn").onclick = function() { viewMode="dash"; this.classList.add("active"); document.getElementById("viewAllBtn").classList.remove("active"); render(); };
    document.getElementById("resetBtn").onclick = () => { activeFilters = { genre: null, media: null, format: null, tag: new Set() }; document.getElementById("search").value=""; updateURL(null); render(); };
    document.getElementById("search").oninput = () => render();
    window.onscroll = () => { document.getElementById("fab").style.display = window.scrollY > 400 ? "flex" : "none"; };
    document.getElementById("fab").onclick = () => window.scrollTo({top:0, behavior:'smooth'});

    init();
  </script>
</body>
</html>
