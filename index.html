<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Video Reference Archive</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root{ --bg:#0b0b0c; --panel-bg: rgba(20, 20, 22, 0.85); --text:#eaeaea; --muted:rgba(234,234,234,.6); --line:rgba(255,255,255,0.08); --line2:rgba(255,255,255,0.15); --accent:#ff4757; --accent-glow: rgba(255, 71, 87, 0.3); --shadow: 0 14px 40px rgba(0,0,0,.5); }
        *{ box-sizing:border-box; outline: none; }
        body{ margin:0; padding:22px; background: var(--bg); color:var(--text); font-family: "Pretendard", sans-serif; }
        .topbarWrapper { position: sticky; top: -22px; margin: -22px -22px 12px -22px; padding: 22px 22px 12px 22px; background: rgba(11, 11, 12, 0.9); backdrop-filter: blur(16px); z-index: 100; border-bottom: 1px solid var(--line); }
        .topbar{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
        .btn{ padding:10px 16px; border-radius:12px; border:1px solid var(--line); background: rgba(255,255,255,0.03); color:var(--text); cursor:pointer; font-size:13px; font-weight:700; }
        .btn.active{ border-color: var(--accent); background: rgba(255,71,87,0.1); color: var(--accent); }
        .filterTabs{ display:flex; gap:8px; margin: 12px 0; }
        .tab{ padding:8px 12px; border-radius:10px; border:1px solid transparent; background: transparent; color: var(--muted); cursor:pointer; font-size:13px; font-weight:700; }
        .tab.active{ border-color: var(--line2); background: rgba(255,255,255,0.08); color: #fff; }
        .filterPanel{ border:1px solid var(--line); background: rgba(0,0,0,0.1); border-radius:14px; padding:12px; }
        .chipsPanel{ display:none; flex-wrap:wrap; gap:8px; }
        .chipsPanel.active{ display:flex; }
        .chip{ padding:7px 12px; border-radius:999px; border:1px solid var(--line); background: rgba(255,255,255,0.03); color: var(--muted); cursor:pointer; font-size:12px; font-weight: 600; transition: 0.2s; }
        .chip.active{ border-color: var(--accent); background: rgba(255,71,87,0.1); color: var(--accent); }
        .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:20px; margin-top: 14px; }
        .card{ background: var(--panel-bg); border:1px solid var(--line); border-radius: 16px; padding:14px; transition: 0.3s; }
        .metaBox .channel{ font-weight:800; color: #fff; margin-bottom: 4px; }
        .metaBox .titleLine{ font-size:13px; color: rgba(234,234,234,.8); }
    </style>
</head>
<body>
    <div class="topbarWrapper">
        <h1>🎬 Video Reference Archive</h1>
        <div class="topbar">
            <input id="search" type="text" placeholder="제목 검색..." />
            <button class="btn" id="resetBtn">초기화</button>
        </div>
        <div class="filterTabs">
            <button class="tab active" data-tab="genre">장르</button>
            <button class="tab" data-tab="cast">출연자</button>
        </div>
        <div class="filterPanel">
            <div class="chips chipsPanel active" id="genreChips"></div>
            <div class="chips chipsPanel" id="castChips"></div>
        </div>
    </div>
    <div class="grid" id="grid"></div>

    <script>
    const SHEET_URL = "https://opensheet.elk.sh/1GgTfXN-iChTCdW3vHYFwQu2WSlwmgOm2-pHs2WIBBAY/ARCHIVE";
    const KEY = { genre: "장르", channel: "채널명", title: "TITLE", cast: "출연자" };

    let allData = [], baseGenres = [], baseCasts = [];
    let activeGenre = new Set(), activeCast = new Set(), activeCastRole = "전체";
    const gridEl = document.getElementById("grid"), genreChipsEl = document.getElementById("genreChips"), castChipsEl = document.getElementById("castChips");

    // 슬래시(/)는 제거하고 콤마와 공백만 구분자로 사용
    function splitTags(s) { return (s || "").split(/[ ,]+/).filter(Boolean); }

    // 직원 그룹핑 및 괄호 없는 태그 대분류 승격
    function getRole(tag) {
        const match = tag.match(/\(([^)]+)\)/);
        if (!match) return tag; // 괄호 없으면 태그 자체가 대분류
        const role = match[1];
        if (['개발자', '마케터', '사업'].includes(role)) return '직원'; 
        return role;
    }

    async function init() {
        try {
            const res = await fetch(SHEET_URL);
            allData = await res.json();
            baseGenres = [...new Set(allData.flatMap(i => splitTags(i[KEY.genre])))].sort();
            baseCasts = [...new Set(allData.flatMap(i => splitTags(i[KEY.cast])))].sort();
            render();
        } catch(e) { console.error(e); }
    }

    function render() {
        const filtered = allData.filter(it => {
            const castMatch = activeCast.size === 0 || [...activeCast].some(c => splitTags(it[KEY.cast]).includes(c));
            return castMatch;
        });

        gridEl.innerHTML = filtered.map(it => `
            <div class="card">
                <div class="metaBox">
                    <div class="channel">${it[KEY.channel]}</div>
                    <div class="titleLine">${it[KEY.title]}</div>
                </div>
            </div>`).join("");
        
        updateCastChips();
    }

    function updateCastChips() {
        castChipsEl.innerHTML = "";
        const roles = ["전체", ...new Set(baseCasts.map(getRole))];
        
        // 1. 대분류 필터 행 (항상 노출)
        const roleRow = document.createElement("div"); roleRow.className = "chips";
        roles.forEach(role => {
            const btn = document.createElement("div");
            btn.className = "chip" + (activeCastRole === role ? " active" : "");
            btn.textContent = role;
            btn.onclick = () => { activeCastRole = role; render(); };
            roleRow.appendChild(btn);
        });
        castChipsEl.appendChild(roleRow);

        // 2. 세부 출연자 리스트 (전체 모드일 때는 숨김)
        if (activeCastRole !== "전체") {
            const castListContainer = document.createElement("div");
            castListContainer.className = "chips";
            castListContainer.style.marginTop = "10px";
            
            const filteredBaseCasts = baseCasts.filter(c => getRole(c) === activeCastRole);
            filteredBaseCasts.forEach(val => {
                const chip = document.createElement("div");
                chip.className = "chip" + (activeCast.has(val) ? " active" : "");
                chip.textContent = val;
                chip.onclick = () => {
                    activeCast.has(val) ? activeCast.delete(val) : activeCast.add(val);
                    render();
                };
                castListContainer.appendChild(chip);
            });
            castChipsEl.appendChild(castListContainer);
        }
    }

    document.querySelectorAll('.tab').forEach(t => t.onclick = (e) => {
        document.querySelectorAll('.tab, .chipsPanel').forEach(el => el.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById(e.target.dataset.tab + "Chips").classList.add('active');
    });

    document.getElementById("resetBtn").onclick = () => {
        activeCast.clear(); activeCastRole = "전체"; render();
    };

    init();
    </script>
</body>
</html>
