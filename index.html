<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Video Reference Archive</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root{ --bg:#0f0f10; --text:#eaeaea; --muted:rgba(234,234,234,.7); --line:#26262a; --line2:#2f2f35; --accent:#ff4757; --shadow: 0 14px 40px rgba(0,0,0,.35); --radius:16px; }
        *{ box-sizing:border-box; }
        body{ margin:0; padding:22px; background: radial-gradient(1200px 600px at 10% 0%, rgba(255,71,87,.08), transparent 55%), radial-gradient(1000px 600px at 90% 10%, rgba(43,143,163,.08), transparent 55%), var(--bg); color:var(--text); font-family: "Pretendard", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
        h1{ margin:0 0 12px 0; font-size:24px; letter-spacing:.2px; display:flex; align-items:center; gap:10px; }
        .topbarWrapper { position: sticky; top: -22px; margin: -22px -22px 12px -22px; padding: 22px 22px 12px 22px; background: rgba(15, 15, 16, 0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .topbar{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
        input[type="text"]{ padding:10px 12px; width:320px; max-width:100%; border-radius:14px; border:1px solid var(--line); background: rgba(20,20,22,.7); color:var(--text); outline:none; font-family: inherit; }
        .btn{ padding:10px 12px; border-radius:14px; border:1px solid var(--line); background: rgba(20,20,22,.7); color:var(--text); cursor:pointer; font-size:13px; font-weight:700; font-family: inherit; }
        .btn.active{ border-color: var(--accent); background: rgba(255,71,87,.1); }
        .stats{ font-size:13px; color: var(--muted); margin-left:auto; }
        .divider{ height:1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent); margin: 12px 0; }
        .viewToggle{ display:inline-flex; border:1px solid rgba(255,255,255,.10); background: rgba(20,20,22,.55); border-radius:999px; overflow:hidden; }
        .viewToggle button{ border:0; background: transparent; color: rgba(234,234,234,.78); padding:9px 12px; font-size:13px; font-weight:700; cursor:pointer; font-family: inherit; }
        .viewToggle button.active{ background: rgba(255,71,87,.14); color: var(--accent); }
        .filterTabs{ display:flex; flex-wrap:wrap; gap:8px; margin: 8px 0 10px 0; }
        .tab{ padding:8px 10px; border-radius:12px; border:1px solid rgba(255,255,255,.12); background: rgba(20,20,22,.55); color: rgba(234,234,234,.88); font-size:13px; font-weight:700; cursor:pointer; font-family: inherit; }
        .tab.active{ border-color: var(--accent); background: rgba(20,20,22,.75); }
        .filterPanel{ border:1px solid rgba(255,255,255,.08); background: rgba(20,20,22,.35); border-radius:14px; padding:10px; }
        .chips{ display:none; flex-wrap:wrap; gap:8px; }
        .chips.active{ display:flex; }
        .chip{ padding:7px 10px; border-radius:999px; border:1px solid var(--line); background: rgba(23,23,26,.8); cursor:pointer; font-size:13px; transition: all 0.2s; }
        .chip.active{ border-color: var(--accent); background: rgba(255,71,87,.1); }
        .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:16px; margin-top: 14px; }
        .card{ background: rgba(20,20,22,.92); border:1px solid var(--line); border-radius: var(--radius); overflow:hidden; box-shadow: var(--shadow); transition: 0.2s; cursor: pointer; }
        .card:hover{ transform: translateY(-4px); border-color: rgba(255,255,255,.16); }
        .thumb{ width:100%; height:180px; object-fit:cover; background:#000; }
        .metaBox{ padding:14px; }
        .channel{ font-size:14px; font-weight:700; color:var(--accent); margin-bottom:4px; }
        .titleLine{ font-size:13px; line-height:1.4; height:2.8em; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
        .dash{ display:none; grid-template-columns: 300px 1fr; gap:16px; margin-top:14px; }
        .panel{ border:1px solid var(--line); background: rgba(20,20,22,.4); border-radius:16px; height: calc(100vh - 250px); overflow-y: auto; }
        .genreGroup{ margin-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.05); }
        .genreHead{ width:100%; padding:12px; background:none; border:none; color:#fff; text-align:left; font-weight:700; cursor:pointer; }
        .channelItem{ width:100%; padding:8px 20px; background:none; border:none; color:var(--muted); text-align:left; cursor:pointer; font-size:13px; }
        .channelItem.active{ color:var(--accent); background:rgba(255,71,87,0.1); }
        .modalOverlay{ position:fixed; inset:0; background:rgba(0,0,0,.8); backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center; z-index:9999; }
        .modalOverlay.open{ display:flex; }
        .modal{ width:90%; max-width:1200px; background:#161618; border-radius:20px; display:grid; grid-template-columns: 1fr 350px; overflow:hidden; max-height:90vh; }
        .modalMain{ padding:20px; }
        .modalSide{ background:#1c1c1e; padding:20px; border-left:1px solid var(--line); overflow-y:auto; }
        iframe{ width:100%; aspect-ratio:16/9; border-radius:12px; }
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; padding: 12px 24px; border-radius: 999px; transition: 0.4s; z-index: 10000; }
        #toast.show { bottom: 40px; }
        @media (max-width: 900px) { .modal { grid-template-columns: 1fr; } .modalSide { display:none; } .dash { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="toast">알림</div>
    <div class="topbarWrapper">
        <h1>🎬 Video Archive</h1>
        <div class="topbar">
            <input id="search" type="text" placeholder="제목 검색..." />
            <div class="viewToggle">
                <button id="viewAllBtn" class="active">전체</button>
                <button id="viewDashBtn">채널별</button>
            </div>
            <button class="btn" id="resetBtn">초기화</button>
            <div class="stats" id="stats">표시: 0 / 전체: 0</div>
        </div>
        <div class="divider"></div>
        <div class="filterTabs">
            <button class="tab active" data-tab="genre">장르</button>
            <button class="tab" data-tab="media">매체</button>
            <button class="tab" data-tab="tag">TAG</button>
        </div>
        <div class="filterPanel">
            <div class="chips active" id="genreChips"></div>
            <div class="chips" id="mediaChips"></div>
            <div class="chips" id="tagChips"></div>
        </div>
    </div>

    <div class="grid" id="grid"></div>
    <div class="dash" id="dash">
        <div class="panel" id="leftNav"></div>
        <div class="panel" style="padding:20px;"><h3 id="rightTitle">채널을 선택하세요</h3><div id="rightList"></div></div>
    </div>

    <div class="modalOverlay" id="modalOverlay">
        <div class="modal">
            <div class="modalMain">
                <div id="videoContainer"></div>
                <h2 id="mTitle" style="margin-top:15px;"></h2>
                <p id="mSub" style="color:var(--muted);"></p>
                <button class="btn" onclick="closeModal()">닫기</button>
            </div>
            <div class="modalSide">
                <h3>메모</h3>
                <div id="mList" style="margin-bottom:15px;"></div>
                <input id="mNick" type="text" placeholder="닉네임" style="width:100%; margin-bottom:5px; padding:8px; border-radius:8px; border:1px solid var(--line); background:#111; color:#fff;">
                <textarea id="mMemo" placeholder="내용" style="width:100%; padding:8px; border-radius:8px; border:1px solid var(--line); background:#111; color:#fff; height:80px;"></textarea>
                <button class="btn" id="mSend" style="width:100%; margin-top:5px; background:var(--accent);">등록</button>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://opensheet.elk.sh/1GgTfXN-iChTCdW3vHYFwQu2WSlwmgOm2-pHs2WIBBAY/ARCHIVE";
        const API_URL = "https://script.google.com/macros/s/AKfycbzHucb9jQ128D4vvCnX1nzTzZaWDqK6gopqS45KoJRknGG_Zr5gSIB-lDxpe8MohZVRKg/exec";
        
        let allData = [], filteredData = [];
        let activeGenre = null, activeMedia = null, activeTags = new Set();
        let viewMode = "all", selectedChannel = null;

        const gridEl = document.getElementById("grid"), dashEl = document.getElementById("dash"),
              searchEl = document.getElementById("search"), leftNavEl = document.getElementById("leftNav");

        function escapeHTML(str) { return String(str || "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#039;"}[m])); }
        
        function getYoutubeID(url) {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        async function init() {
            try {
                const res = await fetch(SHEET_URL);
                allData = await res.json();
                renderFilters();
                render();
            } catch (e) {
                console.error("Data Load Error", e);
                gridEl.innerHTML = "데이터를 불러오는 중 오류가 발생했습니다.";
            }
        }

        function renderFilters() {
            const genres = [...new Set(allData.map(d => d["장르"]))].filter(Boolean);
            const medias = [...new Set(allData.map(d => d["매체"]))].filter(Boolean);
            
            const renderChip = (container, list, setter) => {
                container.innerHTML = `<div class="chip active">전체</div>` + list.map(item => `<div class="chip">${item}</div>`).join("");
                container.querySelectorAll(".chip").forEach((chip, i) => {
                    chip.onclick = () => {
                        container.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
                        chip.classList.add("active");
                        setter(i === 0 ? null : list[i-1]);
                        render();
                    };
                });
            };

            renderChip(document.getElementById("genreChips"), genres, (v) => activeGenre = v);
            renderChip(document.getElementById("mediaChips"), medias, (v) => activeMedia = v);
        }

        function render() {
            filteredData = allData.filter(d => {
                const searchMatch = !searchEl.value || d["TITLE"]?.toLowerCase().includes(searchEl.value.toLowerCase());
                const genreMatch = !activeGenre || d["장르"] === activeGenre;
                const mediaMatch = !activeMedia || d["매체"] === activeMedia;
                return searchMatch && genreMatch && mediaMatch;
            });

            document.getElementById("stats").textContent = `표시: ${filteredData.length} / 전체: ${allData.length}`;

            if (viewMode === "all") {
                gridEl.style.display = "grid"; dashEl.style.display = "none";
                gridEl.innerHTML = filteredData.map(d => {
                    const ytId = getYoutubeID(d["URL"]);
                    const thumb = ytId ? `https://img.youtube.com/vi/${ytId}/mqdefault.jpg` : "https://via.placeholder.com/300x180";
                    return `
                    <div class="card" onclick="openModal('${encodeURIComponent(JSON.stringify(d))}')">
                        <img class="thumb" src="${thumb}">
                        <div class="metaBox">
                            <div class="channel">${escapeHTML(d["채널명"])}</div>
                            <div class="titleLine">${escapeHTML(d["TITLE"])}</div>
                        </div>
                    </div>`;
                }).join("");
            } else {
                gridEl.style.display = "none"; dashEl.style.display = "grid";
                renderDash();
            }
        }

        function renderDash() {
            const channels = {};
            allData.forEach(d => {
                if(!channels[d["채널명"]]) channels[d["채널명"]] = [];
                channels[d["채널명"]].push(d);
            });

            leftNavEl.innerHTML = Object.keys(channels).map(ch => `
                <div class="channelItem ${selectedChannel === ch ? 'active' : ''}" onclick="selectChannel('${ch}')">
                    ${ch} (${channels[ch].length})
                </div>
            `).join("");

            if (selectedChannel) {
                document.getElementById("rightTitle").textContent = selectedChannel;
                document.getElementById("rightList").innerHTML = channels[selectedChannel].map(d => `
                    <div style="padding:10px; border-bottom:1px solid #333; cursor:pointer;" onclick="openModal('${encodeURIComponent(JSON.stringify(d))}')">
                        ${escapeHTML(d["TITLE"])}
                    </div>
                `).join("");
            }
        }

        function selectChannel(ch) { selectedChannel = ch; renderDash(); }

        window.openModal = function(dataStr) {
            const d = JSON.parse(decodeURIComponent(dataStr));
            const ytId = getYoutubeID(d["URL"]);
            document.getElementById("videoContainer").innerHTML = ytId ? 
                `<iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1" allowfullscreen></iframe>` : "영상을 재생할 수 없습니다.";
            document.getElementById("mTitle").textContent = d["TITLE"];
            document.getElementById("mSub").textContent = `${d["채널명"]} | ${d["장르"]}`;
            document.getElementById("modalOverlay").classList.add("open");
        };

        window.closeModal = function() {
            document.getElementById("modalOverlay").classList.remove("open");
            document.getElementById("videoContainer").innerHTML = "";
        };

        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.chips').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + "Chips").classList.add('active');
            };
        });

        document.getElementById("viewAllBtn").onclick = () => { viewMode = "all"; document.getElementById("viewAllBtn").classList.add("active"); document.getElementById("viewDashBtn").classList.remove("active"); render(); };
        document.getElementById("viewDashBtn").onclick = () => { viewMode = "dash"; document.getElementById("viewDashBtn").classList.add("active"); document.getElementById("viewAllBtn").classList.remove("active"); render(); };
        searchEl.oninput = render;
        
        init();
    </script>
</body>
</html>
