<script>
    const SHEET_URL = "https://opensheet.elk.sh/1GgTfXN-iChTCdW3vHYFwQu2WSlwmgOm2-pHs2WIBBAY/ARCHIVE";
    const API_URL = "https://script.google.com/macros/s/AKfycbzHucb9jQ128D4vvCnX1nzTzZaWDqK6gopqS45KoJRknGG_Zr5gSIB-lDxpe8MohZVRKg/exec";
    const KEY = { genre: "장르", channel: "채널명", title: "TITLE", media: "매체", url: "URL", format: "포맷", tag: "TAG", date: "발행일" };

    let allData = [], baseGenres = [], baseMedias = [], baseFormats = [], baseTags = [];
    let activeGenre = null, activeMedia = null, activeFormat = null, activeTags = new Set();
    let viewMode = "all", selectedChannel = null, showLikedOnly = false, sortMode = "date", renderLimit = 30;
    const RENDER_CHUNK = 30;
    const interactionsCache = new Map();
    const LS_NICK = "vra:nickname", LS_UID = "vra:userId", LS_LIKED = "vra:liked";

    // DOM Elements
    const gridEl = document.getElementById("grid"), dashEl = document.getElementById("dash"), statsEl = document.getElementById("stats"), 
          searchEl = document.getElementById("search"), resetBtn = document.getElementById("resetBtn"), viewAllBtn = document.getElementById("viewAllBtn"), 
          viewDashBtn = document.getElementById("viewDashBtn"), genreChipsEl = document.getElementById("genreChips"), mediaChipsEl = document.getElementById("mediaChips"), 
          formatChipsEl = document.getElementById("formatChips"), tagChipsEl = document.getElementById("tagChips"), leftNavEl = document.getElementById("leftNav"), 
          rightTitleEl = document.getElementById("rightTitle"), rightListEl = document.getElementById("rightList"), modalOverlay = document.getElementById("modalOverlay"),
          mClose = document.getElementById("mClose"), mThumb = document.getElementById("mThumb"), mTitle = document.getElementById("mTitle"), mSub = document.getElementById("mSub"), 
          mLink = document.getElementById("mLink"), mCopyBtn = document.getElementById("mCopyBtn"), mCounts = document.getElementById("mCounts"), mLikeBtn = document.getElementById("mLikeBtn"), 
          mLikeCnt = document.getElementById("mLikeCnt"), mList = document.getElementById("mList"), mNick = document.getElementById("mNick"), mMemo = document.getElementById("mMemo"), 
          mSend = document.getElementById("mSend"), mVideoPlayer = document.getElementById("mVideoPlayer"), mPipBtn = document.getElementById("mPipBtn"), mShareBtn = document.getElementById("mShareBtn");

    // Helper Functions
    function escapeHTML(str) { return String(str || "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#039;"}[m])); }
    function splitTags(s) { return (s || "").split(/[ ,/]+/).filter(Boolean); }
    function fnv1a(str){ let h = 0x811c9dc5; for (let i=0; i<str.length; i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 0x01000193); } return (h >>> 0).toString(16).padStart(8,"0"); }
    function getItemId(item){ return fnv1a((item[KEY.url] || "").trim() + (item[KEY.title] || "").trim()); }
    function getNickname(){ return localStorage.getItem(LS_NICK) || ""; }
    function setNickname(nick){ localStorage.setItem(LS_NICK, nick); }
    function getUserId() { let uid = localStorage.getItem(LS_UID); if (!uid) { uid = crypto.randomUUID(); localStorage.setItem(LS_UID, uid); } return uid; }
    function getLikedMap(){ try{ return JSON.parse(localStorage.getItem(LS_LIKED) || "{}"); }catch{ return {}; } }
    function isLiked(itemId){ return !!getLikedMap()[itemId]; }
    function setLikedState(itemId, liked){ const m = getLikedMap(); if (liked) m[itemId] = true; else delete m[itemId]; localStorage.setItem(LS_LIKED, JSON.stringify(m)); }
    function debounce(func, delay) { let timer; return (...args) => { clearTimeout(timer); timer = setTimeout(() => func(...args), delay); }; }
    function showToast(msg) { const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 3000); }
    function sortByDateDesc(data) { return [...data].sort((a, b) => new Date((b[KEY.date]||"").replace(/\./g,'-')) - new Date((a[KEY.date]||"").replace(/\./g,'-'))); }
    
    function getYoutubeID(url) {
        if (!url) return null;
        try {
            const u = new URL(url);
            if (u.pathname.includes("/shorts/")) return u.pathname.split("/shorts/")[1].split(/[?#]/)[0];
            if (u.hostname.includes("youtu.be")) return u.pathname.slice(1).split(/[?#]/)[0];
            return u.searchParams.get("v");
        } catch { return null; }
    }

    async function resolveThumbnail(item) { 
        const ytId = getYoutubeID(item[KEY.url]); 
        return ytId ? `https://img.youtube.com/vi/${ytId}/hqdefault.jpg` : "https://via.placeholder.com/400x225?text=No+Thumbnail"; 
    }

    // Interaction Functions
    async function fetchInteractions(itemId){ 
        if (interactionsCache.has(itemId)) return interactionsCache.get(itemId); 
        try { 
            const res = await fetch(API_URL + "?itemId=" + itemId); 
            const data = await res.json(); 
            const norm = { likes: data.likes || 0, memos: data.memos || [] }; 
            interactionsCache.set(itemId, norm); 
            return norm; 
        } catch { return { likes: 0, memos: [] }; } 
    }

    async function postInteraction(payload){ 
        try { await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) }); } catch(e) {} 
    }
    
    function updateCountersInDOM(itemId){ 
        const data = interactionsCache.get(itemId); 
        if (!data) return; 
        document.querySelectorAll("#like-" + itemId).forEach(el => el.textContent = data.likes); 
        document.querySelectorAll("#memo-" + itemId).forEach(el => el.textContent = data.memos.length); 
        if (modalOverlay.classList.contains("open") && modalOverlay.dataset.itemid === itemId){ 
            mLikeCnt.textContent = data.likes; 
            mCounts.textContent = `👍 ${data.likes} · 💬 ${data.memos.length}`; 
        } 
    }

    async function hydrateCountersFor(ids){ for (const id of [...new Set(ids)]) { await fetchInteractions(id); updateCountersInDOM(id); } }

    async function toggleLike(itemId){ 
        const wasLiked = isLiked(itemId); 
        setLikedState(itemId, !wasLiked); 
        const cache = interactionsCache.get(itemId) || {likes:0, memos:[]};
        cache.likes += wasLiked ? -1 : 1;
        interactionsCache.set(itemId, cache);
        updateCountersInDOM(itemId);
        render(); 
        await postInteraction({ itemId, action: "like", userId: getUserId(), nickname: getNickname() || "익명" }); 
    }

    // Rendering Logic
    function renderChipGroup(container, labelAll, baseList, countMap, activeState, onPick, isMulti = false) { 
        container.innerHTML = ""; 
        const isAllActive = isMulti ? activeState.size === 0 : activeState === null; 
        const allChip = document.createElement("div"); 
        allChip.className = "chip" + (isAllActive ? " active" : ""); 
        allChip.textContent = labelAll; 
        allChip.onclick = () => onPick(null); 
        container.appendChild(allChip); 
        baseList.forEach(val => { 
            const isActive = isMulti ? activeState.has(val) : activeState === val; 
            const chip = document.createElement("div"); 
            chip.className = "chip" + (isActive ? " active" : ""); 
            chip.innerHTML = `${escapeHTML(val)} <span class="count">${countMap.get(val)||0}</span>`; 
            chip.onclick = () => onPick(val); 
            container.appendChild(chip); 
        }); 
    }

    function updateChipsUI(filtered) { 
        const gMap = new Map(), mMap = new Map(), fMap = new Map(), tMap = new Map(); 
        allData.forEach(it => { 
            gMap.set(it[KEY.genre], (gMap.get(it[KEY.genre])||0)+1); 
            mMap.set(it[KEY.media], (mMap.get(it[KEY.media])||0)+1); 
            fMap.set(it[KEY.format], (fMap.get(it[KEY.format])||0)+1); 
        }); 
        filtered.forEach(it => splitTags(it[KEY.tag]).forEach(t => tMap.set(t, (tMap.get(t)||0)+1))); 
        renderChipGroup(genreChipsEl, "All", baseGenres, gMap, activeGenre, (v) => { activeGenre = v; render(true); }); 
        renderChipGroup(mediaChipsEl, "All", baseMedias, mMap, activeMedia, (v) => { activeMedia = v; render(true); }); 
        renderChipGroup(formatChipsEl, "All", baseFormats, fMap, activeFormat, (v) => { activeFormat = v; render(true); }); 
        renderChipGroup(tagChipsEl, "All", baseTags, tMap, activeTags, (v) => { if (v === null) activeTags.clear(); else activeTags.has(v) ? activeTags.delete(v) : activeTags.add(v); render(true); }, true); 
    }

    function renderLeftNav() {
        leftNavEl.innerHTML = "";
        const genreMap = new Map();
        allData.forEach(it => {
            const g = (it[KEY.genre] || "기타").trim();
            const c = (it[KEY.channel] || "미분류").trim();
            if (!genreMap.has(g)) genreMap.set(g, new Map());
            const cm = genreMap.get(g);
            cm.set(c, (cm.get(c) || 0) + 1);
        });

        const index = [...genreMap.entries()].sort((a,b) => b[1].size - a[1].size);
        
        index.forEach(([g, cm], idx) => {
            const wrap = document.createElement("div");
            wrap.className = "genreGroup";
            const head = document.createElement("button");
            head.className = "genreHead";
            head.innerHTML = `<span>${escapeHTML(g)}</span><span style="font-size:11px; opacity:0.6;">${cm.size}ch</span>`;
            const body = document.createElement("div");
            body.className = "genreBody";
            body.style.display = idx < 2 ? "block" : "none";
            head.onclick = () => body.style.display = body.style.display === "none" ? "block" : "none";
            
            [...cm.entries()].sort().forEach(([c, cnt]) => {
                const b = document.createElement("button");
                b.className = "channelItem" + (selectedChannel === c ? " active" : "");
                b.innerHTML = `<span>${escapeHTML(c)}</span><span style="font-size:11px; opacity:0.5;">${cnt}</span>`;
                b.onclick = () => { selectedChannel = c; render(true); renderLeftNav(); };
                body.appendChild(b);
            });
            wrap.append(head, body);
            leftNavEl.appendChild(wrap);
        });
    }

    async function render(resetPagination = false){
        if (resetPagination) renderLimit = RENDER_CHUNK;
        const filtered = allData.filter(item => {
            const q = searchEl.value.toLowerCase();
            const okSearch = q ? (item[KEY.title]||"").toLowerCase().includes(q) : true;
            const okGenre = activeGenre ? item[KEY.genre] === activeGenre : true;
            const okMedia = activeMedia ? item[KEY.media] === activeMedia : true;
            const okFormat = activeFormat ? item[KEY.format] === activeFormat : true;
            const okTag = activeTags.size === 0 ? true : [...activeTags].every(t => splitTags(item[KEY.tag]).includes(t));
            const okLiked = showLikedOnly ? isLiked(getItemId(item)) : true;
            return okSearch && okGenre && okMedia && okFormat && okTag && okLiked;
        });

        updateChipsUI(filtered);
        statsEl.textContent = `표시: ${filtered.length} / 전체: ${allData.length}`;

        if (viewMode === "all"){
            gridEl.style.display = "grid"; dashEl.style.display = "none";
            const list = (sortMode === "likes") ? [...filtered].sort((a,b)=> (interactionsCache.get(getItemId(b))?.likes||0) - (interactionsCache.get(getItemId(a))?.likes||0)) : sortByDateDesc(filtered);
            const sliced = list.slice(0, renderLimit);
            
            gridEl.innerHTML = sliced.map(it => {
                const itemId = getItemId(it);
                return `
                <div class="card">
                    <div class="thumbWrap" onclick="openById('${itemId}')">
                        <img class="thumb" src="https://via.placeholder.com/400x225?text=Loading..." id="img-${itemId}">
                    </div>
                    <div class="metaBox">
                        <div class="metaLeft"><div class="channel">${escapeHTML(it[KEY.channel])}</div><div class="titleLine">${escapeHTML(it[KEY.title])}</div></div>
                        <div class="actionsBar">
                            <button class="actionBtn ${isLiked(itemId)?'active':''}" onclick="event.stopPropagation(); toggleLike('${itemId}')">👍 <span id="like-${itemId}">0</span></button>
                            <button class="actionBtn" onclick="openById('${itemId}')">💬 <span id="memo-${itemId}">0</span></button>
                        </div>
                    </div>
                </div>`;
            }).join("");
            
            sliced.forEach(async it => { 
                const t = await resolveThumbnail(it); 
                const img = document.getElementById(`img-${getItemId(it)}`);
                if(img) img.src = t; 
            });
            hydrateCountersFor(sliced.map(getItemId));
        } else {
            gridEl.style.display = "none"; dashEl.style.display = "grid";
            if (!selectedChannel) { rightTitleEl.textContent = "채널 선택"; rightListEl.innerHTML = ""; return; }
            rightTitleEl.textContent = selectedChannel;
            const list = sortByDateDesc(filtered.filter(it => it[KEY.channel] === selectedChannel));
            rightListEl.innerHTML = list.map(it => `<div class="row" onclick="openById('${getItemId(it)}')"><img class="rowThumb" src="https://via.placeholder.com/160x90" id="rowimg-${getItemId(it)}"><div class="rowMeta"><strong>${escapeHTML(it[KEY.title])}</strong><div style="font-size:12px;">${it[KEY.date]}</div></div></div>`).join("");
            list.forEach(async it => { 
                const t = await resolveThumbnail(it); 
                const img = document.getElementById(`rowimg-${getItemId(it)}`); 
                if(img) img.src = t; 
            });
        }
    }

    // Modal & Event Listeners
    async function openModalForItem(item) {
        const itemId = getItemId(item);
        modalOverlay.dataset.itemid = itemId;
        mTitle.textContent = item[KEY.title];
        mSub.textContent = `${item[KEY.channel]} · ${item[KEY.date]}`;
        mLink.href = item[KEY.url];
        mThumb.src = await resolveThumbnail(item);
        mNick.value = getNickname();

        const url = item[KEY.url] || "";
        const ytId = getYoutubeID(url);
        const isShorts = url.includes("/shorts/");

        mVideoPlayer.innerHTML = '<iframe id="mIframe" width="100%" height="100%" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>';
        const newIframe = document.getElementById("mIframe");

        if (ytId) {
            mVideoPlayer.style.display = "block";
            newIframe.src = `https://www.youtube.com/embed/${ytId}?autoplay=1`;
        } else {
            mVideoPlayer.style.display = "none";
        }

        const modalContainer = modalOverlay.querySelector('.modal');
        if (isShorts) modalContainer.classList.add('shorts-mode');
        else modalContainer.classList.remove('shorts-mode');

        modalOverlay.classList.add("open");
        const data = await fetchInteractions(itemId);
        mLikeCnt.textContent = data.likes;
        mCounts.textContent = `👍 ${data.likes} · 💬 ${data.memos.length}`;
        mList.innerHTML = data.memos.map(m => `<div style="padding:10px; border-bottom:1px solid rgba(255,255,255,0.05);"><strong>${escapeHTML(m.nickname)}</strong>: ${escapeHTML(m.memo)}</div>`).join("");
    }

    function openById(id) {
        const item = allData.find(it => getItemId(it) === id);
        if (item) openModalForItem(item);
    }

    function closeModal() {
        modalOverlay.classList.remove("open");
        mVideoPlayer.innerHTML = ""; 
    }

    // Initialize
    async function init() {
        try {
            const res = await fetch(SHEET_URL);
            if (!res.ok) throw new Error("Network response was not ok");
            allData = (await res.json()).filter(x => x && (x[KEY.url] || x[KEY.title]));
            
            baseGenres = [...new Set(allData.map(i => (i[KEY.genre]||"").trim()).filter(Boolean))].sort();
            baseMedias = [...new Set(allData.map(i => (i[KEY.media]||"").trim()).filter(Boolean))].sort();
            baseFormats = [...new Set(allData.map(i => (i[KEY.format]||"").trim()).filter(Boolean))].sort();
            baseTags = [...new Set(allData.flatMap(i => splitTags(i[KEY.tag])))].sort();
            
            renderLeftNav(); 
            render(true); 
        } catch (e) { 
            console.error(e); 
            gridEl.innerHTML = "<div style='grid-column:1/-1; text-align:center; padding:50px;'>데이터를 불러오지 못했습니다. 구글 시트 링크나 CORS 상태를 확인하세요.</div>"; 
        }
    }

    // Bind Events
    searchEl.oninput = debounce(() => render(true), 300);
    viewAllBtn.onclick = () => { viewMode = "all"; viewAllBtn.classList.add("active"); viewDashBtn.classList.remove("active"); render(true); };
    viewDashBtn.onclick = () => { viewMode = "dash"; viewDashBtn.classList.add("active"); viewAllBtn.classList.remove("active"); render(true); };
    resetBtn.onclick = () => { activeGenre = activeMedia = activeFormat = null; activeTags.clear(); searchEl.value = ""; render(true); };
    mClose.onclick = closeModal;
    modalOverlay.onclick = (e) => { if (e.target === modalOverlay) closeModal(); };
    
    mSend.onclick = async () => {
        const itemId = modalOverlay.dataset.itemid, nick = mNick.value.trim(), memo = mMemo.value.trim();
        if (!nick || !memo) return;
        setNickname(nick);
        await postInteraction({ itemId, action: "memo", nickname: nick, memo, userId: getUserId() });
        mMemo.value = ""; 
        interactionsCache.delete(itemId); 
        const item = allData.find(it => getItemId(it) === itemId);
        if (item) openModalForItem(item);
    };

    document.querySelectorAll('.tab').forEach(t => t.onclick = (e) => {
        document.querySelectorAll('.tab, .chipsPanel').forEach(el => el.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById(e.target.dataset.tab + "Chips").classList.add('active');
    });

    window.addEventListener("scroll", () => {
        if (viewMode === "all" && (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
            if (renderLimit < allData.length) { renderLimit += RENDER_CHUNK; render(false); }
        }
    });

    init();
</script>
